/* ---- Sub-event breakdown table (reg+unreg, per sub-event) ---- */

function computeSubEventBreakdown(rows, year, brandKey, settings){
  const yr = rows; // rows are already filtered by year+country
  const subEvents = {};
  const isOne = v => v===1 || v==='1' || v===true || Number(v)===1;
  const teamCatField = brandKey==='tsr' ? 'Team Category' : 'Double/ Team Category';

  yr.forEach(r=>{
    const se = r['Sub-Event']; if(!se) return;
    const cat = r['Category'];

    // for team-type rows, skip captain/member sub-events and group by team category instead
    if(brandKey==='tsr' && cat==='Team'){
      const teamCat = (r[teamCatField]||'Unknown').toString().trim();
      const key = 'Team — ' + teamCat;
      if(!subEvents[key]) subEvents[key] = {regTickets:0, category:'Team', captainCount:0, isTeamCat:true, teamType:'tsr_team'};
      if(isOne(r['Team Captain'])) subEvents[key].captainCount++;
      return;
    }
    if(brandKey==='rl' && cat==='Doubles'){
      const teamCat = (r[teamCatField]||'Unknown').toString().trim();
      // normalize: "Doubles Women" → "Women", "Doubles Mix" → "Mixed"
      const gender = teamCat.toLowerCase().includes('mix') ? 'Mixed' : teamCat.toLowerCase().includes('women') ? 'Women' : teamCat.toLowerCase().includes('men') ? 'Men' : teamCat;
      const key = 'Doubles — ' + gender;
      if(!subEvents[key]) subEvents[key] = {regTickets:0, category:'Doubles', captainCount:0, isTeamCat:true, teamType:'rl_doubles'};
      if(isOne(r['Doubles Captain'])) subEvents[key].captainCount++;
      return;
    }
    if(brandKey==='rl' && cat==='Team Relay'){
      const teamCat = (r[teamCatField]||'Unknown').toString().trim();
      const gender = teamCat.toLowerCase().includes('mix') ? 'Mixed' : teamCat.toLowerCase().includes('women') ? 'Women' : teamCat.toLowerCase().includes('men') ? 'Men' : teamCat;
      const key = 'Team Relay — ' + gender;
      if(!subEvents[key]) subEvents[key] = {regTickets:0, category:'Team Relay', captainCount:0, isTeamCat:true, teamType:'rl_relay'};
      if(isOne(r['Team Relay Captain'])) subEvents[key].captainCount++;
      return;
    }

    // individual/singles rows — use sub-event name as-is
    if(!subEvents[se]) subEvents[se] = {regTickets:0, category:cat, captainCount:0, isTeamCat:false};
    subEvents[se].regTickets += parseInt(r['Ticket Count'])||0;
  });

  // calculate totalRegUnreg for each entry
  Object.keys(subEvents).forEach(se=>{
    const d = subEvents[se];
    if(d.isTeamCat){
      // team category rows: captains × team size
      let multiplier = 1;
      if(d.teamType==='tsr_team') multiplier = settings && settings.membersPerTeam ? parseInt(settings.membersPerTeam)+1 : 3;
      if(d.teamType==='rl_doubles') multiplier = settings && settings.doublesMembers ? parseInt(settings.doublesMembers)+1 : 2;
      if(d.teamType==='rl_relay') multiplier = settings && settings.teamRelayMembers ? parseInt(settings.teamRelayMembers)+1 : 4;
      d.totalRegUnreg = d.captainCount * multiplier;
    } else {
      d.totalRegUnreg = d.regTickets;
    }
  });
  return subEvents;
}

function renderSubEventTable(brandKey, viewRows, cmpRows, year, compareYear, settings){
  // apply date range filter if set
  function toYMD(d){
    if(!d) return null;
    const s = d.toString().trim();
    // ISO timestamp (e.g. 2026-05-31T16:00:00.000Z) → convert to MYT date
    if(s.includes('T') || s.endsWith('Z')){
      const dt = new Date(s);
      if(isNaN(dt)) return null;
      // add UTC+8 offset
      const mytMs = dt.getTime() + 8*60*60*1000;
      return new Date(mytMs).toISOString().slice(0,10);
    }
    // DD/MM/YYYY
    const dmy = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if(dmy) return `${dmy[3]}-${dmy[2].padStart(2,'0')}-${dmy[1].padStart(2,'0')}`;
    // YYYY-MM-DD
    if(s.match(/^\d{4}-\d{2}-\d{2}/)) return s.slice(0,10);
    return null;
  }
  function applyDateFilter(rows){
    const fromEl = document.getElementById('subEventDateFrom_'+brandKey);
    const toEl = document.getElementById('subEventDateTo_'+brandKey);
    const fromVal = fromEl ? fromEl.value : ''; // YYYY-MM-DD from browser
    const toVal = toEl ? toEl.value : '';
    if(!fromVal && !toVal) return rows;
    // debug: log first row's date value
    if(rows.length) console.log('[dateFilter] sample date value:', rows[0]['Date cleaned (DD/MM/YYYY)'], '→ YMD:', toYMD(rows[0]['Date cleaned (DD/MM/YYYY)']), 'fromVal:', fromVal, 'toVal:', toVal);
    return rows.filter(r=>{
      const rowYMD = toYMD(r['Date cleaned (DD/MM/YYYY)']);
      if(!rowYMD) return false;
      if(fromVal && rowYMD < fromVal) return false;
      if(toVal && rowYMD > toVal) return false;
      return true;
    });
  }
  const filteredView = applyDateFilter(viewRows);
  const filteredCmp = cmpRows ? applyDateFilter(cmpRows) : null;

  const curr = computeSubEventBreakdown(filteredView, year, brandKey, settings);
  const cmp = (compareYear && filteredCmp) ? computeSubEventBreakdown(filteredCmp, compareYear, brandKey, settings) : null;
  const allNames = new Set(Object.keys(curr));
  if(cmp) Object.keys(cmp).forEach(n=>allNames.add(n));
  const names = [...allNames].sort();

  // determine grouping per sub-event category
  function getGroup(se, cat){
    if(brandKey==='tsr'){
      if(!cat || cat==='Individual') return 'Individual';
      if(cat==='Team') return 'Team';
      return 'Individual';
    } else {
      if(cat==='Singles') return 'Singles';
      if(cat==='Doubles') return 'Doubles';
      if(cat==='Team Relay') return 'Team Relay';
      return 'Singles';
    }
  }

  // define group order and labels
  const groupOrder = brandKey==='tsr' ? ['Individual','Team'] : brandKey==='rl' ? ['Singles','Doubles','Team Relay'] : ['Individual'];
  const subtotalLabels = brandKey==='tsr'
    ? {Individual:'TOTAL INDIVIDUALS', Team:'TOTAL TEAMS'}
    : brandKey==='rl'
    ? {Singles:'TOTAL SINGLES', Doubles:'TOTAL DOUBLES', 'Team Relay':'TOTAL TEAM RELAYS'}
    : {Individual:'TOTAL'};
  const pctLabels = brandKey==='tsr'
    ? {Individual:'INDIVIDUALS %', Team:'TEAMS %'}
    : brandKey==='rl'
    ? {Singles:'SINGLES %', Doubles:'DOUBLES %', 'Team Relay':'TEAM RELAYS %'}
    : {Individual:''}; // no % row for TMR (only 1 group)

  // group sub-events
  const grouped = {};
  groupOrder.forEach(g=>{ grouped[g] = []; });
  names.forEach(se=>{
    const cat = curr[se] ? curr[se].category : (cmp && cmp[se] ? cmp[se].category : null);
    const group = getGroup(se, cat);
    if(!grouped[group]) grouped[group] = [];
    grouped[group].push(se);
  });

  const hasCmp = !!cmp;
  const numCols = hasCmp ? 4 : 1;
  const colSpan = numCols + 1;

  function rowHtml(label, currVal, cmpVal, isSubtotal, isPct, grandTotal, cmpGrandTotal){
    const style = isSubtotal ? 'font-weight:700; background:rgba(255,255,255,0.04);' : '';
    const labelStyle = isPct ? 'color:var(--text-dim); font-size:12px; font-weight:700; background:rgba(255,255,255,0.02);' : '';
    let cells = `<td style="${style} ${labelStyle}">${label}</td>`;
    if(isPct){
      const p = grandTotal ? (currVal/grandTotal*100).toFixed(0)+'%' : '—';
      cells += `<td style="text-align:right; ${style} ${labelStyle}">${p}</td>`;
      if(hasCmp){
        const cp = cmpGrandTotal ? (cmpVal/cmpGrandTotal*100).toFixed(0)+'%' : '—';
        cells += `<td style="text-align:right; ${style} ${labelStyle}">${cp}</td><td></td>`;
      }
    } else if(isSubtotal){
      cells += `<td style="text-align:right; ${style}">${fmtNum(currVal)}</td>`;
      if(hasCmp){
        const pct = cmpVal!==0 ? ((currVal-cmpVal)/cmpVal*100) : null;
        const up = currVal>=cmpVal;
        cells += `<td style="text-align:right; ${style}">${fmtNum(cmpVal)}</td>`;
        cells += `<td style="text-align:right; ${style} color:${up?'var(--good)':'var(--bad)'}">${pct!==null?(pct>=0?'+':'')+pct.toFixed(0)+'%':'—'}</td>`;
      }
    } else {
      cells += `<td style="text-align:right">${currVal!==null?fmtNum(currVal):'—'}</td>`;
      if(hasCmp){
        if(cmpVal!==null && cmpVal!==undefined){
          const pct = cmpVal!==0 ? ((currVal-cmpVal)/cmpVal*100) : null;
          const up = currVal>=cmpVal;
          cells += `<td style="text-align:right">${fmtNum(cmpVal)}</td>`;
          cells += `<td style="text-align:right; color:${up?'var(--good)':'var(--bad)'}">${pct!==null?(pct>=0?'+':'')+pct.toFixed(0)+'%':'—'}</td>`;
        } else {
          cells += `<td style="text-align:right; color:var(--text-dim); font-size:11px;">no match</td><td>—</td>`;
        }
      }
    }
    return `<tr>${cells}</tr>`;
  }

  const yearHeader = hasCmp ? `<th>${year}</th><th>${compareYear}</th><th>YoY %</th>` : `<th>${year}</th>`;
  let html = `<table><thead><tr><th>Sub-Event</th>${yearHeader}</tr></thead><tbody>`;

  // pre-calculate grand totals first so % rows use correct denominator
  let grandCurr = 0, grandCmp = 0;
  groupOrder.forEach(group=>{
    grouped[group].forEach(se=>{
      const d = curr[se]; const cd = cmp ? cmp[se] : null;
      const cv = d ? d.totalRegUnreg : 0;
      const ccv = cd ? cd.totalRegUnreg : 0;
      if(cv===0 && ccv===0) return;
      if(cv) grandCurr += cv;
      if(ccv) grandCmp += ccv;
    });
  });

  groupOrder.forEach(group=>{
    let subtotalCurr = 0, subtotalCmp = 0;
    grouped[group].forEach(se=>{
      const d = curr[se];
      const cd = cmp ? cmp[se] : null;
      const currVal = d ? d.totalRegUnreg : null;
      const cmpVal = cd ? cd.totalRegUnreg : null;
      // skip rows where both years are zero or null
      if((currVal===null||currVal===0) && (cmpVal===null||cmpVal===0)) return;
      if(currVal!==null) subtotalCurr += currVal;
      if(cmpVal!==null) subtotalCmp += cmpVal;
      html += rowHtml(se, currVal, cmpVal, false, false, 0, 0);
    });
    html += rowHtml(subtotalLabels[group], subtotalCurr, subtotalCmp, true, false, 0, 0);
    if(pctLabels[group]) html += rowHtml(pctLabels[group], subtotalCurr, subtotalCmp, false, true, grandCurr, grandCmp);
  });

  html += rowHtml('GRAND TOTAL', grandCurr, grandCmp, true, false, 0, 0);
  html += '</tbody></table>';
  document.getElementById('subEventTable_'+brandKey).innerHTML = html;
}

/* ---- Category × Phase breakdown table ---- */

function renderCatPhaseTable(brandKey, rows, year){
  const container = document.getElementById('catPhaseTable_'+brandKey);
  if(!container) return;

  // define categories per brand
  const categories = brandKey==='tsr' ? ['Individual','Team'] : ['Singles','Doubles','Team Relay'];

  // get all phases in order from this year's data
  const phaseFirstDate = {};
  rows.forEach(r=>{
    const p = r['Phase']; if(!p) return;
    const d = parseMYT(r['Date cleaned (DD/MM/YYYY)']);
    if(isNaN(d)) return;
    if(!phaseFirstDate[p] || d < phaseFirstDate[p]) phaseFirstDate[p] = d;
  });
  const phases = Object.entries(phaseFirstDate)
    .sort((a,b)=>a[1]-b[1])
    .map(([name])=>name);

  if(!phases.length){
    container.innerHTML = '<p style="color:var(--text-dim); font-size:13px;">No phase data found.</p>';
    return;
  }

  // build data: category → phase → ticket count
  const data = {};
  categories.forEach(cat=>{ data[cat] = {}; phases.forEach(p=>{ data[cat][p] = 0; }); });

  rows.forEach(r=>{
    const cat = r['Category']; 
    const phase = r['Phase'];
    if(!cat || !phase) return;
    // map category
    let mappedCat = null;
    if(brandKey==='tsr'){
      if(cat==='Individual') mappedCat = 'Individual';
      else if(cat==='Team') mappedCat = 'Team';
    } else if(brandKey==='rl'){
      if(cat==='Singles') mappedCat = 'Singles';
      else if(cat==='Doubles') mappedCat = 'Doubles';
      else if(cat==='Team Relay') mappedCat = 'Team Relay';
    }
    if(!mappedCat || !data[mappedCat] || !phases.includes(phase)) return;
    data[mappedCat][phase] += parseInt(r['Ticket Count'])||0;
  });

  // build table — rows = categories, columns = phases
  let html = '<table><thead><tr><th>Category</th>';
  phases.forEach(p=>{ html += `<th>${p}</th>`; });
  html += '<th>Total</th></tr></thead><tbody>';

  categories.forEach(cat=>{
    const row = data[cat];
    const total = phases.reduce((a,p)=>a+(row[p]||0),0);
    if(total===0) return;
    html += `<tr><td>${cat}</td>`;
    phases.forEach(p=>{ html += `<td style="text-align:right">${row[p]?fmtNum(row[p]):'—'}</td>`; });
    html += `<td style="text-align:right; font-weight:600;">${fmtNum(total)}</td></tr>`;
  });

  // totals row
  html += '<tr style="font-weight:700; background:rgba(255,255,255,0.04);"><td>Total</td>';
  let grandTotal = 0;
  phases.forEach(p=>{
    const colTotal = categories.reduce((a,cat)=>a+(data[cat][p]||0),0);
    grandTotal += colTotal;
    html += `<td style="text-align:right">${fmtNum(colTotal)}</td>`;
  });
  html += `<td style="text-align:right">${fmtNum(grandTotal)}</td></tr>`;
  html += '</tbody></table>';
  container.innerHTML = html;
}

/* ---- Gender category breakdown (Mixed/Women/Men) ---- */

function computeGenderBreakdown(rows, year, brandKey){
  const yr = rows.filter(r=>getEventYear(r)===String(year));
  const catField = brandKey==='tsr' ? 'Team Category' : 'Double/ Team Category';
  const groups = {}; // groupLabel(e.g. "Team" or "Doubles"/"Team Relay") -> {Mixed:n, Women:n, Men:n}

  yr.forEach(r=>{
    const tc = r[catField];
    if(!tc) return;
    // determine top-level group and gender
    let group, gender;
    if(brandKey==='tsr'){
      group = 'Team';
    } else {
      if(tc.toLowerCase().includes('doubles')) group = 'Doubles';
      else if(tc.toLowerCase().includes('team relay')) group = 'Team Relay';
      else return;
    }
    if(tc.toLowerCase().includes('mix')) gender = 'Mixed';
    else if(tc.toLowerCase().includes('women')) gender = 'Women';
    else if(tc.toLowerCase().includes('men')) gender = 'Men';
    else gender = 'Other';

    if(!groups[group]) groups[group] = {Mixed:0, Women:0, Men:0, Other:0};
    groups[group][gender] += parseInt(r['Ticket Count'])||0;
  });
  return groups;
}

function renderGenderTable(brandKey, rows, year, compareYear){
  const curr = computeGenderBreakdown(rows, year, brandKey);
  const cmp = compareYear ? computeGenderBreakdown(rows, compareYear, brandKey) : null;
  const groupNames = Object.keys(curr);

  if(groupNames.length===0){
    document.getElementById('genderTable_'+brandKey).innerHTML = '<p style="color:var(--text-dim); font-size:13px;">No team category data found.</p>';
    return;
  }

  let html = '<table><thead><tr><th style="width:40%">Category / Gender</th><th>'+year+' Count</th><th>'+year+' %</th>' + (cmp ? `<th>${compareYear} Count</th><th>${compareYear} %</th>` : '') + '</tr></thead><tbody>';
  groupNames.forEach(group=>{
    const g = curr[group];
    const total = g.Mixed+g.Women+g.Men+(g.Other||0);
    const cg = cmp ? cmp[group] : null;
    const cmpTotal = cg ? (cg.Mixed+cg.Women+cg.Men+(cg.Other||0)) : 0;
    ['Mixed','Women','Men'].forEach(gender=>{
      if(g[gender]===0 && (!cg || cg[gender]===0)) return;
      const pct = total ? (g[gender]/total*100) : 0;
      let cmpCells = '';
      if(cmp){
        const cVal = cg ? (cg[gender]||0) : 0;
        const cPct = cmpTotal ? (cVal/cmpTotal*100) : 0;
        cmpCells = `<td style="text-align:right">${fmtNum(cVal)}</td><td style="text-align:right">${cPct.toFixed(0)}%</td>`;
      }
      html += `<tr><td>${group} — ${gender}</td><td style="text-align:right">${fmtNum(g[gender])}</td><td style="text-align:right">${pct.toFixed(0)}%</td>${cmpCells}</tr>`;
    });
  });
  html += '</tbody></table>';
  document.getElementById('genderTable_'+brandKey).innerHTML = html;
}

/* ---- Audience profile (gender/age/nationality pie charts) ---- */

const AGE_RANGES = [
  {label:'<18', min:0, max:17},
  {label:'18-24', min:18, max:24},
  {label:'25-34', min:25, max:34},
  {label:'35-44', min:35, max:44},
  {label:'45-54', min:45, max:54},
  {label:'55+', min:55, max:999}
];
const PIE_COLORS = ['#378ADD','#FF6A3D','#6FCF97','#C77DFF','#F2C94C','#E8694A','#4A6657','#56CCF2','#EB5757','#27AE60'];

function renderAudienceProfile(brandKey, viewRows, cmpRows, year, compareYear){
  const audienceCat = document.getElementById('audienceCatFilter_'+brandKey) ? document.getElementById('audienceCatFilter_'+brandKey).value : 'all';
  const filterCat = r => audienceCat==='all' || r['Category']===audienceCat;

  const yr = viewRows.filter(filterCat);
  const cmpYr = (compareYear && cmpRows) ? cmpRows.filter(filterCat) : null;
  const hasCompare = !!cmpYr && cmpYr.length > 0;

  function getGenderMap(data){
    const m = {Male:0, Female:0, Unknown:0};
    data.forEach(r=>{
      const s = (r['Sex']||'').toString().trim().toUpperCase();
      if(s==='M') m.Male++;
      else if(s==='F') m.Female++;
      else if(r['Date cleaned (DD/MM/YYYY)']) m.Unknown++;
    });
    return m;
  }

  function getAgeCounts(data){
    const counts = AGE_RANGES.map(()=>0);
    data.forEach(r=>{
      const age = parseInt(r['Age']);
      if(isNaN(age)) return;
      const idx = AGE_RANGES.findIndex(range=>age>=range.min && age<=range.max);
      if(idx>=0) counts[idx]++;
    });
    return counts;
  }

  function getNatMap(data){
    const m = {};
    data.forEach(r=>{
      const c = (r['Nationality']||r['Country']||'Unknown').toString().trim();
      m[c] = (m[c]||0) + (parseInt(r['Ticket Count'])||0);
    });
    return m;
  }

  const genderMap = getGenderMap(yr);
  const cmpGenderMap = cmpYr ? getGenderMap(cmpYr) : null;
  const ageCounts = getAgeCounts(yr);
  const cmpAgeCounts = cmpYr ? getAgeCounts(cmpYr) : null;
  const natMap = getNatMap(yr);
  const cmpNatMap = cmpYr ? getNatMap(cmpYr) : null;

  // shared opts
  const pieTooltip = (total, cmpTotal, cmpMap, labels) => ({
    callbacks:{
      label: ctx => {
        const val = ctx.parsed;
        const pct = total ? (val/total*100).toFixed(1) : 0;
        let line = ` ${year}: ${fmtNum(val)} (${pct}%)`;
        return line;
      }
    }
  });

  function doughnutOpts(total){
    return {
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{position:'right', labels:{color:'#EAF2EC', font:{size:11}, padding:8, boxWidth:12}},
        tooltip:{callbacks:{label: ctx=>` ${fmtNum(ctx.parsed)} (${total?(ctx.parsed/total*100).toFixed(1):0}%)`}}
      }
    };
  }

  function groupedBarOpts(xlabel, totals){
    return {
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:true, labels:{color:'#EAF2EC', font:{size:11}, padding:8, boxWidth:12}},
        tooltip:{callbacks:{label: ctx=>{
          const val = ctx.parsed.y;
          const total = totals[ctx.datasetIndex] || 1;
          const pct = (val/total*100).toFixed(1);
          return ` ${ctx.dataset.label}: ${fmtNum(val)} (${pct}%)`;
        }}}
      },
      scales:{
        x:{ticks:{color:'#EAF2EC', font:{size:11}}, grid:{display:false}},
        y:{ticks:{color:'#8FA999'}, grid:{color:'rgba(143,169,153,0.15)'}}
      }
    };
  }

  // ---- Gender chart ----
  const gLabels = ['Male','Female','Unknown'].filter(k=>genderMap[k]>0 || (cmpGenderMap&&cmpGenderMap[k]>0));
  const gVals = gLabels.map(k=>genderMap[k]||0);
  const gTotal = gVals.reduce((a,b)=>a+b,0);
  const gCtx = document.getElementById('genderPieChart_'+brandKey);
  destroyChart('genderPieChart_'+brandKey);
  if(!hasCompare){
    chartInstances['genderPieChart_'+brandKey] = new Chart(gCtx, {
      type:'doughnut',
      data:{labels:gLabels, datasets:[{data:gVals, backgroundColor:PIE_COLORS, borderWidth:1, borderColor:'#142319'}]},
      options: doughnutOpts(gTotal)
    });
  } else {
    const cmpGVals = gLabels.map(k=>cmpGenderMap[k]||0);
    const cmpGTotal = cmpGVals.reduce((a,b)=>a+b,0);
    chartInstances['genderPieChart_'+brandKey] = new Chart(gCtx, {
      type:'bar',
      data:{labels:gLabels, datasets:[
        {label:String(year), data:gVals, backgroundColor:'#378ADD', borderRadius:4},
        {label:String(compareYear), data:cmpGVals, backgroundColor:'#4A6657', borderRadius:4}
      ]},
      options: groupedBarOpts('Gender', [gTotal, cmpGTotal])
    });
  }

  // ---- Age chart (filtered by gender) ----
  const ageGenderEl = document.getElementById('ageGenderFilter_'+brandKey);
  const ageGender = ageGenderEl ? ageGenderEl.value : 'all';
  const filterAgeGender = r => ageGender==='all' || (r['Sex']||'').toString().trim().toUpperCase()===ageGender;
  const ageYr = yr.filter(filterAgeGender);
  const ageCmpYr = cmpYr ? cmpYr.filter(filterAgeGender) : null;
  const ageCountsFiltered = getAgeCounts(ageYr);
  const cmpAgeCountsFiltered = ageCmpYr ? getAgeCounts(ageCmpYr) : null;

  const aLabels = AGE_RANGES.map(r=>r.label).filter((_,i)=>ageCountsFiltered[i]>0||(cmpAgeCountsFiltered&&cmpAgeCountsFiltered[i]>0));
  const aIdxs = AGE_RANGES.map((_,i)=>i).filter(i=>ageCountsFiltered[i]>0||(cmpAgeCountsFiltered&&cmpAgeCountsFiltered[i]>0));
  const aVals = aIdxs.map(i=>ageCountsFiltered[i]);
  const aTotal = aVals.reduce((a,b)=>a+b,0);
  const aCtx = document.getElementById('agePieChart_'+brandKey);
  destroyChart('agePieChart_'+brandKey);
  if(!hasCompare){
    chartInstances['agePieChart_'+brandKey] = new Chart(aCtx, {
      type:'doughnut',
      data:{labels:aLabels, datasets:[{data:aVals, backgroundColor:PIE_COLORS, borderWidth:1, borderColor:'#142319'}]},
      options: doughnutOpts(aTotal)
    });
  } else {
    const cmpAVals = aIdxs.map(i=>(cmpAgeCountsFiltered||[])[i]||0);
    const cmpATotal = cmpAVals.reduce((a,b)=>a+b,0);
    chartInstances['agePieChart_'+brandKey] = new Chart(aCtx, {
      type:'bar',
      data:{labels:aLabels, datasets:[
        {label:String(year), data:aVals, backgroundColor:'#378ADD', borderRadius:4},
        {label:String(compareYear), data:cmpAVals, backgroundColor:'#4A6657', borderRadius:4}
      ]},
      options: groupedBarOpts('Age', [aTotal, cmpATotal])
    });
  }

  // ---- Nationality chart ----
  const sortedNat = Object.entries(natMap).sort((a,b)=>b[1]-a[1]);
  const top10 = sortedNat.slice(0,10);
  const othersSum = sortedNat.slice(10).reduce((a,b)=>a+b[1],0);
  const natLabels = top10.map(e=>e[0]);
  const natVals = top10.map(e=>e[1]);
  if(othersSum>0){ natLabels.push('Others'); natVals.push(othersSum); }
  const natTotal = natVals.reduce((a,b)=>a+b,0);

  const nCtx = document.getElementById('nationalityChart_'+brandKey);
  destroyChart('nationalityChart_'+brandKey);

  const natDatasets = [{label:String(year), data:natVals, backgroundColor:'#378ADD', borderRadius:4}];
  if(hasCompare){
    const cmpNatVals = natLabels.map(l=>{
      if(l==='Others'){
        const cmpSorted = Object.entries(cmpNatMap).sort((a,b)=>b[1]-a[1]);
        return cmpSorted.slice(10).reduce((a,b)=>a+b[1],0);
      }
      return cmpNatMap[l]||0;
    });
    natDatasets.push({label:String(compareYear), data:cmpNatVals, backgroundColor:'#4A6657', borderRadius:4});

  const cmpNatTotal = hasCompare ? Object.values(cmpNatMap).reduce((a,b)=>a+b,0) : 0;
  const natTotals = [natTotal, cmpNatTotal];

  chartInstances['nationalityChart_'+brandKey] = new Chart(nCtx, {
    type:'bar',
    data:{labels:natLabels, datasets:natDatasets},
    options:{
      indexAxis:'y',
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:hasCompare, labels:{color:'#EAF2EC', font:{size:11}, boxWidth:12}},
        tooltip:{callbacks:{label: ctx=>{
          const total = natTotals[ctx.datasetIndex] || natTotal;
          return ` ${ctx.dataset.label}: ${fmtNum(ctx.parsed.x)} (${total?(ctx.parsed.x/total*100).toFixed(1):0}%)`;
        }}}
      },
      scales:{
        x:{ticks:{color:'#8FA999', callback:v=>fmtNum(v)}, grid:{color:'rgba(143,169,153,0.15)'}},
        y:{ticks:{color:'#EAF2EC', font:{size:11}}, grid:{display:false}}
      }
    }
  });

  // ---- State chart (filtered by age group) ----
  function getStateMap(data){
    const m = {};
    data.forEach(r=>{
      const s = (r['State']||'').toString().trim();
      if(!s) return;
      m[s] = (m[s]||0) + (parseInt(r['Ticket Count'])||1);
    });
    return m;
  }

  const stateAgeEl = document.getElementById('stateAgeFilter_'+brandKey);
  const stateAge = stateAgeEl ? stateAgeEl.value : 'all';
  const filterStateAge = r => {
    if(stateAge==='all') return true;
    const age = parseInt(r['Age']);
    if(isNaN(age)) return false;
    const range = AGE_RANGES.find(ar=>ar.label===stateAge);
    if(!range) return false;
    return age>=range.min && age<=range.max;
  };
  const stateYr = viewRows.filter(filterStateAge);
  const cmpStateYr = (compareYear && cmpRows) ? cmpRows.filter(filterStateAge) : null;

  const stateMap = getStateMap(stateYr);
  const cmpStateMap = cmpStateYr ? getStateMap(cmpStateYr) : null;
  const sortedState = Object.entries(stateMap).sort((a,b)=>b[1]-a[1]);
  const top10State = sortedState.slice(0,10);
  const stateLabels = top10State.map(e=>e[0]);
  const stateVals = top10State.map(e=>e[1]);
  const stateTotal = stateVals.reduce((a,b)=>a+b,0);
  const sCtx = document.getElementById('stateChart_'+brandKey);
  if(!sCtx) return;
  destroyChart('stateChart_'+brandKey);

  const stateDatasets = [{label:String(year), data:stateVals, backgroundColor:'#6FCF97', borderRadius:4}];
  if(hasCompare && cmpStateMap){
    const cmpStateVals = stateLabels.map(l=>cmpStateMap[l]||0);
    stateDatasets.push({label:String(compareYear), data:cmpStateVals, backgroundColor:'#4A6657', borderRadius:4});
  }
  const cmpStateTotal = hasCompare && cmpStateMap ? Object.values(cmpStateMap).reduce((a,b)=>a+b,0) : 0;
  const stateTotals = [stateTotal, cmpStateTotal];

  chartInstances['stateChart_'+brandKey] = new Chart(sCtx, {
    type:'bar',
    data:{labels:stateLabels, datasets:stateDatasets},
    options:{
      indexAxis:'y',
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:hasCompare, labels:{color:'#EAF2EC', font:{size:11}, boxWidth:12}},
        tooltip:{callbacks:{label: ctx=>{
          const total = stateTotals[ctx.datasetIndex] || stateTotal;
          return ` ${ctx.dataset.label}: ${fmtNum(ctx.parsed.x)} (${total?(ctx.parsed.x/total*100).toFixed(1):0}%)`;
        }}}
      },
      scales:{
        x:{ticks:{color:'#8FA999', callback:v=>fmtNum(v)}, grid:{color:'rgba(143,169,153,0.15)'}},
        y:{ticks:{color:'#EAF2EC', font:{size:11}}, grid:{display:false}}
      }
    }
  });
}

/* ---- Cohort retention ---- */

function renderCohortTable(brandKey, rows, country){
  const filteredRows = country && country!=='all' ? rows.filter(r=>r['Country']===country) : rows;
  const emailKey = 'Unique Email ID';
  const hasEmail = filteredRows.some(r => r[emailKey]);
  const container = document.getElementById('cohortTable_'+brandKey);
  if(!hasEmail){
    container.innerHTML = '<p style="color:var(--text-dim); font-size:13px;">No "Unique Email ID" column found in this data.</p>';
    return;
  }
  const firstSeen = {};
  const emailsByYear = {};
  filteredRows.forEach(r=>{
    const email = r[emailKey];
    const yr = parseInt(getEventYear(r));
    if(!email || !yr) return;
    if(!firstSeen[email] || yr < firstSeen[email]) firstSeen[email] = yr;
    if(!emailsByYear[yr]) emailsByYear[yr] = new Set();
    emailsByYear[yr].add(email);
  });
  const allYears = Object.keys(emailsByYear).map(Number).sort((a,b)=>a-b);
  const maxOffset = allYears.length - 1;

  let html = '<div style="overflow-x:auto; -webkit-overflow-scrolling:touch;"><table style="min-width:500px;"><thead><tr><th>Cohort</th><th>Total that year</th><th>New (cohort)</th>';
  for(let off=1; off<=maxOffset; off++){
    html += `<th>Year ${off+1}</th>`;
  }
  html += '</tr></thead><tbody>';

  allYears.forEach(cy=>{
    const totalThatYear = emailsByYear[cy] ? emailsByYear[cy].size : 0;
    const cohortEmails = [...(emailsByYear[cy]||[])].filter(e => firstSeen[e] === cy);
    const size = cohortEmails.length;
    if(totalThatYear === 0) return;
    html += `<tr><td>${cy}</td><td style="text-align:right">${fmtNum(totalThatYear)}</td><td style="text-align:right">${fmtNum(size)}</td>`;
    for(let off=1; off<=maxOffset; off++){
      const targetYear = cy + off;
      if(!allYears.includes(targetYear)){
        html += '<td style="text-align:right; color:var(--text-dim);">—</td>';
        continue;
      }
      const retained = size > 0 ? cohortEmails.filter(e => emailsByYear[targetYear].has(e)).length : 0;
      const p = size ? (retained/size*100) : 0;
      html += `<td style="text-align:right">${fmtNum(retained)} <span style="color:var(--text-dim); font-size:11px;">(${p.toFixed(0)}%)</span></td>`;
    }
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  html += '<p style="font-size:11px; color:var(--text-dim); margin-top:8px; font-style:italic;">* Based on identified Unique Email ID only. Tickets with blank email IDs are excluded.</p>';
  container.innerHTML = html;
}

/* ---- Charts ---- */

// MYT = UTC+8. Parse dates as MYT midnight to avoid cross-day shifts.
function parseMYT(dateStr){
  if(!dateStr) return new Date(NaN);
  const s = dateStr.toString().trim();
  // DD-Mon-YY - HH:MM:SS (e.g. 14-Mar-24 - 22:37:23)
  const dMonYY = s.match(/^(\d{1,2})-([A-Za-z]{3})-(\d{2})\s*[-\s]*\d{2}:\d{2}:\d{2}/);
  if(dMonYY){
    const months = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
    const day = parseInt(dMonYY[1]);
    const mon = months[dMonYY[2]];
    const yr = 2000 + parseInt(dMonYY[3]);
    if(mon !== undefined) return new Date(`${yr}-${String(mon+1).padStart(2,'0')}-${String(day).padStart(2,'0')}T00:00:00+08:00`);
  }
  // ISO timestamp (e.g. 2026-05-31T16:00:00.000Z) → shift to MYT date midnight
  if(s.includes('T') || s.endsWith('Z')){
    const dt = new Date(s);
    if(isNaN(dt)) return new Date(NaN);
    const mytMs = dt.getTime() + 8*60*60*1000;
    const mytDate = new Date(mytMs).toISOString().slice(0,10);
    return new Date(`${mytDate}T00:00:00+08:00`);
  }
  // DD/MM/YYYY
  const dmy = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(dmy) return new Date(`${dmy[3]}-${dmy[2].padStart(2,'0')}-${dmy[1].padStart(2,'0')}T00:00:00+08:00`);
  // YYYY-MM-DD
  const ymd = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(ymd) return new Date(`${s}T00:00:00+08:00`);
  // fallback
  return new Date(s);
}
function fmtMYT(date){
  if(!date || isNaN(date)) return '';
  // shift to MYT (+8h) then format manually — avoids Intl timeZone option which breaks on iOS WebKit
  const mytMs = date.getTime() + 8*60*60*1000;
  const d = new Date(mytMs);
  const day = d.getUTCDate();
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${day} ${months[d.getUTCMonth()]} ${d.getUTCFullYear()}`;
}
function fmtMYTTime(){
  const mytMs = Date.now() + 8*60*60*1000;
  const d = new Date(mytMs);
  const h = String(d.getUTCHours()).padStart(2,'0');
  const m = String(d.getUTCMinutes()).padStart(2,'0');
  const s = String(d.getUTCSeconds()).padStart(2,'0');
  return `${h}:${m}:${s}`;
}
function dayKey(dateStr){ return parseMYT(dateStr); }

function buildDailySeries(rows, year, cat, ticketMode, brandKey, settings){
  ticketMode = ticketMode || 'reg';
  const yr = filteredByCategory(rows, cat); // rows already filtered by year+country
  const isOne = v => v===1 || v==='1' || v===true || Number(v)===1;

  // get multipliers from settings
  const mpt = settings && settings.membersPerTeam ? parseInt(settings.membersPerTeam)+1 : 3; // tsr team: captain + members
  const dm  = settings && settings.doublesMembers ? parseInt(settings.doublesMembers)+1 : 2;  // rl doubles
  const trm = settings && settings.teamRelayMembers ? parseInt(settings.teamRelayMembers)+1 : 4; // rl relay

  function ticketsForRow(r){
    if(ticketMode !== 'regunreg') return parseInt(r['Ticket Count'])||0;
    // reg+unreg: count by captain × team size, or individual ticket count
    const cat = r['Category'];
    if(brandKey==='tsr' && cat==='Team'){
      return isOne(r['Team Captain']) ? mpt : 0;
    }
    if(brandKey==='rl' && cat==='Doubles'){
      return isOne(r['Doubles Captain']) ? dm : 0;
    }
    if(brandKey==='rl' && cat==='Team Relay'){
      return isOne(r['Team Relay Captain']) ? trm : 0;
    }
    // individuals/singles/TMR: use ticket count as normal
    return parseInt(r['Ticket Count'])||0;
  }

  const dated = yr.map(r=>({date:dayKey(r['Date cleaned (DD/MM/YYYY)']), tickets:ticketsForRow(r)})).filter(r=>!isNaN(r.date));
  dated.sort((a,b)=>a.date-b.date);
  const start = dated.length?dated[0].date:new Date();
  const byDay = {};
  const dayToDate = {};
  let lastDayWithData = 0;
  dated.forEach(r=>{
    const d = Math.round((r.date-start)/(1000*60*60*24));
    byDay[d] = (byDay[d]||0)+r.tickets;
    if(!dayToDate[d]) dayToDate[d] = r.date;
    if(d > lastDayWithData) lastDayWithData = d;
  });
  return {byDay, lastDayWithData, start, dayToDate};
}

function chartOpts(){
  return {responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
    plugins:{legend:{display:false}},
    scales:{x:{ticks:{maxTicksLimit:10,color:'#8FA999'},grid:{display:false}}, y:{ticks:{color:'#8FA999'},grid:{color:'rgba(143,169,153,0.15)'}}}};
}

// Auto-detect phase boundaries from raw data Phase column
function getPhaseOffsets(rows, year, startDate){
  const yr = rows.filter(r=>getEventYear(r)===String(year));
  const phaseFirstDate = {};
  yr.forEach(r=>{
    const phase = r['Phase']; if(!phase) return;
    const d = parseMYT(r['Date cleaned (DD/MM/YYYY)']);
    if(isNaN(d)) return;
    if(!phaseFirstDate[phase] || d < phaseFirstDate[phase]) phaseFirstDate[phase] = d;
  });
  return Object.entries(phaseFirstDate)
    .map(([name, date])=>({name, dayOffset: Math.round((date-startDate)/(1000*60*60*24))}))
    .filter(p=>p.dayOffset >= 0)
    .sort((a,b)=>a.dayOffset-b.dayOffset);
}

function buildPhaseAnnotations(rows, years, seriesList){
  const annotations = [];
  const yearColors = ['rgba(55,138,221,0.6)', 'rgba(74,102,87,0.5)'];
  const labelColors = ['#378ADD', '#8FA999'];

  years.forEach((year, yi)=>{
    const s = seriesList[yi];
    if(!s || !s.start) return;
    const phases = getPhaseOffsets(rows, year, s.start);
    phases.forEach(({name, dayOffset})=>{
      if(dayOffset > s.lastDayWithData + 5) return;
      annotations.push({
        type:'line',
        xMin: dayOffset,
        xMax: dayOffset,
        borderColor: yearColors[yi],
        borderWidth: 1.5,
        borderDash: [4,3],
        label:{
          display: false,
          content: `${name} (${year})`,
          backgroundColor: 'rgba(14,26,20,0.9)',
          color: labelColors[yi],
          font:{size:10, weight:'600'},
          padding:{x:6, y:3},
          position: 'end'
        },
        enter({element}){ element.label.options.display = true; return true; },
        leave({element}){ element.label.options.display = false; return true; }
      });
    });
  });
  return annotations;
}

function renderPhaseLabelsRow(brandKey, rows, years, seriesList, maxDay){
  const container = document.getElementById('phaseLabels_'+brandKey);
  if(!container) return;
  const labelColors = ['#378ADD','#8FA999'];
  let html = '';

  years.forEach((year, yi)=>{
    const s = seriesList[yi];
    if(!s || !s.start) return;
    const phases = getPhaseOffsets(rows, year, s.start);
    phases.forEach(({name, dayOffset})=>{
      if(dayOffset > maxDay + 5) return;
      const pct = maxDay > 0 ? (dayOffset / maxDay * 100) : 0;
      // offset second year labels slightly to avoid overlap
      const topOffset = yi === 0 ? 0 : 10;
      html += `<span style="position:absolute; left:${Math.min(pct,95)}%; transform:translateX(-50%); color:${labelColors[yi]}; font-weight:600; white-space:nowrap; top:${topOffset}px; font-size:9px;">${name}</span>`;
    });
  });
  container.innerHTML = html;
}

function renderPaceChart(brandKey, rows, year, settings){
  const yr = rows.filter(r=>getEventYear(r)===String(year));
  const dated = yr.map(r=>({date:dayKey(r['Date cleaned (DD/MM/YYYY)']), tickets:parseInt(r['Ticket Count'])||0})).filter(r=>!isNaN(r.date));
  dated.sort((a,b)=>a.date-b.date);
  const start = dated.length?dated[0].date:new Date();
  const byDay = {};
  const dayToDate = {};
  let lastDayWithData = 0;
  dated.forEach(r=>{
    const d = Math.round((r.date-start)/(1000*60*60*24));
    byDay[d] = (byDay[d]||0)+r.tickets;
    if(!dayToDate[d]) dayToDate[d] = r.date;
    if(d>lastDayWithData) lastDayWithData = d;
  });

  // calculate total unregistered gap to add to actual line
  const metrics = computeBrandYearMetrics(yr, year, brandKey, settings);
  const unregGap = metrics.unreg || 0;

  const phases = (settings.phases||[]).filter(p=>p.name && p.start && p.end && p.target)
    .map(p=>({...p, startOffset:Math.round((parseMYT(p.start)-start)/(1000*60*60*24)), endOffset:Math.round((parseMYT(p.end)-start)/(1000*60*60*24))}))
    .sort((a,b)=>a.startOffset-b.startOffset);

  const maxDay = Math.max(1, lastDayWithData, ...phases.map(p=>p.endOffset));

  let cum = 0;
  const actual = [];
  for(let d=0; d<=maxDay; d++){
    if(d > lastDayWithData){ actual.push(null); continue; }
    cum += (byDay[d]||0);
    // add unregistered gap on the last day with data so the line reflects reg+unreg total
    actual.push(d === lastDayWithData ? cum + unregGap : cum);
  }

  const target = new Array(maxDay+1).fill(null);
  let runningTarget = 0;
  phases.forEach(phase=>{
    const phaseDays = Math.max(1, phase.endOffset - phase.startOffset + 1);
    const dailyRate = parseFloat(phase.target)/phaseDays;
    for(let d=phase.startOffset; d<=phase.endOffset && d<=maxDay; d++){
      runningTarget += dailyRate;
      target[d] = Math.round(runningTarget);
    }
  });

  const labels = actual.map((_,i)=>"Day "+i);
  const id = 'paceChart_'+brandKey;
  destroyChart(id);

  // build phase annotations from raw data
  const pacePhaseAnnotations = buildPhaseAnnotations(rows, [year], [{start, lastDayWithData, byDay, dayToDate}]);

  chartInstances[id] = new Chart(document.getElementById(id), {
    type:'line',
    data:{labels, datasets:[
      {label:'Actual', data:actual, borderColor:'#378ADD', backgroundColor:'transparent', borderWidth:2.5, pointRadius:0, tension:0.15, spanGaps:false},
      {label:'Target pace', data:target, borderColor:'#FF6A3D', backgroundColor:'rgba(232,105,74,0.18)', borderWidth:2, borderDash:[6,4], pointRadius:0, tension:0, fill:'-1', spanGaps:false}
    ]},
    options:{
      responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        annotation: pacePhaseAnnotations.length ? {annotations: pacePhaseAnnotations} : undefined,
        tooltip:{
          callbacks:{
            title: items=>{
              const d = items[0].dataIndex;
              const dt = dayToDate[d];
              const dateStr = dt ? fmtMYT(dt) : '';
              return `Day ${d}${dateStr ? ' — ' + dateStr : ''}`;
            },
            afterBody: function(items){
              const d = items[0].dataIndex;
              const a = actual[d], t = target[d];
              if(a===null || t===null) return '';
              const gap = a - t;
              const sign = gap >= 0 ? '+' : '';
              const lbl = gap >= 0 ? 'overachieving' : 'behind target';
              return 'Gap: '+sign+fmtNum(gap)+' ('+lbl+')';
            }
          }
        }
      },
      scales:{x:{ticks:{maxTicksLimit:10,color:'#8FA999'},grid:{display:false}}, y:{ticks:{color:'#8FA999'},grid:{color:'rgba(143,169,153,0.15)'}}}
    }
  });
}

  const el = document.getElementById(statusId);
  try{
    await fetch(BRANDS[brandKey].apiUrl, {method:"POST", body: JSON.stringify({type:"settings", data:settings})});
    el.textContent = `Saved ✓ (${country} ${year})`;
  }catch(e){
    el.textContent = "Failed to save";
  }
  setTimeout(()=>el.textContent="", 2500);
  renderSRBody(brandKey);
}

loadAll();
</script>
</body>
</html>
