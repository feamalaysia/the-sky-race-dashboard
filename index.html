<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresh Events — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
<style>
  :root{
    --bg:#0E1A14; --panel:#142319; --panel-2:#192B1E; --line:#27402F;
    --text:#EAF2EC; --text-dim:#8FA999; --accent:#FF6A3D; --accent2:#378ADD;
    --good:#6FCF97; --bad:#E8694A; --muted:#4A6657;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter','Segoe UI',Helvetica,Arial,sans-serif;}
  .app{padding:28px 40px 64px; max-width:1280px; margin:0 auto; padding-top:20px;}
  @media (max-width:680px){
    .app{padding:18px 16px 48px; padding-top:16px;}
    .target-grid{grid-template-columns:1fr;}
    .filter-row{gap:8px;}
  }

  .nav{display:flex; align-items:center; gap:6px; padding:14px 40px; border-bottom:1px solid var(--line); background:var(--bg); position:sticky; top:0; z-index:100; flex-wrap:wrap;}
  .nav-links{display:flex; gap:6px; align-items:center; flex:1;}
  .hamburger{display:none; background:transparent; border:none; color:var(--text); font-size:22px; cursor:pointer; padding:4px 8px; margin-left:auto;}
  .nav-mobile-menu{display:none; flex-direction:column; gap:4px; padding:8px 0 4px; width:100%; border-top:1px solid var(--line); margin-top:8px;}
  .nav-mobile-menu.open{display:flex;}
  @media (max-width:600px){
    .nav{padding:12px 16px; flex-wrap:wrap;}
    .nav-links{display:none;}
    .hamburger{display:block;}
  }
  .nav-logo{height:32px; width:auto; object-fit:contain; margin-right:8px;}
  .nav-btn{background:transparent; border:none; color:var(--text-dim); padding:8px 14px; border-radius:7px; font-size:13.5px; font-weight:600; cursor:pointer;}
  .nav-btn.active{background:var(--panel); color:var(--text);}
  .nav-btn:hover:not(.active){color:var(--text);}
  .brand-logo{height:80px; width:auto; max-width:320px; object-fit:contain; margin-bottom:16px; display:block;}
  .page-header{margin-bottom:4px;}

  h1{font-size:26px;margin:0 0 4px;}
  h2.page-title{font-size:22px;margin:0 0 4px;}
  .sub{color:var(--text-dim);font-size:13px;margin-bottom:22px;}
  .status{font-size:12.5px;color:var(--text-dim);margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}

  button{background:var(--accent);color:#0E1A14;border:none;padding:8px 16px;border-radius:6px;font-weight:600;font-size:13px;cursor:pointer;}
  button:hover{opacity:0.9;}
  button.secondary{background:var(--panel-2);color:var(--text);border:1px solid var(--line);}
  select{background:var(--panel-2);color:var(--text);border:1px solid var(--line);padding:7px 10px;border-radius:6px;font-size:13px;}

  .metrics{display:grid;grid-template-columns:repeat(4, 1fr);gap:12px;margin-bottom:22px;}
  @media (max-width:900px){ .metrics{grid-template-columns:repeat(2,1fr);} }
  @media (max-width:480px){ .metrics{grid-template-columns:1fr;} }
  .metric{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px 18px;}
  .metric .label{font-size:10.5px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-dim);margin-bottom:6px;}
  .metric .val{font-size:22px;font-weight:700;}
  .metric .delta{font-size:11.5px;margin-top:5px;font-weight:600;}
  .delta.up{color:var(--good);} .delta.down{color:var(--bad);} .delta.flat{color:var(--text-dim);}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:20px 24px;margin-bottom:20px;}
  .panel h2{font-size:13px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-dim);margin:0 0 16px;}
  .panel-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px;}
  .panel-head h2{margin:0;}

  .brand-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  @media (max-width:700px){ .brand-grid{grid-template-columns:1fr;} }
  .overview-brand-row{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:0; align-items:stretch;}
  @media (max-width:700px){ .overview-brand-row{grid-template-columns:1fr;} }
  .overview-yoy-panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px 22px; display:flex; flex-direction:column;}
  .brand-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px 22px; display:flex; flex-direction:column;}
  .brand-card.empty{opacity:0.55;}
  .brand-card h3{margin:0 0 2px; font-size:17px;}
  .brand-card .yr{font-size:12px;color:var(--text-dim);margin-bottom:14px;}
  .brand-metric-row{display:flex; justify-content:space-between; align-items:baseline; padding:7px 0; border-bottom:1px solid var(--line); gap:12px;}
  .brand-metric-row:last-child{border-bottom:none;}
  .brand-metric-row .bl{font-size:12px; color:var(--text-dim); flex-shrink:0;}
  .brand-metric-row .bvals{display:flex; align-items:baseline; gap:5px; flex-wrap:nowrap;}
  .brand-metric-row .bv{font-size:13.5px; font-weight:700; white-space:nowrap;}
  .brand-metric-row .bd{font-size:10.5px; font-weight:600; white-space:nowrap;}
  .brand-metric-row .bprev{font-size:10.5px; color:var(--text-dim); font-weight:400; white-space:nowrap;}
  .nodata-tag{display:inline-block; font-size:10.5px; background:var(--panel-2); color:var(--text-dim); padding:3px 9px; border-radius:20px; margin-top:6px;}

  details.settings{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:20px;}
  details.settings summary{cursor:pointer; padding:16px 22px; font-size:13.5px; font-weight:600; list-style:none; display:flex; align-items:center; gap:8px;}
  details.settings summary::-webkit-details-marker{display:none;}
  details.settings summary:before{content:"▸"; transition:transform 0.15s; color:var(--accent);}
  details.settings[open] summary:before{transform:rotate(90deg);}
  .settings-body{padding:0 22px 20px;}
  .target-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:14px;}
  label{font-size:12px;color:var(--text-dim);display:block;margin-bottom:4px;}
  input{width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--text);padding:8px 10px;border-radius:6px;font-size:13.5px;}
  input[type="date"]{color-scheme:dark;}
  input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:0.7;cursor:pointer;}
  .save-row{display:flex;align-items:center;gap:10px;margin-top:6px;}
  #saveStatusTSR, #saveStatusRL{font-size:12px;color:var(--good);}
  .req-note{font-size:11.5px; color:var(--accent); margin:2px 0 10px;}

  .phase-def-row{display:grid; grid-template-columns:1.2fr 1fr 1fr 0.8fr auto; gap:8px; align-items:end; margin-bottom:8px; padding-bottom:12px; border-bottom:1px solid var(--line);}
  .phase-def-row input{font-size:13px;}
  @media (max-width:680px){
    .phase-def-row{grid-template-columns:1fr 1fr; grid-template-areas:"name name" "start end" "target target" "remove remove"; margin-bottom:14px; padding-bottom:14px;}
    .phase-def-row > div:nth-child(1){grid-area:name;}
    .phase-def-row > div:nth-child(2){grid-area:start;}
    .phase-def-row > div:nth-child(3){grid-area:end;}
    .phase-def-row > div:nth-child(4){grid-area:target;}
    .phase-def-row .rm-phase{grid-area:remove; width:100%;}
  }
  .rm-phase{background:var(--panel-2); color:var(--bad); border:1px solid var(--line); padding:7px 10px; font-size:12px;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:right;font-size:10.5px;text-transform:uppercase;color:var(--text-dim);padding:0 0 8px;border-bottom:1px solid var(--line);}
  th:first-child,td:first-child{text-align:left;}
  td{padding:9px 0;border-bottom:1px solid var(--line);}
  tr:last-child td{border-bottom:none;}
  .table-scroll{overflow-x:auto; -webkit-overflow-scrolling:touch;}
  @media (max-width:680px){ table{font-size:11px;} th{padding:0 3px 6px; font-size:9.5px;} td{padding:6px 3px;} }

  .chart-wrap{position:relative;height:300px;}
  .filter-row{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
  @media(max-width:600px){ .panel-head{flex-direction:column; align-items:flex-start;} .filter-row{width:100%;} }
  .legend-row{display:flex; gap:18px; font-size:12px; color:var(--text-dim); margin-bottom:10px; flex-wrap:wrap;}
  .legend-row span{display:inline-flex; align-items:center; gap:6px;}
  .dot{width:9px;height:9px;border-radius:2px;display:inline-block;}
</style>
</head>
<body>
<div class="app">

  <div class="nav">
    <div style="font-size:15px; font-weight:700; letter-spacing:0.02em; margin-right:12px; white-space:nowrap;">Fresh Events Dashboard</div>
    <div class="nav-links">
      <button class="nav-btn active" id="navOverview" onclick="goPage('overview')">Overview</button>
      <button class="nav-btn" id="navTSR" onclick="goPage('tsr')">The Sky Race</button>
      <button class="nav-btn" id="navRL" onclick="goPage('rl')">REDLINE</button>
      <button class="nav-btn" id="navTMR" onclick="goPage('tmr')">The Music Run</button>
    </div>
    <button class="hamburger" id="hamburgerBtn" onclick="toggleMobileMenu()" aria-label="Menu">☰</button>
    <div class="nav-mobile-menu" id="mobileMenu">
      <button class="nav-btn active" id="navOverviewM" onclick="goPage('overview');toggleMobileMenu()">Overview</button>
      <button class="nav-btn" id="navTSRM" onclick="goPage('tsr');toggleMobileMenu()">The Sky Race</button>
      <button class="nav-btn" id="navRLM" onclick="goPage('rl');toggleMobileMenu()">REDLINE</button>
      <button class="nav-btn" id="navTMRM" onclick="goPage('tmr');toggleMobileMenu()">The Music Run</button>
    </div>
  </div>

  <!-- ===================== OVERVIEW PAGE ===================== -->
  <div id="page-overview">
    <img src="images/FE_logo_Master_White%20BG_RGB_white%20text.png" alt="Fresh Events" style="height:80px; width:auto; object-fit:contain; display:block; margin-top:24px; margin-bottom:8px;">
    <div class="sub">All brands · most recent event year vs previous year</div>
    <div class="status"><span id="statusLineOverview">Loading…</span><button class="secondary" onclick="loadAll()">Refresh</button></div>
    <div id="brandGrid"></div>
  </div>

  <!-- ===================== TEMPLATE: rendered for both TSR and RL ===================== -->
  <div id="page-tsr" style="display:none;"></div>
  <div id="page-rl" style="display:none;"></div>
  <div id="page-tmr" style="display:none;"></div>

</div>

<script>
/* =================== BRAND CONFIG =================== */
const BRANDS = {
  tsr: {
    key:'tsr', label:'The Sky Race', eventNameMatch:'sky race',
    apiUrl: "https://script.google.com/macros/s/AKfycbzX9-ViY02n6L1LbwRh3IBvRnu0GBi99MPiqOb_TDQe0kVZbn2tQBnlBVx33YQ4Rptt/exec",
    tsr2Url: "https://script.google.com/macros/s/AKfycbyCoGFEqT8mspKSxQKT0uNk04LEW3DCCAnhhCtmJl7tq-6rJwZVDYQ4gHDPn-LBTqJB/exec",
    schema:'tsr'
  },
  rl: {
    key:'rl', label:'REDLINE', eventNameMatch:'redline',
    apiUrl: "https://script.google.com/macros/s/AKfycbzL0dPJSh_ZQVl3hrYv5XhVigWnsfKog86Nbj3c83m0O4EbH4nJRAVBOSU1pq55LjXWwg/exec",
    tsr2Url: "https://script.google.com/macros/s/AKfycby1PqLIIdXGtHFdUAo0UJVOyFsfFAJTpMB4DS0I2L_XJYdxhxQS6tsyC2GpQfgT1koj/exec",
    schema:'rl'
  },
  tmr: {
    key:'tmr', label:'The Music Run', eventNameMatch:'music run',
    apiUrl: "https://script.google.com/macros/s/AKfycbzD1znvnMzpqvKM9zPZPoStVE0xb9vEhhmHojp8xdn3B1wNLninkGQgwIxLwLaz3CNvHg/exec",
    tsr2Url: "https://script.google.com/macros/s/AKfycbwib7NxOhZoJBQZukpX1owvrpHlRjDhzBUsXcOFf4iuRWscCQioVUc3evvGc6b8MfLK/exec",
    schema:'tmr'
  }
};
const phaseOrder = ["Save the Date","Save the date","Lead Gen","Pre-Sale","Loyalty","Super Early Bird","Early Bird","Regular","Waitlist"];
const PALETTE = ["#378ADD","#4A6657","#FF6A3D","#C77DFF","#6FCF97","#E8694A"];

// Extract event year from Event Name (e.g. "REDLINE 2027" → "2027")
// Falls back to Year column if no year found in Event Name
function getEventYear(r){
  const name = (r['Event Name']||'').toString();
  const m = name.match(/\b(20\d{2})\b/);
  if(m) return m[1];
  return String(r['Year']||'');
}

let brandData = {}; // {tsr:{rows:[...], settings:{...}}, rl:{rows:[...], settings:{...}}}
let chartInstances = {}; // keyed by canvas id

function fmtNum(n){ return Math.round(n).toLocaleString(); }
function fmtMoney(n){ return 'RM' + Math.round(n).toLocaleString(); }

function toggleMobileMenu(){
  const menu = document.getElementById('mobileMenu');
  menu.classList.toggle('open');
}

function goPage(p){
  ['overview','tsr','rl','tmr'].forEach(page=>{
    document.getElementById('page-'+page).style.display = p===page ? '' : 'none';
  });
  ['navOverview','navTSR','navRL','navTMR'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.classList.toggle('active', id.toLowerCase().includes(p==='overview'?'overview':p));
  });
  ['navOverviewM','navTSRM','navRLM','navTMRM'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.classList.toggle('active', id.toLowerCase().includes(p==='overview'?'overview':p));
  });
  // render brand page on tab click - always re-render if data available
  if(p!=='overview' && brandData[p]){
    renderBrandPage(p);
  }
}

async function fetchJSON(url, opts){ const res = await fetch(url, opts); return await res.json(); }

async function loadAll(){
  document.getElementById('statusLineOverview').textContent = "Loading live data…";
  
  const brandKeys = Object.keys(BRANDS);
  await Promise.all(brandKeys.map(async key=>{
    const brand = BRANDS[key];
    let rows = [], settings = {eventDate:null, year:null, phases:[]};
    try{ rows = await fetchJSON(brand.apiUrl + "?action=data"); }catch(e){ rows = []; }
    try{
      const s = await fetchJSON(brand.apiUrl + "?action=getSettings");
      if(s && s.phases!==undefined) settings = s;
    }catch(e){}
    brandData[key] = {rows, settings};
    // load TSR2 supplementary data if available
    if(brand.tsr2Url){
      try{ brandData[key].tsr2rows = await fetchJSON(brand.tsr2Url); }catch(e){ brandData[key].tsr2rows = []; }
    }
  }));

  const totalRows = Object.values(brandData).reduce((a,b)=>a+b.rows.length,0);
  const myt = fmtMYTTime();
  document.getElementById('statusLineOverview').textContent = "Live — " + totalRows + " total records · updated " + myt + " MYT";

  renderOverview();
  // after data loads, re-render any already-visited brand pages with fresh data
  if(pageInitialized['tsr']) renderBrandPage('tsr');
  if(pageInitialized['rl']) renderBrandPage('rl');
  if(pageInitialized['tmr']) renderBrandPage('tmr');
}

/* =================== TSR2 SECTIONS =================== */
function getTSR2Year(r){
  const name = (r['Event Name']||'').toString();
  const m = name.match(/\b(20\d{2})\b/);
  return m ? m[1] : '';
}

function renderTSR2Sections(brandKey, year, compareYear, country){
  const allRows = (brandData[brandKey].tsr2rows||[]);
  const tsr1Rows = brandData[brandKey].rows || [];

  const yr2 = allRows.filter(r=>getTSR2Year(r)===String(year) && (country==='all'||r['Country']===country));
  const cmpYr2 = compareYear ? allRows.filter(r=>getTSR2Year(r)===String(compareYear) && (country==='all'||r['Country']===country)) : null;
  const allTsr1 = tsr1Rows.filter(r=>country==='all'||r['Country']===country);

  renderTrafficSection(brandKey, yr2, cmpYr2, allTsr1, year, compareYear);
  renderEDMSection(brandKey, yr2, year, compareYear, allRows);
  renderSocialSection(brandKey, yr2, year, compareYear, allRows);
}

// ---- TRAFFIC ----
function renderTrafficSection(brandKey, rows, cmpRows, tsr1Rows, year, compareYear){
  // overview metrics with compare delta
  const totalSessions = rows.reduce((a,r)=>a+(parseFloat(r['Sessions'])||0),0);
  const totalUsers = rows.reduce((a,r)=>a+(parseFloat(r['Users'])||0),0);
  const cmpSessions = cmpRows ? cmpRows.reduce((a,r)=>a+(parseFloat(r['Sessions'])||0),0) : null;
  const cmpUsers = cmpRows ? cmpRows.reduce((a,r)=>a+(parseFloat(r['Users'])||0),0) : null;

  function deltaSpanLocal(curr, prev){
    if(prev===null||prev===undefined) return '';
    const pct = prev!==0?((curr-prev)/prev*100):null;
    const up = curr>=prev;
    return `<div class="delta ${up?'up':'down'}">${up?'▲':'▼'} vs ${compareYear}: ${fmtNum(prev)}${pct!==null?' ('+(pct>=0?'+':'')+pct.toFixed(1)+'%)':''}</div>`;
  }

  const metricsEl = document.getElementById('trafficMetrics_'+brandKey);
  if(metricsEl) metricsEl.innerHTML =
    `<div class="metric"><div class="label">Total Sessions</div><div class="val">${fmtNum(totalSessions)}</div>${deltaSpanLocal(totalSessions,cmpSessions)}</div>` +
    `<div class="metric"><div class="label">Total Users</div><div class="val">${fmtNum(totalUsers)}</div>${deltaSpanLocal(totalUsers,cmpUsers)}</div>`;

  // build daily series for sessions
  function buildSessionSeries(rows){
    const byDay={}, byDayUsers={}, dayToDate={};
    const dated = rows.map(r=>({date:parseMYT(r['Date cleaned (DD/MM/YYYY)']), sessions:parseFloat(r['Sessions'])||0, users:parseFloat(r['Users'])||0})).filter(r=>!isNaN(r.date));
    dated.sort((a,b)=>a.date-b.date);
    if(!dated.length) return {byDay:{}, byDayUsers:{}, lastDayWithData:0, start:new Date(), dayToDate:{}};
    const start = dated[0].date;
    let last=0;
    dated.forEach(r=>{
      const d=Math.round((r.date-start)/(1000*60*60*24));
      byDay[d]=(byDay[d]||0)+r.sessions;
      byDayUsers[d]=(byDayUsers[d]||0)+r.users;
      if(!dayToDate[d]) dayToDate[d]=r.date;
      if(d>last) last=d;
    });
    return {byDay, byDayUsers, lastDayWithData:last, start, dayToDate};
  }

  // build phase annotations from TSR2 data (day-based x-axis) — returns array for chartOptsWithAnnotations
  function buildDayPhaseAnnotations(rows, seriesStart){
    const phaseByDay = {};
    rows.forEach(r=>{
      const d = parseMYT(r['Date cleaned (DD/MM/YYYY)']);
      if(isNaN(d)) return;
      const day = Math.round((d - seriesStart)/(1000*60*60*24));
      const phase = (r['Phase']||'').toString().trim();
      if(!phaseByDay[day]) phaseByDay[day] = phase;
    });
    const result = [];
    let lastPhase = null;
    Object.keys(phaseByDay).sort((a,b)=>Number(a)-Number(b)).forEach(day=>{
      const phase = phaseByDay[day];
      if(phase && phase !== lastPhase){
        result.push({
          type:'line', xMin:Number(day), xMax:Number(day),
          borderColor:'rgba(255,106,61,0.6)', borderWidth:1.5, borderDash:[4,3],
          label:{content:phase, display:false, position:'end', color:'#FF6A3D', font:{size:9}, backgroundColor:'rgba(14,26,20,0.88)', padding:3},
          enter({element}){ element.label.options.display=true; return true; },
          leave({element}){ element.label.options.display=false; return true; }
        });
      }
      lastPhase = phase;
    });
    return result;
  }

  const s1 = buildSessionSeries(rows);
  const s2 = cmpRows ? buildSessionSeries(cmpRows) : null;
  const maxDay = Math.max(1, s1.lastDayWithData, s2?s2.lastDayWithData:0);
  const labels = Array.from({length:maxDay+1},(_,i)=>'Day '+i);
  const years = [year, compareYear].filter(Boolean);
  const series = [s1, s2].filter(Boolean);

  // legend
  const legendEl = document.getElementById('legendTraffic_'+brandKey);
  if(legendEl) legendEl.innerHTML = years.map((y,i)=>`<span><span class="dot" style="background:${PALETTE[i]}"></span>${y}</span>`).join('');

  // traffic chart — phase lines from TSR2 data
  const trafficCtx = document.getElementById('trafficChart_'+brandKey);
  destroyChart('trafficChart_'+brandKey);
  const trafficAnnotations = s1.start ? buildDayPhaseAnnotations(rows, s1.start) : [];
  const trafficOpts = chartOptsWithAnnotations(trafficAnnotations);
  trafficOpts.plugins = trafficOpts.plugins || {};
  trafficOpts.plugins.tooltip = {callbacks:{title:items=>{
    const d=items[0].dataIndex;
    const dates=series.map(s=>s.dayToDate[d]).filter(Boolean);
    const strs=[...new Set(dates.map(dt=>fmtMYT(dt)))];
    return `Day ${d}${strs.length?' — '+strs.join(' / '):''}`;
  }}};
  chartInstances['trafficChart_'+brandKey] = new Chart(trafficCtx, {
    type:'line',
    data:{labels, datasets: series.map((s,i)=>({
      label:String(years[i]),
      data: labels.map((_,d)=>d>s.lastDayWithData?null:(s.byDay[d]||0)),
      borderColor:PALETTE[i], backgroundColor:'transparent', borderWidth:2.5, pointRadius:0, tension:0.15, spanGaps:false
    }))},
    options: trafficOpts
  });

  // CR chart: match by actual date, hide 0% points, trim x-axis to first data day
  const crCtx = document.getElementById('crChart_'+brandKey);
  destroyChart('crChart_'+brandKey);

  const tsr1ByDate = {};
  tsr1Rows.filter(r=>getEventYear(r)===String(year)).forEach(r=>{
    const d = parseMYT(r['Date cleaned (DD/MM/YYYY)']);
    if(isNaN(d)) return;
    const key = new Date(d.getTime()+8*60*60*1000).toISOString().slice(0,10);
    tsr1ByDate[key] = (tsr1ByDate[key]||0) + (parseInt(r['Ticket Count'])||0);
  });

  // compare year TSR1
  const cmpTsr1ByDate = {};
  tsr1Rows.filter(r=>getEventYear(r)===String(compareYear)).forEach(r=>{
    const d = parseMYT(r['Date cleaned (DD/MM/YYYY)']);
    if(isNaN(d)) return;
    const key = new Date(d.getTime()+8*60*60*1000).toISOString().slice(0,10);
    cmpTsr1ByDate[key] = (cmpTsr1ByDate[key]||0) + (parseInt(r['Ticket Count'])||0);
  });

  const tsr2ByDate = {};
  rows.forEach(r=>{
    const d = parseMYT(r['Date cleaned (DD/MM/YYYY)']);
    if(isNaN(d)) return;
    const key = new Date(d.getTime()+8*60*60*1000).toISOString().slice(0,10);
    tsr2ByDate[key] = (tsr2ByDate[key]||0) + (parseFloat(r['Users'])||0);
  });

  const cmpTsr2ByDate = {};
  if(cmpRows) cmpRows.forEach(r=>{
    const d = parseMYT(r['Date cleaned (DD/MM/YYYY)']);
    if(isNaN(d)) return;
    const key = new Date(d.getTime()+8*60*60*1000).toISOString().slice(0,10);
    cmpTsr2ByDate[key] = (cmpTsr2ByDate[key]||0) + (parseFloat(r['Users'])||0);
  });

  // build CR arrays - each year uses its OWN TSR2 day axis
  // crData uses s1.dayToDate (2026 TSR2 days), cmpCrData uses s2.dayToDate (2025 TSR2 days)
  const crData = labels.map((_,d)=>{
    if(d > s1.lastDayWithData) return null;
    const dt = s1.dayToDate[d];
    if(!dt) return null;
    const key = new Date(dt.getTime()+8*60*60*1000).toISOString().slice(0,10);
    const users = tsr2ByDate[key]||0;
    const tickets = tsr1ByDate[key]||0;
    if(users===0 || tickets===0) return null;
    return parseFloat(((tickets/users)*100).toFixed(2));
  });

  const cmpCrData = (s2 && compareYear) ? labels.map((_,d)=>{
    if(d > s2.lastDayWithData) return null;
    const dt = s2.dayToDate[d];  // 2025 TSR2's own Day 0
    if(!dt) return null;
    const key = new Date(dt.getTime()+8*60*60*1000).toISOString().slice(0,10);
    const users = cmpTsr2ByDate[key]||0;
    const tickets = cmpTsr1ByDate[key]||0;
    if(users===0 || tickets===0) return null;
    return parseFloat(((tickets/users)*100).toFixed(2));
  }) : null;

  console.log('[CR] 2026 non-null:', crData.filter(v=>v!==null).length);
  console.log('[CR] 2025 non-null:', cmpCrData ? cmpCrData.filter(v=>v!==null).length : 'N/A');

  // trim x-axis to first day with CR data in current year only
  // (compare year may have data at different day offsets)
  const firstCrDay = crData.findIndex(v=>v!==null);
  const trimFrom = firstCrDay > 0 ? firstCrDay : 0;
  const crLabels = labels.slice(trimFrom);
  const crDataTrimmed = crData.slice(trimFrom);
  const cmpCrDataTrimmed = cmpCrData ? cmpCrData.slice(trimFrom) : null;

  const legendCREl = document.getElementById('legendCR_'+brandKey);
  if(legendCREl) legendCREl.innerHTML = years.map((y,i)=>`<span><span class="dot" style="background:${PALETTE[i]}"></span>${y} CR%</span>`).join('');

  const crAnnotations = s1.start ? buildDayPhaseAnnotations(rows, s1.start).filter(a=>a.xMin >= firstCrDay) : [];
  // adjust annotation x values after trim
  crAnnotations.forEach(a=>{ a.xMin -= firstCrDay; a.xMax -= firstCrDay; });
  const crOpts = chartOptsWithAnnotations(crAnnotations);
  crOpts.plugins = crOpts.plugins||{};
  crOpts.plugins.tooltip = {callbacks:{
    title:items=>{
      const d = items[0].dataIndex + firstCrDay;
      const dt1 = s1.dayToDate[d];
      const dt2 = s2 ? s2.dayToDate[d] : null;
      const dates = [dt1, dt2].filter(Boolean).map(dt=>fmtMYT(dt));
      const unique = [...new Set(dates)];
      return `Day ${d}${unique.length ? ' — ' + unique.join(' / ') : ''}`;
    },
    label:ctx=>` CR: ${ctx.parsed.y!==null?ctx.parsed.y.toFixed(2)+'%':'no data'}`
  }};
  crOpts.plugins.legend = {display: !!compareYear, labels:{color:'#EAF2EC', font:{size:11}, boxWidth:12}};
  crOpts.scales = crOpts.scales||{};
  crOpts.scales.x = {ticks:{color:'#8FA999'}, grid:{display:false}};
  crOpts.scales.y = {ticks:{color:'#8FA999', callback:v=>v+'%'}, grid:{color:'rgba(143,169,153,0.15)'}};

  const crDatasets = [{label:`${year} CR%`, data:crDataTrimmed, borderColor:PALETTE[0], backgroundColor:'rgba(55,138,221,0.1)', borderWidth:2, pointRadius:2, tension:0.2, fill:false, spanGaps:false}];
  if(cmpCrDataTrimmed) crDatasets.push({label:`${compareYear} CR%`, data:cmpCrDataTrimmed, borderColor:PALETTE[1], backgroundColor:'transparent', borderWidth:2, pointRadius:2, tension:0.2, fill:false, spanGaps:false});

  chartInstances['crChart_'+brandKey] = new Chart(crCtx, {
    type:'line',
    data:{labels:crLabels, datasets:crDatasets},
    options: crOpts
  });
}

// ---- EDM ----
function removeOutliers(arr){
  if(arr.length < 4) return arr;
  const sorted = [...arr].sort((a,b)=>a-b);
  const q1 = sorted[Math.floor(sorted.length*0.25)];
  const q3 = sorted[Math.floor(sorted.length*0.75)];
  const iqr = q3 - q1;
  return arr.filter(v=>v>=q1-1.5*iqr && v<=q3+1.5*iqr);
}

function renderEDMSection(brandKey, rows, year, compareYear, allRows){
  const edm = rows.filter(r=>(r['[EDM] Content Name']||'').toString().trim());
  const cmpEdm = compareYear ? allRows.filter(r=>getTSR2Year(r)===String(compareYear) && (r['[EDM] Content Name']||'').toString().trim()) : null;

  // rates are already 0-1 decimals (e.g. 0.38 = 38%), NOT percentages
  const totalContent = edm.length;
  const totalDeliveries = edm.reduce((a,r)=>a+(parseFloat(r['[EDM] Total Deliveries'])||0),0);
  const openRates = edm.map(r=>parseFloat(r['[EDM] Open rate'])||0).filter(v=>v>0);
  const clickRates = edm.map(r=>parseFloat(r['[EDM] Click rate'])||0).filter(v=>v>0);
  const cleanOpen = removeOutliers(openRates);
  const cleanClick = removeOutliers(clickRates);
  const avgOpen = cleanOpen.length ? cleanOpen.reduce((a,b)=>a+b,0)/cleanOpen.length : 0;
  const avgClick = cleanClick.length ? cleanClick.reduce((a,b)=>a+b,0)/cleanClick.length : 0;

  const cmpContent = cmpEdm ? cmpEdm.length : null;
  const cmpDeliveries = cmpEdm ? cmpEdm.reduce((a,r)=>a+(parseFloat(r['[EDM] Total Deliveries'])||0),0) : null;
  const cmpOpenRates = cmpEdm ? removeOutliers(cmpEdm.map(r=>parseFloat(r['[EDM] Open rate'])||0).filter(v=>v>0)) : null;
  const cmpClickRates = cmpEdm ? removeOutliers(cmpEdm.map(r=>parseFloat(r['[EDM] Click rate'])||0).filter(v=>v>0)) : null;
  const cmpAvgOpen = cmpOpenRates&&cmpOpenRates.length ? cmpOpenRates.reduce((a,b)=>a+b,0)/cmpOpenRates.length : null;
  const cmpAvgClick = cmpClickRates&&cmpClickRates.length ? cmpClickRates.reduce((a,b)=>a+b,0)/cmpClickRates.length : null;

  function deltaLine(curr, prev, fmt){ if(prev===null) return ''; const up=curr>=prev; return `<div class="delta ${up?'up':'down'}">${up?'▲':'▼'} ${compareYear}: ${fmt(prev)}</div>`; }

  const metricsEl = document.getElementById('edmMetrics_'+brandKey);
  if(metricsEl) metricsEl.innerHTML =
    `<div class="metric"><div class="label">Total EDM Campaigns</div><div class="val">${fmtNum(totalContent)}</div>${deltaLine(totalContent,cmpContent,fmtNum)}</div>` +
    `<div class="metric"><div class="label">Total Deliveries</div><div class="val">${fmtNum(totalDeliveries)}</div>${deltaLine(totalDeliveries,cmpDeliveries,fmtNum)}</div>` +
    `<div class="metric"><div class="label">Avg Open Rate <span style="font-size:10px;opacity:0.6;">(outliers removed)</span></div><div class="val">${(avgOpen*100).toFixed(1)}%</div>${deltaLine(avgOpen,cmpAvgOpen,v=>(v*100).toFixed(1)+'%')}</div>` +
    `<div class="metric"><div class="label">Avg Click Rate <span style="font-size:10px;opacity:0.6;">(outliers removed)</span></div><div class="val">${(avgClick*100).toFixed(1)}%</div>${deltaLine(avgClick,cmpAvgClick,v=>(v*100).toFixed(1)+'%')}</div>`;

  // chart — rates are 0-1, multiply by 100 for display
  const names = edm.map(r=>(r['[EDM] Content Name']||'').toString().trim());
  const shortNames = names.map(n=>n.length>25?n.substring(0,25)+'…':n);
  const deliveries = edm.map(r=>parseFloat(r['[EDM] Total Deliveries'])||0);
  const opens = edm.map(r=>(parseFloat(r['[EDM] Open rate'])||0)*100);
  const clicks = edm.map(r=>(parseFloat(r['[EDM] Click rate'])||0)*100);
  function buildContentPhaseAnnotations(dataRows){
    const annotations = {};
    let lastPhase = null;
    dataRows.forEach((r,i)=>{
      const phase = r['Phase']||'';
      if(phase && phase !== lastPhase){
        annotations['phase_'+i] = {
          type:'line', scaleID:'x', value:i===0 ? -0.5 : i-0.5,
          borderColor:'rgba(255,106,61,0.6)', borderWidth:1.5, borderDash:[4,3],
          label:{content:phase, display:false, position:'start', yAdjust:-6, color:'#FF6A3D', font:{size:9}, backgroundColor:'rgba(14,26,20,0.88)', padding:3},
          enter({element}){ element.label.options.display=true; return true; },
          leave({element}){ element.label.options.display=false; return true; }
        };
      }
      lastPhase = phase;
    });
    return annotations;
  }

  const edmCtx = document.getElementById('edmChart_'+brandKey);
  destroyChart('edmChart_'+brandKey);
  chartInstances['edmChart_'+brandKey] = new Chart(edmCtx, {
    data:{labels:shortNames, datasets:[
      {type:'bar', label:'Deliveries', data:deliveries, backgroundColor:'rgba(55,138,221,0.7)', borderRadius:3, yAxisID:'yDel', order:2},
      {type:'line', label:'Open Rate', data:opens, borderColor:'#6FCF97', backgroundColor:'transparent', borderWidth:2, pointRadius:3, yAxisID:'yRate', order:1, tension:0.2},
      {type:'line', label:'Click Rate', data:clicks, borderColor:'#FF6A3D', backgroundColor:'transparent', borderWidth:2, pointRadius:3, yAxisID:'yRate', order:1, tension:0.2}
    ]},
    options:{responsive:true, maintainAspectRatio:false,
      layout:{padding:{top:30}},
      plugins:{
        annotation:{annotations: buildContentPhaseAnnotations(edm)},
        legend:{display:true, position:'top', align:'center', labels:{color:'#EAF2EC', font:{size:11}, boxWidth:12, padding:16}},
        tooltip:{callbacks:{
          title: items => names[items[0].dataIndex] || shortNames[items[0].dataIndex],
          label: ctx => {
            if(ctx.dataset.yAxisID==='yRate') return ` ${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)}%`;
            return ` Deliveries: ${fmtNum(ctx.parsed.y)}`;
          }
        }}
      },
      scales:{
        x:{ticks:{color:'#8FA999', maxRotation:45, font:{size:10}}, grid:{display:false}},
        yDel:{position:'left', ticks:{color:'#378ADD', callback:v=>fmtNum(v)}, grid:{color:'rgba(143,169,153,0.15)'}, title:{display:true, text:'Deliveries', color:'#378ADD', font:{size:10}}},
        yRate:{position:'right', ticks:{color:'#6FCF97', callback:v=>v.toFixed(1)+'%'}, grid:{display:false}, title:{display:true, text:'Rate %', color:'#6FCF97', font:{size:10}}}
      }
    }
  });

  // top 3 by open rate (outlier-safe)
  const top3 = [...edm].filter(r=>parseFloat(r['[EDM] Open rate'])||0).sort((a,b)=>(parseFloat(b['[EDM] Open rate'])||0)-(parseFloat(a['[EDM] Open rate'])||0)).slice(0,3);
  const top3El = document.getElementById('edmTop3_'+brandKey);
  if(top3El) top3El.innerHTML = `<h2>Top 3 EDM by Open Rate</h2><div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px;">` +
    top3.map((r,i)=>`<div class="metric" style="margin:0;"><div class="label">#${i+1} ${(r['[EDM] Content Name']||'').toString().trim()}</div>
      <div class="val">${((parseFloat(r['[EDM] Open rate'])||0)*100).toFixed(1)}% open</div>
      <div style="font-size:12px; color:var(--text-dim);">${fmtNum(parseFloat(r['[EDM] Total Deliveries'])||0)} delivered · ${((parseFloat(r['[EDM] Click rate'])||0)*100).toFixed(1)}% clicks</div>
      <div style="font-size:11px; color:var(--text-dim);">${r['Phase']||''}</div>
    </div>`).join('') + '</div>';
}

function computeBrandYearMetrics(rows, year, brandKey, settings){
  const yr = rows.filter(r => getEventYear(r) === String(year));
  const regTickets = yr.reduce((a,r)=>a+(parseInt(r['Ticket Count'])||0),0);
  const regRev = yr.reduce((a,r)=>a+(parseFloat(r['Registration Rev'])||0),0);
  const prodRev = yr.reduce((a,r)=>a+(parseFloat(r['Products Rev'])||0),0);
  const totalRev = regRev + prodRev;

  let unreg = 0;
  const isOne = v => v===1 || v==='1' || v===true || Number(v)===1;
  if(brandKey === 'tsr'){    const mpt = settings && settings.membersPerTeam ? parseInt(settings.membersPerTeam) : 2;
    const teamRows = yr.filter(r => r['Category']==='Team');
    const teamsFormed = teamRows.filter(r => isOne(r['Team Captain'])).length;
    const registeredTeamMembers = teamRows.filter(r => isOne(r['Team Member'])).length;
    unreg = Math.max(0, teamsFormed*mpt - registeredTeamMembers);
  } else if(brandKey === 'rl'){
    const dm = settings && settings.doublesMembers ? parseInt(settings.doublesMembers) : 1;
    const trm = settings && settings.teamRelayMembers ? parseInt(settings.teamRelayMembers) : 3;
    const doublesRows = yr.filter(r => r['Category']==='Doubles');
    const doublesTeams = doublesRows.filter(r => isOne(r['Doubles Captain'])).length;
    const doublesRegMembers = doublesRows.filter(r => isOne(r['Doubles Member'])).length;
    const unregDoubles = Math.max(0, doublesTeams*dm - doublesRegMembers);

    const relayRows = yr.filter(r => r['Category']==='Team Relay');
    const relayTeams = relayRows.filter(r => isOne(r['Team Relay Captain'])).length;
    const relayRegMembers = relayRows.filter(r => isOne(r['Team Relay Member'])).length;
    const unregRelay = Math.max(0, relayTeams*trm - relayRegMembers);

    unreg = unregDoubles + unregRelay;
  }
  const totalTicketsRegUnreg = regTickets + unreg;
  return {regTickets, totalTicketsRegUnreg, regRev, prodRev, totalRev, unreg};
}

function deltaSpan(curr, prev){
  if(prev === null || prev === undefined || prev === 0 || curr===null) return '<span class="bd" style="color:var(--text-dim)">—</span>';
  const d = (curr-prev)/prev*100;
  const color = d>=0 ? 'var(--good)' : 'var(--bad)';
  return '<span class="bd" style="color:'+color+'">'+(d>=0?'▲':'▼')+' '+Math.abs(d).toFixed(0)+'%</span>';
}

function brandRowsFor(brandKey, countryVal){
  const data = brandData[brandKey];
  if(!data) return [];
  let rows = data.rows;
  if(countryVal && countryVal!=='all') rows = rows.filter(r=>r['Country']===countryVal);
  return rows;
}

function populateCountryFilter(selectEl, rows){
  const countries = [...new Set(rows.map(r=>r['Country']).filter(Boolean))].sort();
  const prevVal = selectEl.value;
  selectEl.innerHTML = countries.map(c=>`<option value="${c}">${c}</option>`).join('');
  if(prevVal && countries.includes(prevVal)){
    selectEl.value = prevVal;
  } else if(countries.includes('Malaysia')){
    selectEl.value = 'Malaysia';
  } else if(countries.length){
    selectEl.value = countries[0];
  }
}

function renderOverview(){
  const brandList = [
    {key:'tsr', label:'The Sky Race'},
    {key:'rl', label:'REDLINE'},
    {key:'tmr', label:'The Music Run'},
    {key:'dua', label:'DUA'}
  ];

  const grid = document.getElementById('brandGrid');
  grid.innerHTML = "";
  brandList.forEach(b=>{
    const data = brandData[b.key];
    if(!data || data.rows.length === 0){
      grid.innerHTML += `<div class="overview-brand-row"><div class="brand-card empty"><h3>${b.label}</h3><span class="nodata-tag">No data yet</span></div><div></div></div>`;
      return;
    }

    const countries = [...new Set(data.rows.map(r=>r['Country']).filter(Boolean))].sort();
    const defaultCountry = countries.includes('Malaysia') ? 'Malaysia' : (countries[0]||'');
    const countryId = `overviewCountry_${b.key}`;
    const existingEl = document.getElementById(countryId);
    const selectedCountry = (existingEl && countries.includes(existingEl.value)) ? existingEl.value : defaultCountry;
    const countryOpts = countries.map(c=>`<option value="${c}"${c===selectedCountry?' selected':''}>${c}</option>`).join('');

    const filteredRows = data.rows.filter(r=>r['Country']===selectedCountry);
    const years = [...new Set(data.rows.map(r=>getEventYear(r)).filter(Boolean))].sort();
    const latestYear = years[years.length-1];
    const prevYear = years.length>1 ? years[years.length-2] : null;

    const currRows = filteredRows.filter(r=>getEventYear(r)===String(latestYear));
    const prevRows = prevYear ? filteredRows.filter(r=>getEventYear(r)===String(prevYear)) : null;

    // compute event status for overview
    function getEventStatusBadge(settings, country, year){
      const phaseKey = `phases_${country}_${year}`;
      const phases = (settings[phaseKey] || settings.phases || []).filter(p=>p.end);
      if(!phases.length) return '';
      const lastEnd = parseMYT(phases.sort((a,b)=>parseMYT(a.end)-parseMYT(b.end))[phases.length-1].end);
      const nowMs = Date.now() + 8*60*60*1000;
      const todayMYT = parseMYT(new Date(nowMs).toISOString().slice(0,10));
      const ended = todayMYT >= lastEnd;
      const dLeft = Math.ceil((lastEnd - todayMYT)/(1000*60*60*24));
      const daysText = (!ended && dLeft > 0) ? `<span style="font-size:11px;color:var(--text-dim);margin-left:4px;">${dLeft} days left</span>` : '';
      return ended
        ? `<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:rgba(143,169,153,0.2);color:var(--text-dim);">⚫ Completed</span>`
        : `<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:rgba(111,207,151,0.15);color:var(--good);">🟢 Ongoing</span>${daysText}`;
    }

    const statusBadge = getEventStatusBadge(data.settings||{}, selectedCountry, latestYear);

    if(currRows.length === 0){
      grid.innerHTML += `<div style="margin-bottom:16px;">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
          <span style="font-size:13px; font-weight:600;">${b.label}</span>
          ${statusBadge}
          <select id="${countryId}" onchange="renderOverview()" style="font-size:12px; padding:3px 6px;">${countryOpts}</select>
        </div>
        <div class="brand-card"><span class="nodata-tag">No data for selected country</span></div>
      </div>`;
      return;
    }

    const curr = computeBrandYearMetrics(currRows, latestYear, b.key, data.settings);
    const prev = prevRows && prevRows.length>0 ? computeBrandYearMetrics(prevRows, prevYear, b.key, data.settings) : null;

    function row(label, currVal, prevVal, fmt){
      const prevStr = (prevVal!==null && prevVal!==undefined) ? ` <span class="bprev">(${fmt(prevVal)})</span>` : '';
      return `<div class="brand-metric-row"><span class="bl">${label}</span><div class="bvals"><span class="bv">${fmt(currVal)}</span>${deltaSpan(currVal, prevVal)}${prevStr}</div></div>`;
    }

    grid.innerHTML += `<div style="margin-bottom:16px;">
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
        <span style="font-size:13px; font-weight:600;">${b.label}</span>
        ${statusBadge}
        <select id="${countryId}" onchange="renderOverview()" style="font-size:12px; padding:3px 6px;">${countryOpts}</select>
      </div>
      <div class="overview-brand-row">
        <div class="brand-card">
          <div class="yr" style="margin-bottom:10px;">Event year ${latestYear}${prevYear?' vs '+prevYear:' (no prior year)'}</div>
          ${row('Tickets sold (reg+unreg)', curr.totalTicketsRegUnreg, prev?prev.totalTicketsRegUnreg:null, fmtNum)}
          ${row('Registered tickets', curr.regTickets, prev?prev.regTickets:null, fmtNum)}
          ${row('Total revenue', curr.totalRev, prev?prev.totalRev:null, fmtMoney)}
          ${row('Ticket revenue', curr.regRev, prev?prev.regRev:null, fmtMoney)}
          ${row('Add-on revenue', curr.prodRev, prev?prev.prodRev:null, fmtMoney)}
        </div>
        <div class="overview-yoy-panel">
          <div style="font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-dim); margin-bottom:12px;">Year-on-Year — All Years</div>
          <div style="flex:1; position:relative; min-height:180px;"><canvas id="yoyChart_${b.key}"></canvas></div>
        </div>
      </div>
    </div>`;

    // render YOY chart after DOM is updated
    setTimeout(()=>renderYOYChart(b.key, filteredRows, years, data.settings), 0);
  });
}

function renderYOYChart(brandKey, rows, years, settings){
  const ctx = document.getElementById('yoyChart_'+brandKey);
  if(!ctx) return;
  destroyChart('yoyChart_'+brandKey);

  const revData = [], ticketData = [];
  years.forEach(yr=>{
    const yrRows = rows.filter(r=>getEventYear(r)===String(yr));
    const m = computeBrandYearMetrics(yrRows, yr, brandKey, settings);
    revData.push(m.totalRev);
    ticketData.push(m.totalTicketsRegUnreg);
  });

  chartInstances['yoyChart_'+brandKey] = new Chart(ctx, {
    type:'bar',
    data:{
      labels: years,
      datasets:[
        {
          label:'Total Revenue (RM)',
          data: revData,
          backgroundColor:'rgba(55,138,221,0.75)',
          borderRadius:4,
          yAxisID:'yRev',
          order:2
        },
        {
          label:'Total Tickets (Reg+Unreg)',
          data: ticketData,
          type:'line',
          borderColor:'#FF6A3D',
          backgroundColor:'rgba(255,106,61,0.15)',
          borderWidth:2,
          pointRadius:4,
          pointBackgroundColor:'#FF6A3D',
          fill:false,
          yAxisID:'yTickets',
          tension:0.3,
          order:1
        }
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index', intersect:false},
      plugins:{
        legend:{display:true, labels:{color:'#EAF2EC', font:{size:11}, boxWidth:12, padding:10}},
        tooltip:{callbacks:{
          label: ctx=>{
            if(ctx.dataset.yAxisID==='yRev') return ` Revenue: ${fmtMoney(ctx.parsed.y)}`;
            return ` Tickets: ${fmtNum(ctx.parsed.y)}`;
          }
        }}
      },
      scales:{
        x:{ticks:{color:'#EAF2EC', font:{size:12}}, grid:{display:false}},
        yRev:{
          position:'left',
          ticks:{color:'#378ADD', callback:v=>{ if(v>=1000000) return 'RM'+(v/1000000).toFixed(1)+'M'; if(v>=1000) return 'RM'+(v/1000).toFixed(0)+'K'; return 'RM'+v; }},
          grid:{color:'rgba(143,169,153,0.15)'},
          title:{display:true, text:'Revenue (RM)', color:'#378ADD', font:{size:10}}
        },
        yTickets:{
          position:'right',
          ticks:{color:'#FF6A3D', callback:v=>{ if(v>=1000) return (v/1000).toFixed(1)+'K'; return v; }},
          grid:{display:false},
          title:{display:true, text:'Tickets', color:'#FF6A3D', font:{size:10}}
        }
      }
    }
  });
}

  if(brandKey==='rl') return '<option value="all">All</option><option value="Singles">Singles</option><option value="Doubles">Doubles</option><option value="Team Relay">Team Relay</option>';
  return '<option value="all">All</option><option value="Individual">Individual</option>';
}

  document.getElementById('page-'+brandKey).innerHTML = brandPageHTML(brandKey);
  document.getElementById('yearFilter_'+brandKey).addEventListener('change', ()=>renderSRBody(brandKey));
  document.getElementById('compareYearFilter_'+brandKey).addEventListener('change', ()=>renderSRBody(brandKey));
  document.getElementById('countryFilter_'+brandKey).addEventListener('change', ()=>renderSRBody(brandKey));
  document.getElementById('countryFilter_'+brandKey).addEventListener('change', ()=>{
    const container = document.getElementById('phaseDefRows_'+brandKey);
    if(container) container._lastPhaseKey = null; // force reload
    renderSRBody(brandKey);
  });
  document.getElementById('compareCountryFilter_'+brandKey).addEventListener('change', ()=>renderSRBody(brandKey));
  document.getElementById('catFilter1_'+brandKey).addEventListener('change', ()=>renderSRBody(brandKey));
  document.getElementById('catFilter2_'+brandKey).addEventListener('change', ()=>renderSRBody(brandKey));
  document.getElementById('ticketFilter1_'+brandKey).addEventListener('change', ()=>renderSRBody(brandKey));
  document.getElementById('ticketFilter2_'+brandKey).addEventListener('change', ()=>renderSRBody(brandKey));
  document.getElementById('phaseTicketFilter_'+brandKey).addEventListener('change', ()=>renderSRBody(brandKey));
  document.getElementById('subEventDateFrom_'+brandKey).addEventListener('change', ()=>renderSRBody(brandKey));
  document.getElementById('subEventDateTo_'+brandKey).addEventListener('change', ()=>renderSRBody(brandKey));
  function reRenderAudience(){
    const allRows = srRowsFor(brandKey);
    const year = document.getElementById('yearFilter_'+brandKey).value;
    const compareYear = document.getElementById('compareYearFilter_'+brandKey).value;
    const country = document.getElementById('countryFilter_'+brandKey).value;
    const compareCountry = document.getElementById('compareCountryFilter_'+brandKey).value;
    function filterRows(yr, ctry){ return allRows.filter(r=>getEventYear(r)===String(yr)&&(ctry==='all'||r['Country']===ctry)); }
    const viewRows = filterRows(year, country);
    const cmpRows = compareYear ? filterRows(compareYear, compareCountry) : null;
    try{ renderAudienceProfile(brandKey, viewRows, cmpRows, year, compareYear); }catch(e){ console.error('renderAudienceProfile',e); }

  document.getElementById('audienceCatFilter_'+brandKey).addEventListener('change', reRenderAudience);
  document.getElementById('stateAgeFilter_'+brandKey).addEventListener('change', reRenderAudience);
  document.getElementById('ageGenderFilter_'+brandKey).addEventListener('change', reRenderAudience);
}

let pageInitialized = {tsr:false, rl:false, tmr:false};

function renderBrandPage(brandKey){
  if(!pageInitialized[brandKey]){
    initBrandPage(brandKey);
    pageInitialized[brandKey] = true;
  }
  const data = brandData[brandKey];
  if(!data) return;
  const mytBrand = fmtMYTTime();
  document.getElementById('statusLine_'+brandKey).textContent = "Live — " + data.rows.length + " records · updated " + mytBrand + " MYT";

  populateCountryFilter(document.getElementById('countryFilter_'+brandKey), data.rows);
  populateCountryFilter(document.getElementById('compareCountryFilter_'+brandKey), data.rows);
  populateYearFilters(brandKey);

  const s = data.settings;
  if(brandKey==='tsr'){
    const mptEl = document.getElementById('membersPerTeam_tsr');
    if(mptEl && mptEl.value === "" && s.membersPerTeam) mptEl.value = s.membersPerTeam;
  }
  if(brandKey==='rl'){
    const dmEl = document.getElementById('doublesMembers_rl');
    if(dmEl && dmEl.value === "" && s.doublesMembers) dmEl.value = s.doublesMembers;
    const trmEl = document.getElementById('teamRelayMembers_rl');
    if(trmEl && trmEl.value === "" && s.teamRelayMembers) trmEl.value = s.teamRelayMembers;
  }
  if(document.getElementById('phaseDefRows_'+brandKey).children.length === 0) renderPhaseDefRows(brandKey);

  renderSRBody(brandKey);
}

function srRowsFor(brandKey){
  const data = brandData[brandKey];
  if(!data) return [];
  return data.rows; // country filtering handled per-pair in renderSRBody
}

function populateYearFilters(brandKey){
  const rows = srRowsFor(brandKey);
  const years = [...new Set(rows.map(r=>getEventYear(r)))].sort();
  const yf = document.getElementById('yearFilter_'+brandKey);
  const cf = document.getElementById('compareYearFilter_'+brandKey);
  const prevYF = yf.value, prevCF = cf.value;
  yf.innerHTML = years.map(y=>`<option value="${y}">${y}</option>`).join('');
  cf.innerHTML = '<option value="">None</option>' + years.map(y=>`<option value="${y}">${y}</option>`).join('');
  yf.value = prevYF && years.includes(prevYF) ? prevYF : years[years.length-1];
  const defaultCompare = years.length>1 ? years[years.length-2] : "";
  cf.value = prevCF && years.includes(prevCF) ? prevCF : defaultCompare;
}

function isLatestYear(brandKey, year){
  const years = [...new Set(srRowsFor(brandKey).map(r=>getEventYear(r)))].sort();
  return String(year) === years[years.length-1];
}

function addPhaseDefRow(brandKey, name, start, end, target){
  const container = document.getElementById('phaseDefRows_'+brandKey);
  const row = document.createElement('div');
  row.className = 'phase-def-row';
  row.innerHTML = `
    <div><label>Phase name</label><input type="text" class="pd-name" value="${name}" placeholder="e.g. Early Bird"/></div>
    <div><label>Start date</label><input type="date" class="pd-start" value="${start}"/></div>
    <div><label>End date</label><input type="date" class="pd-end" value="${end}"/></div>
    <div><label>Ticket target</label><input type="number" class="pd-target" value="${target}" placeholder="e.g. 2000"/></div>
    <button type="button" class="rm-phase" onclick="this.parentElement.remove()">Remove</button>
  `;
  container.appendChild(row);
}

function renderPhaseDefRows(brandKey){
  const container = document.getElementById('phaseDefRows_'+brandKey);
  container.innerHTML = "";
  const phases = brandData[brandKey].settings.phases && brandData[brandKey].settings.phases.length ? brandData[brandKey].settings.phases : [{name:'',start:'',end:'',target:''}];
  phases.forEach(p=> addPhaseDefRow(brandKey, p.name||'', p.start||'', p.end||'', p.target||''));
}

function filteredByCategory(rows, cat){
  if(cat==='all') return rows;
  return rows.filter(r=>r['Category']===cat);
}

function renderSRBody(brandKey){
  const rows = srRowsFor(brandKey); // all rows, unfiltered by country
  if(rows.length===0) return;
  const year = document.getElementById('yearFilter_'+brandKey).value;
  const compareYear = document.getElementById('compareYearFilter_'+brandKey).value;
  const country = document.getElementById('countryFilter_'+brandKey).value;
  const compareCountry = document.getElementById('compareCountryFilter_'+brandKey).value;

  // filter rows by year+country for each view
  function filterRows(yr, ctry){
    return rows.filter(r=>getEventYear(r)===String(yr) && (ctry==='all'||r['Country']===ctry));
  }
  const viewRows = filterRows(year, country);
  const cmpRows = compareYear ? filterRows(compareYear, compareCountry) : null;
  const showSettings = isLatestYear(brandKey, year);
  document.getElementById('settingsPanel_'+brandKey).style.display = showSettings ? '' : 'none';
  document.getElementById('paceChartPanel_'+brandKey).style.display = showSettings ? '' : 'none';

  // load country+year specific phase settings
  const allSettings = brandData[brandKey].settings || {};
  const phaseKey = `phases_${country}_${year}`;
  const countryPhases = allSettings[phaseKey] || allSettings.phases || [];
  const settings = {...allSettings, phases: countryPhases};

  // load conversion rate for current country+year
  const convKey = `conv_${country}_${year}`;
  const convRate = allSettings[convKey] !== undefined ? allSettings[convKey] : null;
  const cmpConvKey = compareYear ? `conv_${compareCountry}_${compareYear}` : null;
  const cmpConvRate = cmpConvKey && allSettings[cmpConvKey] !== undefined ? allSettings[cmpConvKey] : null;

  // re-render phase def rows if country or year changed
  if(showSettings){
    const container = document.getElementById('phaseDefRows_'+brandKey);
    if(container._lastPhaseKey !== phaseKey){
      container._lastPhaseKey = phaseKey;
      container.innerHTML = '';
      if(countryPhases.length){
        countryPhases.forEach(p=>addPhaseDefRow(brandKey, p.name, p.start, p.end, p.target));
      } else {
        renderPhaseDefRows(brandKey);
      }
    }
  }
  const curr = computeBrandYearMetrics(viewRows, year, brandKey, settings);
  const cmp = (compareYear && cmpRows) ? computeBrandYearMetrics(cmpRows, compareYear, brandKey, settings) : null;
  const avgPriceCurr = curr.regTickets ? curr.totalRev/curr.regTickets : 0;
  const avgPriceCmp = cmp && cmp.regTickets ? cmp.totalRev/cmp.regTickets : null;

  let runRateNeeded = null;
  let totalTarget = 0;
  let targetAchieved = false;
  let saleEnded = false;
  // get last phase end date from settings
  const phasesWithEnd = (settings.phases||[]).filter(p=>p.end).sort((a,b)=>parseMYT(a.end)-parseMYT(b.end));
  const lastPhaseEnd = phasesWithEnd.length ? parseMYT(phasesWithEnd[phasesWithEnd.length-1].end) : null;

  // compute daysLeftVal from last phase end regardless of targets
  let daysLeftVal = null;
  if(showSettings && lastPhaseEnd){
    const nowUTCms = Date.now() + 8*60*60*1000;
    const todayStr = new Date(nowUTCms).toISOString().slice(0,10);
    const todayMYTQuick = parseMYT(todayStr);
    const dLeft = Math.ceil((lastPhaseEnd - todayMYTQuick)/(1000*60*60*24));
    daysLeftVal = dLeft > 0 ? dLeft : 0;
  }

  let shortBy = 0;
  if(showSettings && lastPhaseEnd){
    const phasesWithTarget = (settings.phases||[]).filter(p=>p.target);
    totalTarget = phasesWithTarget.reduce((a,p)=>a+(parseFloat(p.target)||0),0);
    if(totalTarget > 0){
      // "today" in MYT: offset UTC by +8 hours
      const nowUTC = new Date();
      const mytOffset = 8 * 60 * 60 * 1000;
      const nowMYTms = nowUTC.getTime() + mytOffset;
      const nowMYTDate = new Date(nowMYTms);
      const todayYMD = nowMYTDate.toISOString().slice(0,10);
      const todayMYT = parseMYT(todayYMD);
      saleEnded = todayMYT >= lastPhaseEnd;
      const daysLeft = Math.ceil((lastPhaseEnd-todayMYT)/(1000*60*60*24));
      daysLeftVal = saleEnded ? 0 : daysLeftVal;
      if(curr.totalTicketsRegUnreg >= totalTarget){
        targetAchieved = true;
        runRateNeeded = 0;
      } else if(saleEnded){
        shortBy = totalTarget - curr.totalTicketsRegUnreg;
      } else {
        runRateNeeded = Math.max(0,(totalTarget-curr.totalTicketsRegUnreg))/Math.max(1,daysLeft);
      }
    }
  }

  // total campaign days: first sale date → last phase end (if settings) or last data date
  let totalCampaignDays = null;
  if(viewRows.length > 0){
    const dates = viewRows.map(r=>parseMYT(r['Date cleaned (DD/MM/YYYY)'])).filter(d=>!isNaN(d));
    if(dates.length){
      const firstSaleDate = new Date(Math.min(...dates));
      const endDate = (showSettings && lastPhaseEnd) ? lastPhaseEnd : new Date(Math.max(...dates));
      totalCampaignDays = Math.round((endDate - firstSaleDate)/(1000*60*60*24));
    }
  }

  // compare year total days: first sale date → last available data date
  let cmpCampaignDays = null;
  if(compareYear && cmpRows && cmpRows.length > 0){
    const cmpDates = cmpRows.map(r=>parseMYT(r['Date cleaned (DD/MM/YYYY)'])).filter(d=>!isNaN(d));
    if(cmpDates.length){
      const cmpFirst = new Date(Math.min(...cmpDates));
      const cmpLast = new Date(Math.max(...cmpDates));
      cmpCampaignDays = Math.round((cmpLast - cmpFirst)/(1000*60*60*24));
    }
  }

  try{
    const pctToTarget = totalTarget > 0 ? Math.min(100, (curr.totalTicketsRegUnreg/totalTarget*100)) : null;
    const metricsEl = document.getElementById('metrics_'+brandKey);
    function card(label, val, cmpVal, fmt, noCompare){
      if(noCompare || !cmp){
        return `<div class="metric"><div class="label">${label}</div><div class="val">${fmt(val)}</div></div>`;
      }
      if(cmpVal===null || cmpVal===undefined){
        return `<div class="metric"><div class="label">${label}</div><div class="val">${fmt(val)}</div><div class="delta" style="color:var(--text-dim)">no data ${compareYear}</div></div>`;
      }
      const pctChange = cmpVal!==0 ? ((val-cmpVal)/cmpVal*100) : null;
      const up = val>=cmpVal;
      return `<div class="metric"><div class="label">${label}</div><div class="val">${fmt(val)}</div><div class="delta ${up?'up':'down'}">${up?'▲':'▼'} vs ${compareYear}: ${fmt(cmpVal)}${pctChange!==null?' ('+(pctChange>=0?'+':'')+pctChange.toFixed(1)+'%)':''}</div></div>`;
    }
    const progressCard = pctToTarget!==null ? `<div class="metric"><div class="label">% to target (reg+unreg)</div><div class="val">${pctToTarget.toFixed(1)}%</div><div style="background:var(--panel-2);border-radius:4px;height:8px;margin-top:8px;overflow:hidden;"><div style="height:100%;width:${pctToTarget}%;background:${pctToTarget>=100?'var(--good)':'var(--accent2)'};border-radius:4px;transition:width 0.4s;"></div></div><div style="font-size:11px;color:var(--text-dim);margin-top:4px;">${fmtNum(curr.totalTicketsRegUnreg)} / ${fmtNum(totalTarget)}</div></div>` : '';
    const runRateCard = showSettings ? `<div class="metric"><div class="label">${saleEnded && !targetAchieved ? 'Final result' : 'Target daily tickets'}</div><div class="val" style="color:${targetAchieved?'var(--good)':saleEnded?'var(--bad)':'var(--text)'}">${targetAchieved ? '🎉 Target achieved!' : saleEnded ? `Short by ${fmtNum(shortBy)}` : runRateNeeded!==null ? fmtNum(runRateNeeded)+'/day' : 'set phase targets'}</div></div>` : '';

    // projected final tickets based on last 14 days trend
    let projectedCard = '';
    if(showSettings && !saleEnded && daysLeftVal > 0){
      // build daily tickets for last 14 days
      const today14 = new Date(Date.now() + 8*60*60*1000);
      const cutoff14 = new Date(today14.getTime() - 14*24*60*60*1000);
      const last14Rows = viewRows.filter(r=>{
        const d = parseMYT(r['Date cleaned (DD/MM/YYYY)']);
        return !isNaN(d) && d >= cutoff14;
      });
      // compute total tickets in last 14 days using same reg+unreg logic
      const isOne = v => v===1||v==='1'||v===true||Number(v)===1;
      const mpt = settings.membersPerTeam ? parseInt(settings.membersPerTeam)+1 : 3;
      const dm = settings.doublesMembers ? parseInt(settings.doublesMembers)+1 : 2;
      const trm = settings.teamRelayMembers ? parseInt(settings.teamRelayMembers)+1 : 4;
      let tickets14 = 0;
      last14Rows.forEach(r=>{
        const cat = r['Category'];
        if(brandKey==='tsr' && cat==='Team') tickets14 += isOne(r['Team Captain']) ? mpt : 0;
        else if(brandKey==='rl' && cat==='Doubles') tickets14 += isOne(r['Doubles Captain']) ? dm : 0;
        else if(brandKey==='rl' && cat==='Team Relay') tickets14 += isOne(r['Team Relay Captain']) ? trm : 0;
        else tickets14 += parseInt(r['Ticket Count'])||0;
      });
      const avgDaily14 = tickets14 / 14;
      const projected = Math.round(curr.totalTicketsRegUnreg + avgDaily14 * daysLeftVal);
      const vsTarget = totalTarget > 0 ? ` (${projected >= totalTarget ? '+' : ''}${fmtNum(projected - totalTarget)} vs target)` : '';
      const projColor = totalTarget > 0 ? (projected >= totalTarget ? 'var(--good)' : 'var(--bad)') : 'var(--text)';

      // projected revenue: avg daily rev last 14 days × days left + current rev
      let rev14 = 0;
      last14Rows.forEach(r=>{ rev14 += (parseFloat(r['Registration Rev'])||0) + (parseFloat(r['Products Rev'])||0); });
      const avgDailyRev14 = rev14 / 14;
      const projectedRev = curr.totalRev + avgDailyRev14 * daysLeftVal;

      projectedCard = `<div class="metric"><div class="label">Projected (last 14 days trend)</div>
        <div class="val" style="color:${projColor}">${fmtNum(projected)} tickets</div>
        <div style="font-size:13px;font-weight:600;margin-top:4px;">${fmtMoney(Math.round(projectedRev))}</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:4px;">${fmtNum(Math.round(avgDaily14))}/day · ${fmtMoney(Math.round(avgDailyRev14))}/day avg${vsTarget}</div>

/* ---- Phase performance table ---- */

function computePhaseBreakdown(rows, year, brandKey, settings, ticketMode){
  ticketMode = ticketMode || 'reg';
  const isOne = v => v===1 || v==='1' || v===true || Number(v)===1;
  const mpt = settings && settings.membersPerTeam ? parseInt(settings.membersPerTeam)+1 : 3;
  const dm  = settings && settings.doublesMembers ? parseInt(settings.doublesMembers)+1 : 2;
  const trm = settings && settings.teamRelayMembers ? parseInt(settings.teamRelayMembers)+1 : 4;

  function ticketsForRow(r){
    if(ticketMode !== 'regunreg') return parseInt(r['Ticket Count'])||0;
    const cat = r['Category'];
    if(brandKey==='tsr' && cat==='Team') return isOne(r['Team Captain']) ? mpt : 0;
    if(brandKey==='rl' && cat==='Doubles') return isOne(r['Doubles Captain']) ? dm : 0;
    if(brandKey==='rl' && cat==='Team Relay') return isOne(r['Team Relay Captain']) ? trm : 0;
    return parseInt(r['Ticket Count'])||0;
  }

  const phases = {};
  rows.forEach(r=>{
    const p = r['Phase']; if(!p) return;
    if(!phases[p]) phases[p] = {tickets:0, revenue:0, days:new Set()};
    phases[p].tickets += ticketsForRow(r);
    phases[p].revenue += parseFloat(r['Total Registration + Product Rev'])||0;
    const d = r['Date cleaned (DD/MM/YYYY)'];
    if(d) phases[p].days.add(String(d).slice(0,10));
  });
  return phases;
}

function renderPhaseTable(brandKey, viewRows, cmpRows, year, compareYear, settings, ticketMode){
  ticketMode = ticketMode || 'regunreg';
  const colLabel = ticketMode==='regunreg' ? 'Total Reg+Unreg Tickets' : 'Total Reg Tickets';
  const phases = computePhaseBreakdown(viewRows, year, brandKey, settings, ticketMode);
  const cmpPhases = (compareYear && cmpRows) ? computePhaseBreakdown(cmpRows, compareYear, brandKey, settings, ticketMode) : null;
  const allNames = new Set(Object.keys(phases));
  if(cmpPhases) Object.keys(cmpPhases).forEach(n=>allNames.add(n));
  const names = [...allNames].sort((a,b)=>{
    const ia=phaseOrder.indexOf(a), ib=phaseOrder.indexOf(b);
    return (ia===-1?99:ia)-(ib===-1?99:ib);
  });

  function deltaCell(curr, prevExists, prevVal, fmt){
    if(!cmpPhases) return '';
    if(!prevExists) return ' <span style="color:var(--text-dim); font-size:11.5px;">(no match in '+compareYear+')</span>';
    const pctChange = prevVal!==0 ? ((curr-prevVal)/prevVal*100) : null;
    const up = curr>=prevVal;
    const color = up ? 'var(--good)' : 'var(--bad)';
    return ' <span style="color:'+color+'; font-size:11.5px;">'+(up?'▲':'▼')+' '+fmt(prevVal)+(pctChange!==null?' ('+(pctChange>=0?'+':'')+pctChange.toFixed(0)+'%)':'')+'</span>';
  }

  let html = `<div style="overflow-x:auto; -webkit-overflow-scrolling:touch;"><table style="min-width:520px;"><thead><tr><th>Phase</th><th style="text-align:right">% Split</th><th style="text-align:right">${colLabel}</th><th style="text-align:right">Avg Daily</th><th style="text-align:right">Total Revenue</th></tr></thead><tbody>`;
  names.forEach(p=>{
    const d = phases[p];
    if(!d){
      html += `<tr><td>${p} <span style="color:var(--text-dim); font-size:11px;">(only in ${compareYear})</span></td><td style="text-align:right">—</td><td style="text-align:right">—</td><td style="text-align:right">—</td><td style="text-align:right">—</td></tr>`;
      return;
    }
    const avgDaily = d.days.size ? d.tickets/d.days.size : d.tickets;
    const cd = cmpPhases ? cmpPhases[p] : null;
    const ticketsCell = fmtNum(d.tickets) + deltaCell(d.tickets, !!cd, cd?cd.tickets:null, fmtNum);
    const revCell = fmtMoney(d.revenue) + deltaCell(d.revenue, !!cd, cd?cd.revenue:null, fmtMoney);
    const grandTickets = Object.values(phases).reduce((a,d)=>a+d.tickets, 0);
    const pct = grandTickets > 0 ? (d.tickets/grandTickets*100).toFixed(1)+'%' : '—';
    html += `<tr><td>${p}</td><td style="text-align:right; color:var(--text-dim);">${pct}</td><td style="text-align:right">${ticketsCell}</td><td style="text-align:right">${Math.round(avgDaily)}</td><td style="text-align:right">${revCell}</td></tr>`;
  });

  // Grand total row for viewing year only
  const grandTickets = Object.values(phases).reduce((a,d)=>a+d.tickets, 0);
  const grandRev = Object.values(phases).reduce((a,d)=>a+d.revenue, 0);
  html += `<tr style="border-top:2px solid var(--line); font-weight:700;">
    <td>Grand Total</td>
    <td style="text-align:right">100%</td>
    <td style="text-align:right">${fmtNum(grandTickets)}</td>
    <td style="text-align:right">—</td>
    <td style="text-align:right">${fmtMoney(grandRev)}</td>
  </tr>`;
  html += '</tbody></table></div>';
  document.getElementById('phaseTable_'+brandKey).innerHTML = html;
}
