<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresh Events — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root{
    --bg:#0E1A14; --panel:#142319; --panel-2:#192B1E; --line:#27402F;
    --text:#EAF2EC; --text-dim:#8FA999; --accent:#FF6A3D; --accent2:#378ADD;
    --good:#6FCF97; --bad:#E8694A; --muted:#4A6657;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter','Segoe UI',Helvetica,Arial,sans-serif;}
  .app{padding:28px 40px 64px; max-width:1280px; margin:0 auto;}
  @media (max-width:680px){
    .app{padding:18px 16px 48px;}
    .target-grid{grid-template-columns:1fr;}
    .filter-row{gap:8px;}
  }

  .nav{display:flex; align-items:center; gap:6px; margin-bottom:28px; border-bottom:1px solid var(--line); padding-bottom:14px; flex-wrap:wrap;}
  .nav-brand{font-weight:700; font-size:16px; margin-right:20px; white-space:nowrap;}
  .nav-btn{background:transparent; border:none; color:var(--text-dim); padding:8px 14px; border-radius:7px; font-size:13.5px; font-weight:600; cursor:pointer;}
  .nav-btn.active{background:var(--panel); color:var(--text);}
  .nav-btn:hover:not(.active){color:var(--text);}

  h1{font-size:26px;margin:0 0 4px;}
  h2.page-title{font-size:22px;margin:0 0 4px;}
  .sub{color:var(--text-dim);font-size:13px;margin-bottom:22px;}
  .status{font-size:12.5px;color:var(--text-dim);margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}

  button{background:var(--accent);color:#0E1A14;border:none;padding:8px 16px;border-radius:6px;font-weight:600;font-size:13px;cursor:pointer;}
  button:hover{opacity:0.9;}
  button.secondary{background:var(--panel-2);color:var(--text);border:1px solid var(--line);}
  select{background:var(--panel-2);color:var(--text);border:1px solid var(--line);padding:7px 10px;border-radius:6px;font-size:13px;}

  .metrics{display:grid;grid-template-columns:repeat(4, 1fr);gap:12px;margin-bottom:22px;}
  @media (max-width:900px){ .metrics{grid-template-columns:repeat(2,1fr);} }
  @media (max-width:480px){ .metrics{grid-template-columns:1fr;} }
  .metric{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px 18px;}
  .metric .label{font-size:10.5px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-dim);margin-bottom:6px;}
  .metric .val{font-size:22px;font-weight:700;}
  .metric .delta{font-size:11.5px;margin-top:5px;font-weight:600;}
  .delta.up{color:var(--good);} .delta.down{color:var(--bad);} .delta.flat{color:var(--text-dim);}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:20px 24px;margin-bottom:20px;}
  .panel h2{font-size:13px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-dim);margin:0 0 16px;}
  .panel-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px;}
  .panel-head h2{margin:0;}

  .brand-grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:16px;}
  .brand-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px 22px;}
  .brand-card.empty{opacity:0.55;}
  .brand-card h3{margin:0 0 2px; font-size:17px;}
  .brand-card .yr{font-size:12px;color:var(--text-dim);margin-bottom:14px;}
  .brand-metric-row{display:flex; justify-content:space-between; align-items:baseline; padding:7px 0; border-bottom:1px solid var(--line);}
  .brand-metric-row:last-child{border-bottom:none;}
  .brand-metric-row .bl{font-size:12.5px; color:var(--text-dim);}
  .brand-metric-row .bv{font-size:14px; font-weight:600; text-align:right;}
  .brand-metric-row .bd{font-size:11px; font-weight:600; margin-left:8px;}
  .nodata-tag{display:inline-block; font-size:10.5px; background:var(--panel-2); color:var(--text-dim); padding:3px 9px; border-radius:20px; margin-top:6px;}

  details.settings{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:20px;}
  details.settings summary{cursor:pointer; padding:16px 22px; font-size:13.5px; font-weight:600; list-style:none; display:flex; align-items:center; gap:8px;}
  details.settings summary::-webkit-details-marker{display:none;}
  details.settings summary:before{content:"▸"; transition:transform 0.15s; color:var(--accent);}
  details.settings[open] summary:before{transform:rotate(90deg);}
  .settings-body{padding:0 22px 20px;}
  .target-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:14px;}
  label{font-size:12px;color:var(--text-dim);display:block;margin-bottom:4px;}
  input{width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--text);padding:8px 10px;border-radius:6px;font-size:13.5px;}
  .save-row{display:flex;align-items:center;gap:10px;margin-top:6px;}
  #saveStatusTSR, #saveStatusRL{font-size:12px;color:var(--good);}
  .req-note{font-size:11.5px; color:var(--accent); margin:2px 0 10px;}

  .phase-def-row{display:grid; grid-template-columns:1.2fr 1fr 1fr 0.8fr auto; gap:8px; align-items:end; margin-bottom:8px; padding-bottom:12px; border-bottom:1px solid var(--line);}
  .phase-def-row input{font-size:13px;}
  @media (max-width:680px){
    .phase-def-row{grid-template-columns:1fr 1fr; grid-template-areas:"name name" "start end" "target target" "remove remove"; margin-bottom:14px; padding-bottom:14px;}
    .phase-def-row > div:nth-child(1){grid-area:name;}
    .phase-def-row > div:nth-child(2){grid-area:start;}
    .phase-def-row > div:nth-child(3){grid-area:end;}
    .phase-def-row > div:nth-child(4){grid-area:target;}
    .phase-def-row .rm-phase{grid-area:remove; width:100%;}
  }
  .rm-phase{background:var(--panel-2); color:var(--bad); border:1px solid var(--line); padding:7px 10px; font-size:12px;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:right;font-size:10.5px;text-transform:uppercase;color:var(--text-dim);padding:0 0 8px;border-bottom:1px solid var(--line);}
  th:first-child,td:first-child{text-align:left;}
  td{padding:9px 0;border-bottom:1px solid var(--line);}
  tr:last-child td{border-bottom:none;}
  .table-scroll{overflow-x:auto;}

  .chart-wrap{position:relative;height:280px;}
  .filter-row{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
  .legend-row{display:flex; gap:18px; font-size:12px; color:var(--text-dim); margin-bottom:10px; flex-wrap:wrap;}
  .legend-row span{display:inline-flex; align-items:center; gap:6px;}
  .dot{width:9px;height:9px;border-radius:2px;display:inline-block;}
</style>
</head>
<body>
<div class="app">

  <div class="nav">
    <div class="nav-brand">Fresh Events</div>
    <button class="nav-btn active" id="navOverview" onclick="goPage('overview')">Overview</button>
    <button class="nav-btn" id="navTSR" onclick="goPage('tsr')">The Sky Race</button>
    <button class="nav-btn" id="navRL" onclick="goPage('rl')">REDLINE</button>
  </div>

  <!-- ===================== OVERVIEW PAGE ===================== -->
  <div id="page-overview">
    <h1>Fresh Events — Overview</h1>
    <div class="sub">All brands · most recent event year vs previous year</div>
    <div class="status"><span id="statusLineOverview">Loading…</span><button class="secondary" onclick="loadAll()">Refresh</button></div>
    <div class="filter-row" style="margin-bottom:16px;"><label style="margin:0;">Country</label><select id="countryFilterOverview"></select></div>
    <div class="brand-grid" id="brandGrid"></div>
  </div>

  <!-- ===================== TEMPLATE: rendered for both TSR and RL ===================== -->
  <div id="page-tsr" style="display:none;"></div>
  <div id="page-rl" style="display:none;"></div>

</div>

<script>
/* =================== BRAND CONFIG =================== */
const BRANDS = {
  tsr: {
    key:'tsr', label:'The Sky Race', eventNameMatch:'sky race',
    apiUrl: "https://script.google.com/macros/s/AKfycbzX9-ViY02n6L1LbwRh3IBvRnu0GBi99MPiqOb_TDQe0kVZbn2tQBnlBVx33YQ4Rptt/exec",
    schema:'tsr'
  },
  rl: {
    key:'rl', label:'REDLINE', eventNameMatch:'redline',
    apiUrl: "https://script.google.com/macros/s/AKfycbzL0dPJSh_ZQVl3hrYv5XhVigWnsfKog86Nbj3c83m0O4EbH4nJRAVBOSU1pq55LjXWwg/exec",
    schema:'rl'
  }
};
const phaseOrder = ["Save the Date","Save the date","Lead Gen","Pre-Sale","Loyalty","Super Early Bird","Early Bird","Regular","Waitlist"];
const PALETTE = ["#378ADD","#4A6657","#FF6A3D","#C77DFF","#6FCF97","#E8694A"];

let brandData = {}; // {tsr:{rows:[...], settings:{...}}, rl:{rows:[...], settings:{...}}}
let chartInstances = {}; // keyed by canvas id

function fmtNum(n){ return Math.round(n).toLocaleString(); }
function fmtMoney(n){ return 'RM' + Math.round(n).toLocaleString(); }

function goPage(p){
  document.getElementById('page-overview').style.display = p==='overview' ? '' : 'none';
  document.getElementById('page-tsr').style.display = p==='tsr' ? '' : 'none';
  document.getElementById('page-rl').style.display = p==='rl' ? '' : 'none';
  document.getElementById('navOverview').classList.toggle('active', p==='overview');
  document.getElementById('navTSR').classList.toggle('active', p==='tsr');
  document.getElementById('navRL').classList.toggle('active', p==='rl');
}

async function fetchJSON(url, opts){ const res = await fetch(url, opts); return await res.json(); }

async function loadAll(){
  document.getElementById('statusLineOverview').textContent = "Loading live data…";
  for(const key of Object.keys(BRANDS)){
    const brand = BRANDS[key];
    let rows = [], settings = {eventDate:null, year:null, phases:[]};
    try{
      rows = await fetchJSON(brand.apiUrl + "?action=data");
    }catch(e){ rows = []; }
    try{
      const s = await fetchJSON(brand.apiUrl + "?action=getSettings");
      if(s && s.phases!==undefined) settings = s;
    }catch(e){}
    brandData[key] = {rows, settings};
  }
  const totalRows = Object.values(brandData).reduce((a,b)=>a+b.rows.length,0);
  document.getElementById('statusLineOverview').textContent = "Live — " + totalRows + " total records · updated " + new Date().toLocaleTimeString();

  renderOverview();
  renderBrandPage('tsr');
  renderBrandPage('rl');
}

/* =================== SHARED CALC HELPERS =================== */

function computeBrandYearMetrics(rows, year, brandKey, settings){
  const yr = rows.filter(r => String(r['Year']) === String(year));
  const regTickets = yr.reduce((a,r)=>a+(parseInt(r['Ticket Count'])||0),0);
  const regRev = yr.reduce((a,r)=>a+(parseFloat(r['Registration Rev'])||0),0);
  const prodRev = yr.reduce((a,r)=>a+(parseFloat(r['Products Rev'])||0),0);
  const totalRev = regRev + prodRev;

  let unreg = 0;
  if(brandKey === 'tsr'){
    const mpt = settings && settings.membersPerTeam ? parseInt(settings.membersPerTeam) : 2;
    const teamRows = yr.filter(r => r['Category']==='Team');
    const teamsFormed = teamRows.filter(r => parseInt(r['Team Captain'])===1).length;
    const registeredTeamMembers = teamRows.filter(r => parseInt(r['Team Member'])===1).length;
    unreg = Math.max(0, teamsFormed*mpt - registeredTeamMembers);
  } else if(brandKey === 'rl'){
    const dm = settings && settings.doublesMembers ? parseInt(settings.doublesMembers) : 1;
    const trm = settings && settings.teamRelayMembers ? parseInt(settings.teamRelayMembers) : 3;
    const doublesRows = yr.filter(r => r['Category']==='Doubles');
    const doublesTeams = doublesRows.filter(r => parseInt(r['Doubles Captain'])===1).length;
    const doublesRegMembers = doublesRows.filter(r => parseInt(r['Doubles Member'])===1).length;
    const unregDoubles = Math.max(0, doublesTeams*dm - doublesRegMembers);

    const relayRows = yr.filter(r => r['Category']==='Team Relay');
    const relayTeams = relayRows.filter(r => parseInt(r['Team Relay Captain'])===1).length;
    const relayRegMembers = relayRows.filter(r => parseInt(r['Team Relay Member'])===1).length;
    const unregRelay = Math.max(0, relayTeams*trm - relayRegMembers);

    unreg = unregDoubles + unregRelay;
  }
  const totalTicketsRegUnreg = regTickets + unreg;
  return {regTickets, totalTicketsRegUnreg, regRev, prodRev, totalRev, unreg};
}

function deltaSpan(curr, prev){
  if(prev === null || prev === undefined || prev === 0 || curr===null) return '<span class="bd" style="color:var(--text-dim)">—</span>';
  const d = (curr-prev)/prev*100;
  const color = d>=0 ? 'var(--good)' : 'var(--bad)';
  return '<span class="bd" style="color:'+color+'">'+(d>=0?'▲':'▼')+' '+Math.abs(d).toFixed(0)+'%</span>';
}

function brandRowsFor(brandKey, countryVal){
  const data = brandData[brandKey];
  if(!data) return [];
  let rows = data.rows;
  if(countryVal && countryVal!=='all') rows = rows.filter(r=>r['Country']===countryVal);
  return rows;
}

/* =================== OVERVIEW PAGE =================== */

function populateCountryFilter(selectEl, rows){
  const countries = [...new Set(rows.map(r=>r['Country']).filter(Boolean))].sort();
  const prevVal = selectEl.value;
  selectEl.innerHTML = '<option value="all">All countries</option>' + countries.map(c=>`<option value="${c}">${c}</option>`).join('');
  if(prevVal && (prevVal==='all' || countries.includes(prevVal))){
    selectEl.value = prevVal;
  } else if(countries.includes('Malaysia')){
    selectEl.value = 'Malaysia';
  } else {
    selectEl.value = 'all';
  }
}

function renderOverview(){
  const allRowsCombined = Object.values(brandData).flatMap(d=>d.rows);
  populateCountryFilter(document.getElementById('countryFilterOverview'), allRowsCombined);
  const countryVal = document.getElementById('countryFilterOverview').value;

  const brandList = [
    {key:'tsr', label:'The Sky Race'},
    {key:'rl', label:'REDLINE'},
    {key:'music', label:'The Music Run'},
    {key:'dua', label:'DUA'}
  ];

  const grid = document.getElementById('brandGrid');
  grid.innerHTML = "";
  brandList.forEach(b=>{
    const data = brandData[b.key];
    if(!data || data.rows.length === 0){
      grid.innerHTML += `<div class="brand-card empty"><h3>${b.label}</h3><span class="nodata-tag">No data yet</span></div>`;
      return;
    }
    const rows = countryVal==='all' ? data.rows : data.rows.filter(r=>r['Country']===countryVal);
    if(rows.length === 0) return; // hide if no data for selected country

    const years = [...new Set(rows.map(r=>String(r['Year'])))].sort();
    const latestYear = years[years.length-1];
    const prevYear = years.length>1 ? years[years.length-2] : null;
    const curr = computeBrandYearMetrics(rows, latestYear, b.key, data.settings);
    const prev = prevYear ? computeBrandYearMetrics(rows, prevYear, b.key, data.settings) : null;
    function row(label, currVal, prevVal, fmt){
      const prevStr = (prevVal!==null && prevVal!==undefined) ? ' <span style="color:var(--text-dim); font-weight:400;">('+fmt(prevVal)+')</span>' : '';
      return `<div class="brand-metric-row"><span class="bl">${label}</span><span><span class="bv">${fmt(currVal)}</span>${deltaSpan(currVal, prevVal)}${prevStr}</span></div>`;
    }
    grid.innerHTML += `<div class="brand-card">
      <h3>${b.label}</h3>
      <div class="yr">${latestYear}${prevYear ? ' vs '+prevYear : ' (no prior year)'}</div>
      ${row('Tickets sold (reg+unreg)', curr.totalTicketsRegUnreg, prev?prev.totalTicketsRegUnreg:null, fmtNum)}
      ${row('Registered tickets', curr.regTickets, prev?prev.regTickets:null, fmtNum)}
      ${row('Total revenue', curr.totalRev, prev?prev.totalRev:null, fmtMoney)}
      ${row('Ticket revenue', curr.regRev, prev?prev.regRev:null, fmtMoney)}
      ${row('Add-on revenue', curr.prodRev, prev?prev.prodRev:null, fmtMoney)}
    </div>`;
  });
}

document.getElementById('countryFilterOverview').addEventListener('change', renderOverview);

/* =================== BRAND PAGE (shared for TSR & RL) =================== */

function brandPageHTML(brandKey){
  const label = BRANDS[brandKey].label;
  return `
    <h2 class="page-title">${label}</h2>
    <div class="sub">Live data from Google Sheets · settings editable by anyone with this link</div>
    <div class="status"><span id="statusLine_${brandKey}">Loading…</span><button class="secondary" onclick="loadAll()">Refresh</button></div>

    <details class="settings" id="settingsPanel_${brandKey}">
      <summary>Event settings (phase targets, sale end date)</summary>
      <div class="settings-body">
        <div class="target-grid">
          <div><label>Sale end date / event day</label><input type="date" id="eventDate_${brandKey}" /></div>
          <div><label>Settings apply to year</label><input type="number" id="settingsYear_${brandKey}" placeholder="e.g. 2026" /></div>
          ${brandKey==='tsr' ? `<div><label>Additional members needed per team</label><input type="number" id="membersPerTeam_${brandKey}" placeholder="e.g. 2" /></div>` : ''}
          ${brandKey==='rl' ? `<div><label>Additional members needed (Doubles)</label><input type="number" id="doublesMembers_${brandKey}" placeholder="e.g. 1" /></div><div><label>Additional members needed (Team Relay)</label><input type="number" id="teamRelayMembers_${brandKey}" placeholder="e.g. 3" /></div>` : ''}
        </div>
        <label style="margin-top:6px;">Phase definitions — name, date range, and ticket target (all required for run-rate calc)</label>
        <div class="req-note">Each phase needs a ticket target to calculate its own daily required rate.</div>
        <div id="phaseDefRows_${brandKey}"></div>
        <button class="secondary" type="button" onclick="addPhaseDefRow('${brandKey}','','','','')">+ Add phase</button>
        <div class="save-row">
          <button onclick="saveSettingsFor('${brandKey}')">Save settings</button>
          <span id="saveStatus${brandKey === 'tsr' ? 'TSR' : 'RL'}"></span>
        </div>
      </div>
    </details>

    <div class="panel-head" style="margin-bottom:6px;">
      <div class="filter-row">
        <label style="margin:0;">Viewing year</label><select id="yearFilter_${brandKey}"></select>
        <label style="margin:0 0 0 12px;">Compare vs</label><select id="compareYearFilter_${brandKey}"></select>
        <label style="margin:0 0 0 12px;">Country</label><select id="countryFilter_${brandKey}"></select>
      </div>
    </div>

    <div class="metrics" id="metrics_${brandKey}"></div>

    <div class="panel"><h2>Phase performance</h2><div class="table-scroll" id="phaseTable_${brandKey}"></div></div>

    <div class="panel"><h2>Sub-event breakdown</h2><div class="table-scroll" id="subEventTable_${brandKey}"></div></div>

    <div class="panel"><h2>${brandKey==='tsr' ? 'Team category breakdown (Mixed / Women / Men)' : 'Doubles & Team Relay category breakdown (Mixed / Women / Men)'}</h2><div class="table-scroll" id="genderTable_${brandKey}"></div></div>

    <div class="panel" id="cohortPanel_${brandKey}"><h2>Cohort retention</h2><div id="cohortTable_${brandKey}"></div></div>

    <div class="panel">
      <div class="panel-head">
        <h2>Cumulative daily tickets (registered) — year comparison</h2>
        <div class="filter-row"><label style="margin:0;">Category</label><select id="catFilter1_${brandKey}">${categoryOptions(brandKey)}</select></div>
      </div>
      <div class="legend-row" id="legendDaily1_${brandKey}"></div>
      <div class="chart-wrap"><canvas id="cumChart_${brandKey}"></canvas></div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <h2>Daily additional tickets — year comparison</h2>
        <div class="filter-row"><label style="margin:0;">Category</label><select id="catFilter2_${brandKey}">${categoryOptions(brandKey)}</select></div>
      </div>
      <div class="legend-row" id="legendDaily2_${brandKey}"></div>
      <div class="chart-wrap"><canvas id="dailyDeltaChart_${brandKey}"></canvas></div>
    </div>

    <div class="panel" id="paceChartPanel_${brandKey}">
      <div class="panel-head"><h2>Cumulative actual vs phase target</h2></div>
      <div class="legend-row">
        <span><span class="dot" style="background:#378ADD"></span>Actual</span>
        <span><span class="dot" style="background:#FF6A3D"></span>Target pace (per phase)</span>
        <span><span class="dot" style="background:rgba(232,105,74,0.35)"></span>Gap</span>
      </div>
      <div class="chart-wrap"><canvas id="paceChart_${brandKey}"></canvas></div>
    </div>
  `;
}

function categoryOptions(brandKey){
  if(brandKey==='tsr') return '<option value="all">All</option><option value="Individual">Individual</option><option value="Team">Team</option>';
  if(brandKey==='rl') return '<option value="all">All</option><option value="Singles">Singles</option><option value="Doubles">Doubles</option><option value="Team Relay">Team Relay</option>';
  return '<option value="all">All</option>';
}

function initBrandPage(brandKey){
  document.getElementById('page-'+brandKey).innerHTML = brandPageHTML(brandKey);
  document.getElementById('yearFilter_'+brandKey).addEventListener('change', ()=>renderSRBody(brandKey));
  document.getElementById('compareYearFilter_'+brandKey).addEventListener('change', ()=>renderSRBody(brandKey));
  document.getElementById('countryFilter_'+brandKey).addEventListener('change', ()=>renderSRBody(brandKey));
  document.getElementById('catFilter1_'+brandKey).addEventListener('change', ()=>renderSRBody(brandKey));
  document.getElementById('catFilter2_'+brandKey).addEventListener('change', ()=>renderSRBody(brandKey));
}

let pageInitialized = {tsr:false, rl:false};

function renderBrandPage(brandKey){
  if(!pageInitialized[brandKey]){
    initBrandPage(brandKey);
    pageInitialized[brandKey] = true;
  }
  const data = brandData[brandKey];
  if(!data) return;
  document.getElementById('statusLine_'+brandKey).textContent = "Live — " + data.rows.length + " records · updated " + new Date().toLocaleTimeString();

  populateCountryFilter(document.getElementById('countryFilter_'+brandKey), data.rows);
  populateYearFilters(brandKey);

  const s = data.settings;
  const evEl = document.getElementById('eventDate_'+brandKey);
  if(evEl.value === "" && s.eventDate) evEl.value = s.eventDate;
  const yrEl = document.getElementById('settingsYear_'+brandKey);
  if(yrEl.value === "" && s.year) yrEl.value = s.year;
  if(brandKey==='tsr'){
    const mptEl = document.getElementById('membersPerTeam_tsr');
    if(mptEl.value === "" && s.membersPerTeam) mptEl.value = s.membersPerTeam;
  }
  if(brandKey==='rl'){
    const dmEl = document.getElementById('doublesMembers_rl');
    if(dmEl.value === "" && s.doublesMembers) dmEl.value = s.doublesMembers;
    const trmEl = document.getElementById('teamRelayMembers_rl');
    if(trmEl.value === "" && s.teamRelayMembers) trmEl.value = s.teamRelayMembers;
  }
  if(document.getElementById('phaseDefRows_'+brandKey).children.length === 0) renderPhaseDefRows(brandKey);

  renderSRBody(brandKey);
}

function srRowsFor(brandKey){
  const countryVal = document.getElementById('countryFilter_'+brandKey).value;
  return brandRowsFor(brandKey, countryVal);
}

function populateYearFilters(brandKey){
  const rows = srRowsFor(brandKey);
  const years = [...new Set(rows.map(r=>String(r['Year'])))].sort();
  const yf = document.getElementById('yearFilter_'+brandKey);
  const cf = document.getElementById('compareYearFilter_'+brandKey);

function isLatestYear(brandKey, year){
  const years = [...new Set(srRowsFor(brandKey).map(r=>String(r['Year'])))].sort();

}

function addPhaseDefRow(brandKey, name, start, end, target){

function renderPhaseDefRows(brandKey){

function filteredByCategory(rows, cat){
  if(cat==='all') return rows;

function renderSRBody(brandKey){
  const rows = srRowsFor(brandKey);
  if(rows.length===0) return;
  const year = document.getElementById('yearFilter_'+brandKey).value;
  const compareYear = document.getElementById('compareYearFilter_'+brandKey).value;
  const showSettings = isLatestYear(brandKey, year);
  document.getElementById('settingsPanel_'+brandKey).style.display = showSettings ? '' : 'none';
  document.getElementById('paceChartPanel_'+brandKey).style.display = showSettings ? '' : 'none';

  const settings = brandData[brandKey].settings;
  const curr = computeBrandYearMetrics(rows, year, brandKey, settings);
  const cmp = compareYear ? computeBrandYearMetrics(rows, compareYear, brandKey, settings) : null;
  const avgPriceCurr = curr.regTickets ? curr.totalRev/curr.regTickets : 0;
  const avgPriceCmp = cmp && cmp.regTickets ? cmp.totalRev/cmp.regTickets : null;

  let runRateNeeded = null;
  if(showSettings && settings.eventDate){
    const phasesWithTarget = (settings.phases||[]).filter(p=>p.target);
    const totalTarget = phasesWithTarget.reduce((a,p)=>a+(parseFloat(p.target)||0),0);
    if(totalTarget > 0){
      const today = new Date();
      const end = new Date(settings.eventDate);
      const daysLeft = Math.max(1, Math.ceil((end-today)/(1000*60*60*24)));
      runRateNeeded = Math.max(0,(totalTarget-curr.regTickets))/daysLeft;
    }
  }

  const metricsEl = document.getElementById('metrics_'+brandKey);
  function card(label, val, cmpVal, fmt, noCompare){
    if(noCompare || !cmp){
      return `<div class="metric"><div class="label">${label}</div><div class="val">${fmt(val)}</div></div>`;
    }
    if(cmpVal===null || cmpVal===undefined){
      return `<div class="metric"><div class="label">${label}</div><div class="val">${fmt(val)}</div><div class="delta" style="color:var(--text-dim)">no data ${compareYear}</div></div>`;
    }
    const pctChange = cmpVal!==0 ? ((val-cmpVal)/cmpVal*100) : null;
    const up = val>=cmpVal;
    return `<div class="metric"><div class="label">${label}</div><div class="val">${fmt(val)}</div><div class="delta ${up?'up':'down'}">${up?'▲':'▼'} vs ${compareYear}: ${fmt(cmpVal)}${pctChange!==null?' ('+(pctChange>=0?'+':'')+pctChange.toFixed(1)+'%)':''}</div></div>`;
  }
  metricsEl.innerHTML =
    card('Tickets sold (reg+unreg)', curr.totalTicketsRegUnreg, cmp?cmp.totalTicketsRegUnreg:null, fmtNum) +
    card('Registered tickets', curr.regTickets, cmp?cmp.regTickets:null, fmtNum) +
    card('Unregistered (team gap)', curr.unreg, null, fmtNum, true) +
    card('Registration revenue', curr.regRev, cmp?cmp.regRev:null, fmtMoney) +
    card('Add-on revenue', curr.prodRev, cmp?cmp.prodRev:null, fmtMoney) +
    card('Avg ticket price', avgPriceCurr, avgPriceCmp, fmtMoney) +
    (showSettings ? card('Daily run rate needed (overall)', runRateNeeded!==null?runRateNeeded:0, null, v=>runRateNeeded!==null?fmtNum(v)+'/day':'set phase targets', true) : '');

  renderPhaseTable(brandKey, rows, year, compareYear);
  renderSubEventTable(brandKey, rows, year, compareYear, settings);
  renderGenderTable(brandKey, rows, year, compareYear);
  renderCohortTable(brandKey, rows);
  renderCumChart(brandKey, rows, year, compareYear, document.getElementById('catFilter1_'+brandKey).value);
  renderDailyDeltaChart(brandKey, rows, year, compareYear, document.getElementById('catFilter2_'+brandKey).value);
  if(showSettings) renderPaceChart(brandKey, rows, year, settings);
}

/* ---- Phase performance table ---- */

function computePhaseBreakdown(rows, year){
  const yr = rows.filter(r=>String(r['Year'])===String(year));
  const phases = {};
  yr.forEach(r=>{
    const p = r['Phase']; if(!p) return;
    if(!phases[p]) phases[p] = {tickets:0, revenue:0, days:new Set()};
    phases[p].tickets += parseInt(r['Ticket Count'])||0;
    phases[p].revenue += parseFloat(r['Total Registration + Product Rev'])||0;
    const d = r['Date cleaned (DD/MM/YYYY)'];
    if(d) phases[p].days.add(String(d).slice(0,10));
  });
  return phases;
}

function renderPhaseTable(brandKey, rows, year, compareYear){
  const phases = computePhaseBreakdown(rows, year);
  const cmpPhases = compareYear ? computePhaseBreakdown(rows, compareYear) : null;
  const allNames = new Set(Object.keys(phases));
  if(cmpPhases) Object.keys(cmpPhases).forEach(n=>allNames.add(n));
  const names = [...allNames].sort((a,b)=>{
    const ia=phaseOrder.indexOf(a), ib=phaseOrder.indexOf(b);
    return (ia===-1?99:ia)-(ib===-1?99:ib);
  });

  function deltaCell(curr, prevExists, prevVal, fmt){
    if(!cmpPhases) return '';
    if(!prevExists) return ' <span style="color:var(--text-dim); font-size:11.5px;">(no match in '+compareYear+')</span>';
    const pctChange = prevVal!==0 ? ((curr-prevVal)/prevVal*100) : null;
    const up = curr>=prevVal;
    const color = up ? 'var(--good)' : 'var(--bad)';
    return ' <span style="color:'+color+'; font-size:11.5px;">'+(up?'▲':'▼')+' '+fmt(prevVal)+(pctChange!==null?' ('+(pctChange>=0?'+':'')+pctChange.toFixed(0)+'%)':'')+'</span>';
  }

  let html = '<table><thead><tr><th>Phase</th><th>Total Reg Tickets</th><th>Avg Daily Tickets</th><th>Total Revenue</th></tr></thead><tbody>';
  names.forEach(p=>{
    const d = phases[p];
    if(!d){
      html += `<tr><td>${p} <span style="color:var(--text-dim); font-size:11px;">(only in ${compareYear})</span></td><td style="text-align:right">—</td><td style="text-align:right">—</td><td style="text-align:right">—</td></tr>`;
      return;
    }
    const avgDaily = d.days.size ? d.tickets/d.days.size : d.tickets;
    const cd = cmpPhases ? cmpPhases[p] : null;
    const ticketsCell = fmtNum(d.tickets) + deltaCell(d.tickets, !!cd, cd?cd.tickets:null, fmtNum);
    const revCell = fmtMoney(d.revenue) + deltaCell(d.revenue, !!cd, cd?cd.revenue:null, fmtMoney);
    html += `<tr><td>${p}</td><td style="text-align:right">${ticketsCell}</td><td style="text-align:right">${avgDaily.toFixed(1)}</td><td style="text-align:right">${revCell}</td></tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('phaseTable_'+brandKey).innerHTML = html;
}

/* ---- Sub-event breakdown table (reg+unreg, per sub-event) ---- */

function computeSubEventBreakdown(rows, year, brandKey, settings){
  const yr = rows.filter(r=>String(r['Year'])===String(year));
  const subEvents = {};
  yr.forEach(r=>{
    const se = r['Sub-Event']; if(!se) return;
    if(!subEvents[se]) subEvents[se] = {regTickets:0, category:r['Category'], isCaptainRow:0, isMemberRow:0, captainCol:null, memberCol:null};
    subEvents[se].regTickets += parseInt(r['Ticket Count'])||0;
  });

  // compute unreg per sub-event for team-type categories
  Object.keys(subEvents).forEach(se=>{
    const se_rows = yr.filter(r=>r['Sub-Event']===se);
    const cat = se_rows[0] ? se_rows[0]['Category'] : null;
    let unreg = 0;
    if(brandKey==='tsr' && cat==='Team'){
      const mpt = settings && settings.membersPerTeam ? parseInt(settings.membersPerTeam) : 2;
      const teamsFormed = se_rows.filter(r=>parseInt(r['Team Captain'])===1).length;
      const regMembers = se_rows.filter(r=>parseInt(r['Team Member'])===1).length;
      unreg = Math.max(0, teamsFormed*mpt - regMembers);
    } else if(brandKey==='rl' && cat==='Doubles'){
      const dm = settings && settings.doublesMembers ? parseInt(settings.doublesMembers) : 1;
      const teamsFormed = se_rows.filter(r=>parseInt(r['Doubles Captain'])===1).length;
      const regMembers = se_rows.filter(r=>parseInt(r['Doubles Member'])===1).length;
      unreg = Math.max(0, teamsFormed*dm - regMembers);
    } else if(brandKey==='rl' && cat==='Team Relay'){
      const trm = settings && settings.teamRelayMembers ? parseInt(settings.teamRelayMembers) : 3;
      const teamsFormed = se_rows.filter(r=>parseInt(r['Team Relay Captain'])===1).length;
      const regMembers = se_rows.filter(r=>parseInt(r['Team Relay Member'])===1).length;
      unreg = Math.max(0, teamsFormed*trm - regMembers);
    }
    subEvents[se].unreg = unreg;
    subEvents[se].totalRegUnreg = subEvents[se].regTickets + unreg;
  });
  return subEvents;
}

function renderSubEventTable(brandKey, rows, year, compareYear, settings){
  const curr = computeSubEventBreakdown(rows, year, brandKey, settings);
  const cmp = compareYear ? computeSubEventBreakdown(rows, compareYear, brandKey, settings) : null;
  const allNames = new Set(Object.keys(curr));
  if(cmp) Object.keys(cmp).forEach(n=>allNames.add(n));
  const names = [...allNames].sort();

  let html = '<table><thead><tr><th>Sub-Event</th><th>Tickets (reg+unreg)</th>' + (cmp ? `<th>vs ${compareYear}</th><th>YoY %</th>` : '') + '</tr></thead><tbody>';
  names.forEach(se=>{
    const d = curr[se];
    const cd = cmp ? cmp[se] : null;
    if(!d){
      html += `<tr><td>${se} <span style="color:var(--text-dim); font-size:11px;">(only in ${compareYear})</span></td><td style="text-align:right">—</td>${cmp?'<td style="text-align:right">—</td><td style="text-align:right">—</td>':''}</tr>`;
      return;
    }
    let cmpCell = '', pctCell = '';
    if(cmp){
      if(cd){
        const pct = cd.totalRegUnreg!==0 ? ((d.totalRegUnreg-cd.totalRegUnreg)/cd.totalRegUnreg*100) : null;
        const up = d.totalRegUnreg >= cd.totalRegUnreg;
        cmpCell = `<td style="text-align:right">${fmtNum(cd.totalRegUnreg)}</td>`;
        pctCell = `<td style="text-align:right; color:${up?'var(--good)':'var(--bad)'}">${pct!==null?(pct>=0?'+':'')+pct.toFixed(0)+'%':'—'}</td>`;
      } else {
        cmpCell = `<td style="text-align:right; color:var(--text-dim); font-size:11px;">no match</td>`;
        pctCell = `<td style="text-align:right">—</td>`;
      }
    }
    html += `<tr><td>${se}</td><td style="text-align:right">${fmtNum(d.totalRegUnreg)}</td>${cmpCell}${pctCell}</tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('subEventTable_'+brandKey).innerHTML = html;
}

/* ---- Gender category breakdown (Mixed/Women/Men) ---- */

function computeGenderBreakdown(rows, year, brandKey){
  const yr = rows.filter(r=>String(r['Year'])===String(year));
  const catField = brandKey==='tsr' ? 'Team Category' : 'Double/ Team Category';
  const groups = {}; // groupLabel(e.g. "Team" or "Doubles"/"Team Relay") -> {Mixed:n, Women:n, Men:n}

  yr.forEach(r=>{
    const tc = r[catField];
    if(!tc) return;
    // determine top-level group and gender
    let group, gender;
    if(brandKey==='tsr'){
      group = 'Team';
    } else {
      if(tc.toLowerCase().includes('doubles')) group = 'Doubles';
      else if(tc.toLowerCase().includes('team relay')) group = 'Team Relay';
      else return;
    }
    if(tc.toLowerCase().includes('mix')) gender = 'Mixed';
    else if(tc.toLowerCase().includes('women')) gender = 'Women';
    else if(tc.toLowerCase().includes('men')) gender = 'Men';
    else gender = 'Other';

    if(!groups[group]) groups[group] = {Mixed:0, Women:0, Men:0, Other:0};
    groups[group][gender] += parseInt(r['Ticket Count'])||0;
  });
  return groups;
}

function renderGenderTable(brandKey, rows, year, compareYear){
  const curr = computeGenderBreakdown(rows, year, brandKey);
  const cmp = compareYear ? computeGenderBreakdown(rows, compareYear, brandKey) : null;
  const groupNames = Object.keys(curr);

  if(groupNames.length===0){
    document.getElementById('genderTable_'+brandKey).innerHTML = '<p style="color:var(--text-dim); font-size:13px;">No team category data found.</p>';
    return;
  }

  let html = '<table><thead><tr><th>Category</th><th>Gender</th><th>'+year+' Count</th><th>'+year+' %</th>' + (cmp ? `<th>${compareYear} Count</th><th>${compareYear} %</th>` : '') + '</tr></thead><tbody>';
  groupNames.forEach(group=>{
    const g = curr[group];
    const total = g.Mixed+g.Women+g.Men+g.Other;
    const cg = cmp ? cmp[group] : null;
    const cmpTotal = cg ? (cg.Mixed+cg.Women+cg.Men+cg.Other) : 0;
    ['Mixed','Women','Men'].forEach(gender=>{
      if(g[gender]===0 && (!cg || cg[gender]===0)) return;
      const pct = total ? (g[gender]/total*100) : 0;
      let cmpCells = '';
      if(cmp){
        const cVal = cg ? cg[gender] : 0;
        const cPct = cmpTotal ? (cVal/cmpTotal*100) : 0;
        cmpCells = `<td style="text-align:right">${fmtNum(cVal)}</td><td style="text-align:right">${cPct.toFixed(0)}%</td>`;
      }
      html += `<tr><td>${group}</td><td>${gender}</td><td style="text-align:right">${fmtNum(g[gender])}</td><td style="text-align:right">${pct.toFixed(0)}%</td>${cmpCells}</tr>`;
    });
  });
  html += '</tbody></table>';
  document.getElementById('genderTable_'+brandKey).innerHTML = html;
}

/* ---- Cohort retention ---- */

function renderCohortTable(brandKey, rows){
  const emailKey = 'Unique Email ID';
  const hasEmail = rows.some(r => r[emailKey]);
  const container = document.getElementById('cohortTable_'+brandKey);
  if(!hasEmail){
    container.innerHTML = '<p style="color:var(--text-dim); font-size:13px;">No "Unique Email ID" column found in this data.</p>';
    return;
  }
  const firstSeen = {};
  rows.forEach(r=>{
    const email = r[emailKey];
    const yr = parseInt(r['Year']);
    if(!email || !yr) return;
    if(!firstSeen[email] || yr < firstSeen[email]) firstSeen[email] = yr;
  });
  const emailsByYear = {};
  rows.forEach(r=>{
    const email = r[emailKey];
    const yr = parseInt(r['Year']);
    if(!email || !yr) return;
    if(!emailsByYear[yr]) emailsByYear[yr] = new Set();
    emailsByYear[yr].add(email);
  });
  const allYears = Object.keys(emailsByYear).map(Number).sort((a,b)=>a-b);
  const cohortYears = allYears;
  const maxOffset = allYears.length - 1;

  let html = '<table><thead><tr><th>Cohort</th><th>Size</th>';
  for(let off=1; off<=maxOffset; off++){
    html += `<th>Year ${off+1}</th>`;
  }
  html += '</tr></thead><tbody>';

  cohortYears.forEach(cy=>{
    const cohortEmails = [...emailsByYear[cy]].filter(e => firstSeen[e] === cy);
    const size = cohortEmails.length;
    if(size === 0) return;
    html += `<tr><td>${cy}</td><td style="text-align:right">${fmtNum(size)}</td>`;
    for(let off=1; off<=maxOffset; off++){
      const targetYear = cy + off;
      if(!allYears.includes(targetYear)){ html += '<td style="text-align:right">—</td>'; continue; }
      const retained = cohortEmails.filter(e => emailsByYear[targetYear].has(e)).length;
      const p = size ? (retained/size*100) : 0;
      html += `<td style="text-align:right">${targetYear}: ${fmtNum(retained)} (${p.toFixed(0)}%)</td>`;
    }
    html += '</tr>';
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

/* ---- Charts ---- */

function dayKey(dateStr){ return new Date(dateStr); }

function buildDailySeries(rows, year, cat){
  const yr = filteredByCategory(rows.filter(r=>String(r['Year'])===String(year)), cat);
  const dated = yr.map(r=>({date:dayKey(r['Date cleaned (DD/MM/YYYY)']), tickets:parseInt(r['Ticket Count'])||0})).filter(r=>!isNaN(r.date));
  dated.sort((a,b)=>a.date-b.date);
  const start = dated.length?dated[0].date:new Date();
  const byDay = {};
  let lastDayWithData = 0;
  dated.forEach(r=>{
    const d = Math.round((r.date-start)/(1000*60*60*24));
    byDay[d] = (byDay[d]||0)+r.tickets;
    if(d > lastDayWithData) lastDayWithData = d;
  });
  return {byDay, lastDayWithData, start};
}

function chartOpts(){
  return {responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
    plugins:{legend:{display:false}},
    scales:{x:{ticks:{maxTicksLimit:10,color:'#8FA999'},grid:{display:false}}, y:{ticks:{color:'#8FA999'},grid:{color:'rgba(143,169,153,0.15)'}}}};
}

function destroyChart(id){
  if(chartInstances[id]){ chartInstances[id].destroy(); delete chartInstances[id]; }
}

function renderCumChart(brandKey, rows, year, compareYear, cat){
  const years = compareYear ? [year, compareYear] : [year];
  document.getElementById('legendDaily1_'+brandKey).innerHTML = years.map((y,i)=>`<span><span class="dot" style="background:${PALETTE[i]}"></span>${y}</span>`).join('');
  const seriesList = years.map(y=>buildDailySeries(rows, y, cat));
  const maxDay = Math.max(1, ...seriesList.map(s=>s.lastDayWithData));
  const labels = Array.from({length:maxDay+1}, (_,i)=>"Day "+i);
  const datasets = seriesList.map((s,i)=>{
    let cum=0;
    const data = labels.map((_,d)=>{
      if(d > s.lastDayWithData) return null;
      cum += (s.byDay[d]||0);
      return cum;
    });
    return {label:String(years[i]), data, borderColor:PALETTE[i], backgroundColor:'transparent', borderWidth:2.5, pointRadius:0, tension:0.15, spanGaps:false};
  });
  const id = 'cumChart_'+brandKey;
  destroyChart(id);
  chartInstances[id] = new Chart(document.getElementById(id), {type:'line', data:{labels,datasets}, options:chartOpts()});
}

function renderDailyDeltaChart(brandKey, rows, year, compareYear, cat){
  const years = compareYear ? [year, compareYear] : [year];
  document.getElementById('legendDaily2_'+brandKey).innerHTML = years.map((y,i)=>`<span><span class="dot" style="background:${PALETTE[i]}"></span>${y}</span>`).join('');
  const seriesList = years.map(y=>buildDailySeries(rows, y, cat));
  const maxDay = Math.max(1, ...seriesList.map(s=>s.lastDayWithData));
  const labels = Array.from({length:maxDay+1}, (_,i)=>"Day "+i);
  const datasets = seriesList.map((s,i)=>({
    label:String(years[i]),
    data: labels.map((_,d)=> d > s.lastDayWithData ? null : (s.byDay[d]||0)),
    borderColor:PALETTE[i], backgroundColor:'transparent', borderWidth:2, pointRadius:0, tension:0.2, spanGaps:false
  }));
  const id = 'dailyDeltaChart_'+brandKey;
  destroyChart(id);
  chartInstances[id] = new Chart(document.getElementById(id), {type:'line', data:{labels,datasets}, options:chartOpts()});
}

function renderPaceChart(brandKey, rows, year, settings){
  const yr = rows.filter(r=>String(r['Year'])===String(year));
  const dated = yr.map(r=>({date:dayKey(r['Date cleaned (DD/MM/YYYY)']), tickets:parseInt(r['Ticket Count'])||0})).filter(r=>!isNaN(r.date));
  dated.sort((a,b)=>a.date-b.date);
  const start = dated.length?dated[0].date:new Date();
  const byDay = {};
  let lastDayWithData = 0;
  dated.forEach(r=>{
    const d = Math.round((r.date-start)/(1000*60*60*24));
    byDay[d] = (byDay[d]||0)+r.tickets;
    if(d>lastDayWithData) lastDayWithData = d;
  });

  const phases = (settings.phases||[]).filter(p=>p.name && p.start && p.end && p.target)
    .map(p=>({...p, startOffset:Math.round((new Date(p.start)-start)/(1000*60*60*24)), endOffset:Math.round((new Date(p.end)-start)/(1000*60*60*24))}))
    .sort((a,b)=>a.startOffset-b.startOffset);

  const maxDay = Math.max(1, lastDayWithData, ...phases.map(p=>p.endOffset));

  let cum = 0;
  const actual = [];
  for(let d=0; d<=maxDay; d++){
    if(d > lastDayWithData){ actual.push(null); continue; }
    cum += (byDay[d]||0);
    actual.push(cum);
  }

  const target = new Array(maxDay+1).fill(null);
  let runningTarget = 0;
  phases.forEach(phase=>{
    const phaseDays = Math.max(1, phase.endOffset - phase.startOffset + 1);
    const dailyRate = parseFloat(phase.target)/phaseDays;
    for(let d=phase.startOffset; d<=phase.endOffset && d<=maxDay; d++){
      runningTarget += dailyRate;
      target[d] = runningTarget;
    }
  });

  const labels = actual.map((_,i)=>"Day "+i);
  const id = 'paceChart_'+brandKey;
  destroyChart(id);
  chartInstances[id] = new Chart(document.getElementById(id), {
    type:'line',
    data:{labels, datasets:[
      {label:'Actual', data:actual, borderColor:'#378ADD', backgroundColor:'transparent', borderWidth:2.5, pointRadius:0, tension:0.15, spanGaps:false},
      {label:'Target pace', data:target, borderColor:'#FF6A3D', backgroundColor:'rgba(232,105,74,0.18)', borderWidth:2, borderDash:[6,4], pointRadius:0, tension:0, fill:'-1', spanGaps:false}
    ]},
    options:{
      responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            afterBody: function(items){
              const d = items[0].dataIndex;
              const a = actual[d], t = target[d];
              if(a===null || t===null) return '';
              const gap = a - t;
              const sign = gap >= 0 ? '+' : '';
              const lbl = gap >= 0 ? 'overachieving' : 'behind target';
              return 'Gap: '+sign+fmtNum(gap)+' ('+lbl+')';
            }
          }
        }
      },
      scales:{x:{ticks:{maxTicksLimit:10,color:'#8FA999'},grid:{display:false}}, y:{ticks:{color:'#8FA999'},grid:{color:'rgba(143,169,153,0.15)'}}}
    }
  });
}

/* ---- Save settings ---- */

async function saveSettingsFor(brandKey){
  const statusId = brandKey==='tsr' ? 'saveStatusTSR' : 'saveStatusRL';
  const eventDate = document.getElementById('eventDate_'+brandKey).value;
  const year = document.getElementById('settingsYear_'+brandKey).value;
  const phases = [];
  let missingTarget = false;
  document.querySelectorAll('#phaseDefRows_'+brandKey+' .phase-def-row').forEach(row=>{
    const name = row.querySelector('.pd-name').value;
    const start = row.querySelector('.pd-start').value;
    const end = row.querySelector('.pd-end').value;
    const target = row.querySelector('.pd-target').value;
    if(name){
      if(!target) missingTarget = true;
      phases.push({name, start, end, target});
    }
  });
  if(missingTarget){
    const el = document.getElementById(statusId);
    el.textContent = "Every phase needs a ticket target";
    el.style.color = "var(--bad)";
    setTimeout(()=>{el.textContent=""; el.style.color="var(--good)";}, 2500);
    return;
  }

  let settings = {eventDate, year, phases};
  if(brandKey==='tsr'){
    settings.membersPerTeam = document.getElementById('membersPerTeam_tsr').value || 2;
  } else if(brandKey==='rl'){
    settings.doublesMembers = document.getElementById('doublesMembers_rl').value || 1;
    settings.teamRelayMembers = document.getElementById('teamRelayMembers_rl').value || 3;
  }

  brandData[brandKey].settings = settings;
  const el = document.getElementById(statusId);
  try{
    await fetch(BRANDS[brandKey].apiUrl, {method:"POST", body: JSON.stringify({type:"settings", data:settings})});
    el.textContent = "Saved ✓";
  }catch(e){
    el.textContent = "Failed to save";
  }
  setTimeout(()=>el.textContent="", 2000);
  renderSRBody(brandKey);
}

loadAll();
