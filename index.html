<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresh Events — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
<style>
  :root{
    --bg:#0E1A14; --panel:#142319; --panel-2:#192B1E; --line:#27402F;
    --text:#EAF2EC; --text-dim:#8FA999; --accent:#FF6A3D; --accent2:#378ADD;
    --good:#6FCF97; --bad:#E8694A; --muted:#4A6657;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter','Segoe UI',Helvetica,Arial,sans-serif;}
  .app{padding:28px 40px 64px; max-width:1280px; margin:0 auto; padding-top:20px;}
  @media (max-width:680px){
    .app{padding:18px 16px 48px; padding-top:16px;}
    .target-grid{grid-template-columns:1fr;}
    .filter-row{gap:8px;}
  }

  .nav{display:flex; align-items:center; gap:6px; padding:14px 40px; border-bottom:1px solid var(--line); background:var(--bg); position:sticky; top:0; z-index:100; flex-wrap:wrap;}
  .nav-links{display:flex; gap:6px; align-items:center; flex:1;}
  .hamburger{display:none; background:transparent; border:none; color:var(--text); font-size:22px; cursor:pointer; padding:4px 8px; margin-left:auto;}
  .nav-mobile-menu{display:none; flex-direction:column; gap:4px; padding:8px 0 4px; width:100%; border-top:1px solid var(--line); margin-top:8px;}
  .nav-mobile-menu.open{display:flex;}
  @media (max-width:600px){
    .nav{padding:12px 16px; flex-wrap:wrap;}
    .nav-links{display:none;}
    .hamburger{display:block;}
  }
  .nav-logo{height:32px; width:auto; object-fit:contain; margin-right:8px;}
  .nav-btn{background:transparent; border:none; color:var(--text-dim); padding:8px 14px; border-radius:7px; font-size:13.5px; font-weight:600; cursor:pointer;}
  .nav-btn.active{background:var(--panel); color:var(--text);}
  .nav-btn:hover:not(.active){color:var(--text);}
  .brand-logo{height:80px; width:auto; max-width:320px; object-fit:contain; margin-bottom:16px; display:block;}
  .page-header{margin-bottom:4px;}

  h1{font-size:26px;margin:0 0 4px;}
  h2.page-title{font-size:22px;margin:0 0 4px;}
  .sub{color:var(--text-dim);font-size:13px;margin-bottom:22px;}
  .status{font-size:12.5px;color:var(--text-dim);margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}

  button{background:var(--accent);color:#0E1A14;border:none;padding:8px 16px;border-radius:6px;font-weight:600;font-size:13px;cursor:pointer;}
  button:hover{opacity:0.9;}
  button.secondary{background:var(--panel-2);color:var(--text);border:1px solid var(--line);}
  select{background:var(--panel-2);color:var(--text);border:1px solid var(--line);padding:7px 10px;border-radius:6px;font-size:13px;}

  .metrics{display:grid;grid-template-columns:repeat(4, 1fr);gap:12px;margin-bottom:22px;}
  @media (max-width:900px){ .metrics{grid-template-columns:repeat(2,1fr);} }
  @media (max-width:480px){ .metrics{grid-template-columns:1fr;} }
  .metric{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px 18px;}
  .metric .label{font-size:10.5px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-dim);margin-bottom:6px;}
  .metric .val{font-size:22px;font-weight:700;}
  .metric .delta{font-size:11.5px;margin-top:5px;font-weight:600;}
  .delta.up{color:var(--good);} .delta.down{color:var(--bad);} .delta.flat{color:var(--text-dim);}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:20px 24px;margin-bottom:20px;}
  .panel h2{font-size:13px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-dim);margin:0 0 16px;}
  .panel-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px;}
  .panel-head h2{margin:0;}

  .brand-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  @media (max-width:700px){ .brand-grid{grid-template-columns:1fr;} }
  .overview-brand-row{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:0; align-items:stretch;}
  @media (max-width:700px){ .overview-brand-row{grid-template-columns:1fr;} }
  .overview-yoy-panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px 22px; display:flex; flex-direction:column;}
  .brand-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px 22px; display:flex; flex-direction:column;}
  .brand-card.empty{opacity:0.55;}
  .brand-card h3{margin:0 0 2px; font-size:17px;}
  .brand-card .yr{font-size:12px;color:var(--text-dim);margin-bottom:14px;}
  .brand-metric-row{display:flex; justify-content:space-between; align-items:baseline; padding:7px 0; border-bottom:1px solid var(--line); gap:12px;}
  .brand-metric-row:last-child{border-bottom:none;}
  .brand-metric-row .bl{font-size:12px; color:var(--text-dim); flex-shrink:0;}
  .brand-metric-row .bvals{display:flex; align-items:baseline; gap:5px; flex-wrap:nowrap;}
  .brand-metric-row .bv{font-size:13.5px; font-weight:700; white-space:nowrap;}
  .brand-metric-row .bd{font-size:10.5px; font-weight:600; white-space:nowrap;}
  .brand-metric-row .bprev{font-size:10.5px; color:var(--text-dim); font-weight:400; white-space:nowrap;}
  .nodata-tag{display:inline-block; font-size:10.5px; background:var(--panel-2); color:var(--text-dim); padding:3px 9px; border-radius:20px; margin-top:6px;}

  details.settings{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:20px;}
  details.settings summary{cursor:pointer; padding:16px 22px; font-size:13.5px; font-weight:600; list-style:none; display:flex; align-items:center; gap:8px;}
  details.settings summary::-webkit-details-marker{display:none;}
  details.settings summary:before{content:"▸"; transition:transform 0.15s; color:var(--accent);}
  details.settings[open] summary:before{transform:rotate(90deg);}
  .settings-body{padding:0 22px 20px;}
  .target-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:14px;}
  label{font-size:12px;color:var(--text-dim);display:block;margin-bottom:4px;}
  input{width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--text);padding:8px 10px;border-radius:6px;font-size:13.5px;}
  input[type="date"]{color-scheme:dark;}
  input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:0.7;cursor:pointer;}
  .save-row{display:flex;align-items:center;gap:10px;margin-top:6px;}
  #saveStatusTSR, #saveStatusRL{font-size:12px;color:var(--good);}
  .req-note{font-size:11.5px; color:var(--accent); margin:2px 0 10px;}

  .phase-def-row{display:grid; grid-template-columns:1.2fr 1fr 1fr 0.8fr auto; gap:8px; align-items:end; margin-bottom:8px; padding-bottom:12px; border-bottom:1px solid var(--line);}
  .phase-def-row input{font-size:13px;}
  @media (max-width:680px){
    .phase-def-row{grid-template-columns:1fr 1fr; grid-template-areas:"name name" "start end" "target target" "remove remove"; margin-bottom:14px; padding-bottom:14px;}
    .phase-def-row > div:nth-child(1){grid-area:name;}
    .phase-def-row > div:nth-child(2){grid-area:start;}
    .phase-def-row > div:nth-child(3){grid-area:end;}
    .phase-def-row > div:nth-child(4){grid-area:target;}
    .phase-def-row .rm-phase{grid-area:remove; width:100%;}
  }
  .rm-phase{background:var(--panel-2); color:var(--bad); border:1px solid var(--line); padding:7px 10px; font-size:12px;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:right;font-size:10.5px;text-transform:uppercase;color:var(--text-dim);padding:0 0 8px;border-bottom:1px solid var(--line);}
  th:first-child,td:first-child{text-align:left;}
  td{padding:9px 0;border-bottom:1px solid var(--line);}
  tr:last-child td{border-bottom:none;}
  .table-scroll{overflow-x:auto; -webkit-overflow-scrolling:touch;}
  @media (max-width:680px){ table{font-size:11px;} th{padding:0 3px 6px; font-size:9.5px;} td{padding:6px 3px;} }

  .chart-wrap{position:relative;height:300px;}
  .filter-row{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
  .legend-row{display:flex; gap:18px; font-size:12px; color:var(--text-dim); margin-bottom:10px; flex-wrap:wrap;}
  .legend-row span{display:inline-flex; align-items:center; gap:6px;}
  .dot{width:9px;height:9px;border-radius:2px;display:inline-block;}
</style>
</head>
<body>
<div class="app">

  <div class="nav">
    <div style="font-size:15px; font-weight:700; letter-spacing:0.02em; margin-right:12px; white-space:nowrap;">Fresh Events Dashboard</div>
    <div class="nav-links">
      <button class="nav-btn active" id="navOverview" onclick="goPage('overview')">Overview</button>
      <button class="nav-btn" id="navTSR" onclick="goPage('tsr')">The Sky Race</button>
      <button class="nav-btn" id="navRL" onclick="goPage('rl')">REDLINE</button>
      <button class="nav-btn" id="navTMR" onclick="goPage('tmr')">The Music Run</button>
    </div>
    <button class="hamburger" id="hamburgerBtn" onclick="toggleMobileMenu()" aria-label="Menu">☰</button>
    <div class="nav-mobile-menu" id="mobileMenu">
      <button class="nav-btn active" id="navOverviewM" onclick="goPage('overview');toggleMobileMenu()">Overview</button>
      <button class="nav-btn" id="navTSRM" onclick="goPage('tsr');toggleMobileMenu()">The Sky Race</button>
      <button class="nav-btn" id="navRLM" onclick="goPage('rl');toggleMobileMenu()">REDLINE</button>
      <button class="nav-btn" id="navTMRM" onclick="goPage('tmr');toggleMobileMenu()">The Music Run</button>
    </div>
  </div>

  <!-- ===================== OVERVIEW PAGE ===================== -->
  <div id="page-overview">
    <img src="images/FE_logo_Master_White%20BG_RGB_white%20text.png" alt="Fresh Events" style="height:80px; width:auto; object-fit:contain; display:block; margin-top:24px; margin-bottom:8px;">
    <div class="sub">All brands · most recent event year vs previous year</div>
    <div class="status"><span id="statusLineOverview">Loading…</span><button class="secondary" onclick="loadAll()">Refresh</button></div>
    <div id="brandGrid"></div>
  </div>

  <!-- ===================== TEMPLATE: rendered for both TSR and RL ===================== -->
  <div id="page-tsr" style="display:none;"></div>
  <div id="page-rl" style="display:none;"></div>
  <div id="page-tmr" style="display:none;"></div>

</div>

<script>
/* =================== BRAND CONFIG =================== */
const BRANDS = {
  tsr: {
    key:'tsr', label:'The Sky Race', eventNameMatch:'sky race',
    apiUrl: "https://script.google.com/macros/s/AKfycbzX9-ViY02n6L1LbwRh3IBvRnu0GBi99MPiqOb_TDQe0kVZbn2tQBnlBVx33YQ4Rptt/exec",
    schema:'tsr'
  },
  rl: {
    key:'rl', label:'REDLINE', eventNameMatch:'redline',
    apiUrl: "https://script.google.com/macros/s/AKfycbzL0dPJSh_ZQVl3hrYv5XhVigWnsfKog86Nbj3c83m0O4EbH4nJRAVBOSU1pq55LjXWwg/exec",
    schema:'rl'
  },
  tmr: {
    key:'tmr', label:'The Music Run', eventNameMatch:'music run',
    apiUrl: "https://script.google.com/macros/s/AKfycbzD1znvnMzpqvKM9zPZPoStVE0xb9vEhhmHojp8xdn3B1wNLninkGQgwIxLwLaz3CNvHg/exec",
    schema:'tmr'
  }
};
const phaseOrder = ["Save the Date","Save the date","Lead Gen","Pre-Sale","Loyalty","Super Early Bird","Early Bird","Regular","Waitlist"];
const PALETTE = ["#378ADD","#4A6657","#FF6A3D","#C77DFF","#6FCF97","#E8694A"];

// Extract event year from Event Name (e.g. "REDLINE 2027" → "2027")
// Falls back to Year column if no year found in Event Name
function getEventYear(r){
  const name = (r['Event Name']||'').toString();
  const m = name.match(/\b(20\d{2})\b/);
  if(m) return m[1];
  return String(r['Year']||'');
}

let brandData = {}; // {tsr:{rows:[...], settings:{...}}, rl:{rows:[...], settings:{...}}}
let chartInstances = {}; // keyed by canvas id

function fmtNum(n){ return Math.round(n).toLocaleString(); }
function fmtMoney(n){ return 'RM' + Math.round(n).toLocaleString(); }

function toggleMobileMenu(){
  const menu = document.getElementById('mobileMenu');
  menu.classList.toggle('open');
}

function goPage(p){
  ['overview','tsr','rl','tmr'].forEach(page=>{
    document.getElementById('page-'+page).style.display = p===page ? '' : 'none';
  });
  ['navOverview','navTSR','navRL','navTMR'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.classList.toggle('active', id.toLowerCase().includes(p==='overview'?'overview':p));
  });
  ['navOverviewM','navTSRM','navRLM','navTMRM'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.classList.toggle('active', id.toLowerCase().includes(p==='overview'?'overview':p));
  });
  // render brand page on tab click - always re-render if data available
  if(p!=='overview' && brandData[p]){
    renderBrandPage(p);
  }
}

async function fetchJSON(url, opts){ const res = await fetch(url, opts); return await res.json(); }

async function loadAll(){
  document.getElementById('statusLineOverview').textContent = "Loading live data…";
  
  const brandKeys = Object.keys(BRANDS);
  await Promise.all(brandKeys.map(async key=>{
    const brand = BRANDS[key];
    let rows = [], settings = {eventDate:null, year:null, phases:[]};
    try{ rows = await fetchJSON(brand.apiUrl + "?action=data"); }catch(e){ rows = []; }
    try{
      const s = await fetchJSON(brand.apiUrl + "?action=getSettings");
      if(s && s.phases!==undefined) settings = s;
    }catch(e){}
    brandData[key] = {rows, settings};
  }));

  const totalRows = Object.values(brandData).reduce((a,b)=>a+b.rows.length,0);
  const myt = new Date().toLocaleTimeString('en-MY',{timeZone:'Asia/Kuala_Lumpur',hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('statusLineOverview').textContent = "Live — " + totalRows + " total records · updated " + myt + " MYT";

  renderOverview();
  // after data loads, re-render any already-visited brand pages with fresh data
  if(pageInitialized['tsr']) renderBrandPage('tsr');
  if(pageInitialized['rl']) renderBrandPage('rl');
  if(pageInitialized['tmr']) renderBrandPage('tmr');
}

/* =================== SHARED CALC HELPERS =================== */

function computeBrandYearMetrics(rows, year, brandKey, settings){
  const yr = rows.filter(r => getEventYear(r) === String(year));
  const regTickets = yr.reduce((a,r)=>a+(parseInt(r['Ticket Count'])||0),0);
  const regRev = yr.reduce((a,r)=>a+(parseFloat(r['Registration Rev'])||0),0);
  const prodRev = yr.reduce((a,r)=>a+(parseFloat(r['Products Rev'])||0),0);
  const totalRev = regRev + prodRev;

  let unreg = 0;
  const isOne = v => v===1 || v==='1' || v===true || Number(v)===1;
  if(brandKey === 'tsr'){    const mpt = settings && settings.membersPerTeam ? parseInt(settings.membersPerTeam) : 2;
    const teamRows = yr.filter(r => r['Category']==='Team');
    const teamsFormed = teamRows.filter(r => isOne(r['Team Captain'])).length;
    const registeredTeamMembers = teamRows.filter(r => isOne(r['Team Member'])).length;
    unreg = Math.max(0, teamsFormed*mpt - registeredTeamMembers);
  } else if(brandKey === 'rl'){
    const dm = settings && settings.doublesMembers ? parseInt(settings.doublesMembers) : 1;
    const trm = settings && settings.teamRelayMembers ? parseInt(settings.teamRelayMembers) : 3;
    const doublesRows = yr.filter(r => r['Category']==='Doubles');
    const doublesTeams = doublesRows.filter(r => isOne(r['Doubles Captain'])).length;
    const doublesRegMembers = doublesRows.filter(r => isOne(r['Doubles Member'])).length;
    const unregDoubles = Math.max(0, doublesTeams*dm - doublesRegMembers);

    const relayRows = yr.filter(r => r['Category']==='Team Relay');
    const relayTeams = relayRows.filter(r => isOne(r['Team Relay Captain'])).length;
    const relayRegMembers = relayRows.filter(r => isOne(r['Team Relay Member'])).length;
    const unregRelay = Math.max(0, relayTeams*trm - relayRegMembers);

    unreg = unregDoubles + unregRelay;
  }
  const totalTicketsRegUnreg = regTickets + unreg;
  return {regTickets, totalTicketsRegUnreg, regRev, prodRev, totalRev, unreg};
}

function deltaSpan(curr, prev){
  if(prev === null || prev === undefined || prev === 0 || curr===null) return '<span class="bd" style="color:var(--text-dim)">—</span>';
  const d = (curr-prev)/prev*100;
  const color = d>=0 ? 'var(--good)' : 'var(--bad)';
  return '<span class="bd" style="color:'+color+'">'+(d>=0?'▲':'▼')+' '+Math.abs(d).toFixed(0)+'%</span>';
}

function brandRowsFor(brandKey, countryVal){
  const data = brandData[brandKey];
  if(!data) return [];
  let rows = data.rows;
  if(countryVal && countryVal!=='all') rows = rows.filter(r=>r['Country']===countryVal);
  return rows;
}

/* =================== OVERVIEW PAGE =================== */

function populateCountryFilter(selectEl, rows){
  const countries = [...new Set(rows.map(r=>r['Country']).filter(Boolean))].sort();
  const prevVal = selectEl.value;
  selectEl.innerHTML = '<option value="all">All countries</option>' + countries.map(c=>`<option value="${c}">${c}</option>`).join('');
  if(prevVal && (prevVal==='all' || countries.includes(prevVal))){
    selectEl.value = prevVal;
  } else if(countries.includes('Malaysia')){
    selectEl.value = 'Malaysia';
  } else {
    selectEl.value = 'all';
  }
}

function renderOverview(){
  const brandList = [
    {key:'tsr', label:'The Sky Race'},
    {key:'rl', label:'REDLINE'},
    {key:'tmr', label:'The Music Run'},
    {key:'dua', label:'DUA'}
  ];

  const grid = document.getElementById('brandGrid');
  grid.innerHTML = "";
  brandList.forEach(b=>{
    const data = brandData[b.key];
    if(!data || data.rows.length === 0){
      grid.innerHTML += `<div class="overview-brand-row"><div class="brand-card empty"><h3>${b.label}</h3><span class="nodata-tag">No data yet</span></div><div></div></div>`;
      return;
    }

    const countries = [...new Set(data.rows.map(r=>r['Country']).filter(Boolean))].sort();
    const defaultCountry = countries.includes('Malaysia') ? 'Malaysia' : 'all';
    const countryId = `overviewCountry_${b.key}`;
    const existingEl = document.getElementById(countryId);
    const selectedCountry = existingEl ? existingEl.value : defaultCountry;
    const countryOpts = '<option value="all">All</option>' + countries.map(c=>`<option value="${c}"${c===selectedCountry?' selected':''}>${c}</option>`).join('');

    const filteredRows = selectedCountry==='all' ? data.rows : data.rows.filter(r=>r['Country']===selectedCountry);
    const years = [...new Set(data.rows.map(r=>getEventYear(r)).filter(Boolean))].sort();
    const latestYear = years[years.length-1];
    const prevYear = years.length>1 ? years[years.length-2] : null;

    const currRows = filteredRows.filter(r=>getEventYear(r)===String(latestYear));
    const prevRows = prevYear ? filteredRows.filter(r=>getEventYear(r)===String(prevYear)) : null;

    if(currRows.length === 0){
      grid.innerHTML += `<div style="margin-bottom:16px;">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
          <span style="font-size:13px; font-weight:600;">${b.label}</span>
          <select id="${countryId}" onchange="renderOverview()" style="font-size:12px; padding:3px 6px;">${countryOpts}</select>
        </div>
        <div class="brand-card"><span class="nodata-tag">No data for selected country</span></div>
      </div>`;
      return;
    }

    const curr = computeBrandYearMetrics(currRows, latestYear, b.key, data.settings);
    const prev = prevRows && prevRows.length>0 ? computeBrandYearMetrics(prevRows, prevYear, b.key, data.settings) : null;

    function row(label, currVal, prevVal, fmt){
      const prevStr = (prevVal!==null && prevVal!==undefined) ? ` <span class="bprev">(${fmt(prevVal)})</span>` : '';
      return `<div class="brand-metric-row"><span class="bl">${label}</span><div class="bvals"><span class="bv">${fmt(currVal)}</span>${deltaSpan(currVal, prevVal)}${prevStr}</div></div>`;
    }

    grid.innerHTML += `<div style="margin-bottom:16px;">
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
        <span style="font-size:13px; font-weight:600;">${b.label}</span>
        <select id="${countryId}" onchange="renderOverview()" style="font-size:12px; padding:3px 6px;">${countryOpts}</select>
      </div>
      <div class="overview-brand-row">
        <div class="brand-card">
          <div class="yr" style="margin-bottom:10px;">Event year ${latestYear}${prevYear?' vs '+prevYear:' (no prior year)'}</div>
          ${row('Tickets sold (reg+unreg)', curr.totalTicketsRegUnreg, prev?prev.totalTicketsRegUnreg:null, fmtNum)}
          ${row('Registered tickets', curr.regTickets, prev?prev.regTickets:null, fmtNum)}
          ${row('Total revenue', curr.totalRev, prev?prev.totalRev:null, fmtMoney)}
          ${row('Ticket revenue', curr.regRev, prev?prev.regRev:null, fmtMoney)}
          ${row('Add-on revenue', curr.prodRev, prev?prev.prodRev:null, fmtMoney)}
        </div>
        <div class="overview-yoy-panel">
          <div style="font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-dim); margin-bottom:12px;">Year-on-Year — All Years</div>
          <div style="flex:1; position:relative; min-height:180px;"><canvas id="yoyChart_${b.key}"></canvas></div>
        </div>
      </div>
    </div>`;

    // render YOY chart after DOM is updated
    setTimeout(()=>renderYOYChart(b.key, filteredRows, years, data.settings), 0);
  });
}

function renderYOYChart(brandKey, rows, years, settings){
  const ctx = document.getElementById('yoyChart_'+brandKey);
  if(!ctx) return;
  destroyChart('yoyChart_'+brandKey);

  const revData = [], ticketData = [];
  years.forEach(yr=>{
    const yrRows = rows.filter(r=>getEventYear(r)===String(yr));
    const m = computeBrandYearMetrics(yrRows, yr, brandKey, settings);
    revData.push(m.totalRev);
    ticketData.push(m.totalTicketsRegUnreg);
  });

  chartInstances['yoyChart_'+brandKey] = new Chart(ctx, {
    type:'bar',
    data:{
      labels: years,
      datasets:[
        {

function initBrandPage(brandKey){
  document.getElementById('page-'+brandKey).innerHTML = brandPageHTML(brandKey);
  document.getElementById('yearFilter_'+brandKey).addEventListener('change', ()=>renderSRBody(brandKey));
  document.getElementById('compareYearFilter_'+brandKey).addEventListener('change', ()=>renderSRBody(brandKey));
  document.getElementById('countryFilter_'+brandKey).addEventListener('change', ()=>renderSRBody(brandKey));
  document.getElementById('compareCountryFilter_'+brandKey).addEventListener('change', ()=>renderSRBody(brandKey));
  document.getElementById('catFilter1_'+brandKey).addEventListener('change', ()=>renderSRBody(brandKey));
  document.getElementById('catFilter2_'+brandKey).addEventListener('change', ()=>renderSRBody(brandKey));
  document.getElementById('ticketFilter1_'+brandKey).addEventListener('change', ()=>renderSRBody(brandKey));
  document.getElementById('ticketFilter2_'+brandKey).addEventListener('change', ()=>renderSRBody(brandKey));
  document.getElementById('catFilterRev_'+brandKey).addEventListener('change', ()=>renderSRBody(brandKey));
  document.getElementById('subEventDateFrom_'+brandKey).addEventListener('change', ()=>renderSRBody(brandKey));
  document.getElementById('subEventDateTo_'+brandKey).addEventListener('change', ()=>renderSRBody(brandKey));
  function reRenderAudience(){
    const allRows = srRowsFor(brandKey);
    const year = document.getElementById('yearFilter_'+brandKey).value;
    const compareYear = document.getElementById('compareYearFilter_'+brandKey).value;
    const country = document.getElementById('countryFilter_'+brandKey).value;
    const compareCountry = document.getElementById('compareCountryFilter_'+brandKey).value;
    function filterRows(yr, ctry){ return allRows.filter(r=>getEventYear(r)===String(yr)&&(ctry==='all'||r['Country']===ctry)); }
    const viewRows = filterRows(year, country);
    const cmpRows = compareYear ? filterRows(compareYear, compareCountry) : null;
    try{ renderAudienceProfile(brandKey, viewRows, cmpRows, year, compareYear); }catch(e){ console.error('renderAudienceProfile',e); }
  }
  document.getElementById('audienceCatFilter_'+brandKey).addEventListener('change', reRenderAudience);
  document.getElementById('stateAgeFilter_'+brandKey).addEventListener('change', reRenderAudience);
  document.getElementById('ageGenderFilter_'+brandKey).addEventListener('change', reRenderAudience);
}

let pageInitialized = {tsr:false, rl:false, tmr:false};

function renderBrandPage(brandKey){
  if(!pageInitialized[brandKey]){
    initBrandPage(brandKey);
    pageInitialized[brandKey] = true;
  }
  const data = brandData[brandKey];
  if(!data) return;
  const mytBrand = new Date().toLocaleTimeString('en-MY',{timeZone:'Asia/Kuala_Lumpur',hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('statusLine_'+brandKey).textContent = "Live — " + data.rows.length + " records · updated " + mytBrand + " MYT";

  populateCountryFilter(document.getElementById('countryFilter_'+brandKey), data.rows);
  populateCountryFilter(document.getElementById('compareCountryFilter_'+brandKey), data.rows);
  populateYearFilters(brandKey);

  const s = data.settings;
  if(brandKey==='tsr'){
    const mptEl = document.getElementById('membersPerTeam_tsr');
    if(mptEl && mptEl.value === "" && s.membersPerTeam) mptEl.value = s.membersPerTeam;
  }
  if(brandKey==='rl'){
    const dmEl = document.getElementById('doublesMembers_rl');
    if(dmEl && dmEl.value === "" && s.doublesMembers) dmEl.value = s.doublesMembers;
    const trmEl = document.getElementById('teamRelayMembers_rl');
    if(trmEl && trmEl.value === "" && s.teamRelayMembers) trmEl.value = s.teamRelayMembers;
  }
  if(document.getElementById('phaseDefRows_'+brandKey).children.length === 0) renderPhaseDefRows(brandKey);

  renderSRBody(brandKey);
}

function srRowsFor(brandKey){
  const data = brandData[brandKey];
  if(!data) return [];
  return data.rows; // country filtering handled per-pair in renderSRBody
}

function populateYearFilters(brandKey){
  const rows = srRowsFor(brandKey);
  const years = [...new Set(rows.map(r=>getEventYear(r)))].sort();
  const yf = document.getElementById('yearFilter_'+brandKey);
  const cf = document.getElementById('compareYearFilter_'+brandKey);
  const prevYF = yf.value, prevCF = cf.value;
  yf.innerHTML = years.map(y=>`<option value="${y}">${y}</option>`).join('');
  cf.innerHTML = '<option value="">None</option>' + years.map(y=>`<option value="${y}">${y}</option>`).join('');
  yf.value = prevYF && years.includes(prevYF) ? prevYF : years[years.length-1];
  const defaultCompare = years.length>1 ? years[years.length-2] : "";
  cf.value = prevCF && years.includes(prevCF) ? prevCF : defaultCompare;
}

function isLatestYear(brandKey, year){
  const years = [...new Set(srRowsFor(brandKey).map(r=>getEventYear(r)))].sort();
  return String(year) === years[years.length-1];
}

function addPhaseDefRow(brandKey, name, start, end, target){

    <div><label>Phase name</label><input type="text" class="pd-name" value="${name}" placeholder="e.g. Early Bird"/></div>
    <div><label>Start date</label><input type="date" class="pd-start" value="${start}"/></div>

    <button type="button" class="rm-phase" onclick="this.parentElement.remove()">Remove</button>

}

function filteredByCategory(rows, cat){
  if(cat==='all') return rows;
  return rows.filter(r=>r['Category']===cat);
}

function renderSRBody(brandKey){
  const rows = srRowsFor(brandKey); // all rows, unfiltered by country
  if(rows.length===0) return;
  const year = document.getElementById('yearFilter_'+brandKey).value;
  const compareYear = document.getElementById('compareYearFilter_'+brandKey).value;
  const country = document.getElementById('countryFilter_'+brandKey).value;
  const compareCountry = document.getElementById('compareCountryFilter_'+brandKey).value;

  // filter rows by year+country for each view
  function filterRows(yr, ctry){
    return rows.filter(r=>getEventYear(r)===String(yr) && (ctry==='all'||r['Country']===ctry));
  }
  const viewRows = filterRows(year, country);
  const cmpRows = compareYear ? filterRows(compareYear, compareCountry) : null;
  const showSettings = isLatestYear(brandKey, year);
  document.getElementById('settingsPanel_'+brandKey).style.display = showSettings ? '' : 'none';
  document.getElementById('paceChartPanel_'+brandKey).style.display = showSettings ? '' : 'none';

  const settings = brandData[brandKey].settings;
  const curr = computeBrandYearMetrics(viewRows, year, brandKey, settings);
  const cmp = (compareYear && cmpRows) ? computeBrandYearMetrics(cmpRows, compareYear, brandKey, settings) : null;
  const avgPriceCurr = curr.regTickets ? curr.totalRev/curr.regTickets : 0;
  const avgPriceCmp = cmp && cmp.regTickets ? cmp.totalRev/cmp.regTickets : null;

  let runRateNeeded = null;
  let totalTarget = 0;
  let targetAchieved = false;
  let saleEnded = false;
  // get last phase end date from settings
  const phasesWithEnd = (settings.phases||[]).filter(p=>p.end).sort((a,b)=>parseMYT(a.end)-parseMYT(b.end));
  const lastPhaseEnd = phasesWithEnd.length ? parseMYT(phasesWithEnd[phasesWithEnd.length-1].end) : null;

  let shortBy = 0;
  if(showSettings && lastPhaseEnd){
    const phasesWithTarget = (settings.phases||[]).filter(p=>p.target);
    totalTarget = phasesWithTarget.reduce((a,p)=>a+(parseFloat(p.target)||0),0);
    if(totalTarget > 0){
      // "today" in MYT: offset UTC by +8 hours
      const nowUTC = new Date();
      const mytOffset = 8 * 60 * 60 * 1000;
      const nowMYTms = nowUTC.getTime() + mytOffset;
      const nowMYTDate = new Date(nowMYTms);
      const todayYMD = nowMYTDate.toISOString().slice(0,10);
      const todayMYT = parseMYT(todayYMD);
      saleEnded = todayMYT >= lastPhaseEnd;
      const daysLeft = Math.ceil((lastPhaseEnd-todayMYT)/(1000*60*60*24));
      if(curr.totalTicketsRegUnreg >= totalTarget){
        targetAchieved = true;
        runRateNeeded = 0;
      } else if(saleEnded){
        shortBy = totalTarget - curr.totalTicketsRegUnreg;
      } else {
        runRateNeeded = Math.max(0,(totalTarget-curr.totalTicketsRegUnreg))/Math.max(1,daysLeft);
      }
    }
  }

  // total campaign days: first sale date → last phase end date (viewing year)
  let totalCampaignDays = null;
  if(showSettings && lastPhaseEnd && viewRows.length > 0){
    const dates = viewRows.map(r=>parseMYT(r['Date cleaned (DD/MM/YYYY)'])).filter(d=>!isNaN(d));
    if(dates.length){
      const firstSaleDate = new Date(Math.min(...dates));
      totalCampaignDays = Math.round((lastPhaseEnd - firstSaleDate)/(1000*60*60*24));
    }
  }

  // compare year total days: first sale date → last available data date
  let cmpCampaignDays = null;
  if(compareYear && cmpRows && cmpRows.length > 0){
    const cmpDates = cmpRows.map(r=>parseMYT(r['Date cleaned (DD/MM/YYYY)'])).filter(d=>!isNaN(d));
    if(cmpDates.length){
      const cmpFirst = new Date(Math.min(...cmpDates));
      const cmpLast = new Date(Math.max(...cmpDates));
      cmpCampaignDays = Math.round((cmpLast - cmpFirst)/(1000*60*60*24));
    }
  }

  try{
    const pctToTarget = totalTarget > 0 ? Math.min(100, (curr.totalTicketsRegUnreg/totalTarget*100)) : null;
    const metricsEl = document.getElementById('metrics_'+brandKey);
    function card(label, val, cmpVal, fmt, noCompare){
      if(noCompare || !cmp){
        return `<div class="metric"><div class="label">${label}</div><div class="val">${fmt(val)}</div></div>`;
      }
      if(cmpVal===null || cmpVal===undefined){
        return `<div class="metric"><div class="label">${label}</div><div class="val">${fmt(val)}</div><div class="delta" style="color:var(--text-dim)">no data ${compareYear}</div></div>`;
      }
      const pctChange = cmpVal!==0 ? ((val-cmpVal)/cmpVal*100) : null;
      const up = val>=cmpVal;
      return `<div class="metric"><div class="label">${label}</div><div class="val">${fmt(val)}</div><div class="delta ${up?'up':'down'}">${up?'▲':'▼'} vs ${compareYear}: ${fmt(cmpVal)}${pctChange!==null?' ('+(pctChange>=0?'+':'')+pctChange.toFixed(1)+'%)':''}</div></div>`;
    }
    const progressCard = pctToTarget!==null ? `<div class="metric"><div class="label">% to target (reg+unreg)</div><div class="val">${pctToTarget.toFixed(1)}%</div><div style="background:var(--panel-2);border-radius:4px;height:8px;margin-top:8px;overflow:hidden;"><div style="height:100%;width:${pctToTarget}%;background:${pctToTarget>=100?'var(--good)':'var(--accent2)'};border-radius:4px;transition:width 0.4s;"></div></div><div style="font-size:11px;color:var(--text-dim);margin-top:4px;">${fmtNum(curr.totalTicketsRegUnreg)} / ${fmtNum(totalTarget)}</div></div>` : '';
    const runRateCard = showSettings ? `<div class="metric"><div class="label">${saleEnded && !targetAchieved ? 'Final result' : 'Daily run rate needed (overall)'}</div><div class="val" style="color:${targetAchieved?'var(--good)':saleEnded?'var(--bad)':'var(--text)'}">${targetAchieved ? '🎉 Target achieved!' : saleEnded ? `Short by ${fmtNum(shortBy)}` : runRateNeeded!==null ? fmtNum(runRateNeeded)+'/day' : 'set phase targets'}</div></div>` : '';
    const campaignDaysCard = showSettings && totalCampaignDays!==null ? `<div class="metric"><div class="label">Total campaign days (Day 0 → event date)</div><div class="val">${totalCampaignDays} days</div>${cmpCampaignDays!==null?`<div class="delta flat">${compareYear}: ${cmpCampaignDays} days (data range)</div>`:''}</div>` : '';
    metricsEl.innerHTML =
      card('Tickets sold (reg+unreg)', curr.totalTicketsRegUnreg, cmp?cmp.totalTicketsRegUnreg:null, fmtNum) +
      card('Registered tickets', curr.regTickets, cmp?cmp.regTickets:null, fmtNum) +
      card('Unregistered (team gap)', curr.unreg, null, fmtNum, true) +
      card('Total revenue', curr.totalRev, cmp?cmp.totalRev:null, fmtMoney) +
      card('Registration revenue', curr.regRev, cmp?cmp.regRev:null, fmtMoney) +
      card('Add-on revenue', curr.prodRev, cmp?cmp.prodRev:null, fmtMoney) +
      card('Avg ticket price', avgPriceCurr, avgPriceCmp, fmtMoney) +
      progressCard + runRateCard + campaignDaysCard;
  }catch(e){ console.error('metrics render',e.message, e.stack); }

  try{ renderPhaseTable(brandKey, viewRows, cmpRows, year, compareYear); }catch(e){ console.error('renderPhaseTable',e.message, e.stack); }
  try{ renderSubEventTable(brandKey, viewRows, cmpRows, year, compareYear, settings); }catch(e){ console.error('renderSubEventTable',e.message, e.stack); }
  try{ renderCatPhaseTable(brandKey, viewRows, year); }catch(e){ console.error('renderCatPhaseTable',e.message, e.stack); }

  try{ renderDailyDeltaChart(brandKey, rows, year, compareYear, document.getElementById('catFilter2_'+brandKey).value, country, compareCountry, document.getElementById('ticketFilter2_'+brandKey).value); }catch(e){ console.error('renderDailyDeltaChart',e.message, e.stack); }
  if(showSettings) try{ renderPaceChart(brandKey, viewRows, year, settings); }catch(e){ console.error('renderPaceChart',e.message, e.stack); }
  try{ renderRevChart(brandKey, rows, year, compareYear, document.getElementById('catFilterRev_'+brandKey).value, country, compareCountry); }catch(e){ console.error('renderRevChart',e.message, e.stack); }
}

/* ---- Phase performance table ---- */

function computePhaseBreakdown(rows, year){
  const yr = rows; // rows are already filtered by year+country
  const phases = {};
  yr.forEach(r=>{
    const p = r['Phase']; if(!p) return;
    if(!phases[p]) phases[p] = {tickets:0, revenue:0, days:new Set()};
    phases[p].tickets += parseInt(r['Ticket Count'])||0;
    phases[p].revenue += parseFloat(r['Total Registration + Product Rev'])||0;
    const d = r['Date cleaned (DD/MM/YYYY)'];
    if(d) phases[p].days.add(String(d).slice(0,10));
  });
  return phases;
}

function renderPhaseTable(brandKey, viewRows, cmpRows, year, compareYear){
  const phases = computePhaseBreakdown(viewRows, year);
  const cmpPhases = (compareYear && cmpRows) ? computePhaseBreakdown(cmpRows, compareYear) : null;
  const allNames = new Set(Object.keys(phases));
  if(cmpPhases) Object.keys(cmpPhases).forEach(n=>allNames.add(n));
  const names = [...allNames].sort((a,b)=>{
    const ia=phaseOrder.indexOf(a), ib=phaseOrder.indexOf(b);
    return (ia===-1?99:ia)-(ib===-1?99:ib);
  });

  function deltaCell(curr, prevExists, prevVal, fmt){
    if(!cmpPhases) return '';
    if(!prevExists) return ' <span style="color:var(--text-dim); font-size:11.5px;">(no match in '+compareYear+')</span>';
    const pctChange = prevVal!==0 ? ((curr-prevVal)/prevVal*100) : null;
    const up = curr>=prevVal;
    const color = up ? 'var(--good)' : 'var(--bad)';
    return ' <span style="color:'+color+'; font-size:11.5px;">'+(up?'▲':'▼')+' '+fmt(prevVal)+(pctChange!==null?' ('+(pctChange>=0?'+':'')+pctChange.toFixed(0)+'%)':'')+'</span>';
  }

  let html = '<table><thead><tr><th>Phase</th><th>Total Reg Tickets</th><th>Avg Daily Tickets</th><th>Total Revenue</th></tr></thead><tbody>';
  names.forEach(p=>{
    const d = phases[p];
    if(!d){
      html += `<tr><td>${p} <span style="color:var(--text-dim); font-size:11px;">(only in ${compareYear})</span></td><td style="text-align:right">—</td><td style="text-align:right">—</td><td style="text-align:right">—</td></tr>`;
      return;
    }
    const avgDaily = d.days.size ? d.tickets/d.days.size : d.tickets;
    const cd = cmpPhases ? cmpPhases[p] : null;
    const ticketsCell = fmtNum(d.tickets) + deltaCell(d.tickets, !!cd, cd?cd.tickets:null, fmtNum);
    const revCell = fmtMoney(d.revenue) + deltaCell(d.revenue, !!cd, cd?cd.revenue:null, fmtMoney);
    html += `<tr><td>${p}</td><td style="text-align:right">${ticketsCell}</td><td style="text-align:right">${Math.round(avgDaily)}</td><td style="text-align:right">${revCell}</td></tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('phaseTable_'+brandKey).innerHTML = html;
}

/* ---- Sub-event breakdown table (reg+unreg, per sub-event) ---- */

function computeSubEventBreakdown(rows, year, brandKey, settings){
  const yr = rows; // rows are already filtered by year+country
  const subEvents = {};
  const isOne = v => v===1 || v==='1' || v===true || Number(v)===1;
  const teamCatField = brandKey==='tsr' ? 'Team Category' : 'Double/ Team Category';

  yr.forEach(r=>{
    const se = r['Sub-Event']; if(!se) return;
    const cat = r['Category'];

    // for team-type rows, skip captain/member sub-events and group by team category instead
    if(brandKey==='tsr' && cat==='Team'){
      const teamCat = (r[teamCatField]||'Unknown').toString().trim();
      const key = 'Team — ' + teamCat;
      if(!subEvents[key]) subEvents[key] = {regTickets:0, category:'Team', captainCount:0, isTeamCat:true, teamType:'tsr_team'};
      if(isOne(r['Team Captain'])) subEvents[key].captainCount++;
      return;
    }
    if(brandKey==='rl' && cat==='Doubles'){
      const teamCat = (r[teamCatField]||'Unknown').toString().trim();
      // normalize: "Doubles Women" → "Women", "Doubles Mix" → "Mixed"
      const gender = teamCat.toLowerCase().includes('mix') ? 'Mixed' : teamCat.toLowerCase().includes('women') ? 'Women' : teamCat.toLowerCase().includes('men') ? 'Men' : teamCat;
      const key = 'Doubles — ' + gender;
      if(!subEvents[key]) subEvents[key] = {regTickets:0, category:'Doubles', captainCount:0, isTeamCat:true, teamType:'rl_doubles'};
      if(isOne(r['Doubles Captain'])) subEvents[key].captainCount++;
      return;
    }
    if(brandKey==='rl' && cat==='Team Relay'){
      const teamCat = (r[teamCatField]||'Unknown').toString().trim();
      const gender = teamCat.toLowerCase().includes('mix') ? 'Mixed' : teamCat.toLowerCase().includes('women') ? 'Women' : teamCat.toLowerCase().includes('men') ? 'Men' : teamCat;
      const key = 'Team Relay — ' + gender;
      if(!subEvents[key]) subEvents[key] = {regTickets:0, category:'Team Relay', captainCount:0, isTeamCat:true, teamType:'rl_relay'};
      if(isOne(r['Team Relay Captain'])) subEvents[key].captainCount++;
      return;
    }

    // individual/singles rows — use sub-event name as-is
    if(!subEvents[se]) subEvents[se] = {regTickets:0, category:cat, captainCount:0, isTeamCat:false};
    subEvents[se].regTickets += parseInt(r['Ticket Count'])||0;
  });

  // calculate totalRegUnreg for each entry
  Object.keys(subEvents).forEach(se=>{
    const d = subEvents[se];
    if(d.isTeamCat){
      // team category rows: captains × team size
      let multiplier = 1;
      if(d.teamType==='tsr_team') multiplier = settings && settings.membersPerTeam ? parseInt(settings.membersPerTeam)+1 : 3;
      if(d.teamType==='rl_doubles') multiplier = settings && settings.doublesMembers ? parseInt(settings.doublesMembers)+1 : 2;
      if(d.teamType==='rl_relay') multiplier = settings && settings.teamRelayMembers ? parseInt(settings.teamRelayMembers)+1 : 4;
      d.totalRegUnreg = d.captainCount * multiplier;
    } else {
      d.totalRegUnreg = d.regTickets;
    }
  });
  return subEvents;
}

function renderSubEventTable(brandKey, viewRows, cmpRows, year, compareYear, settings){
  // apply date range filter if set
  function toYMD(d){
    if(!d) return null;
    const s = d.toString().trim();
    // ISO timestamp (e.g. 2026-05-31T16:00:00.000Z) → convert to MYT date
    if(s.includes('T') || s.endsWith('Z')){
      const dt = new Date(s);
      if(isNaN(dt)) return null;
      // add UTC+8 offset
      const mytMs = dt.getTime() + 8*60*60*1000;
      return new Date(mytMs).toISOString().slice(0,10);
    }
    // DD/MM/YYYY
    const dmy = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if(dmy) return `${dmy[3]}-${dmy[2].padStart(2,'0')}-${dmy[1].padStart(2,'0')}`;
    // YYYY-MM-DD
    if(s.match(/^\d{4}-\d{2}-\d{2}/)) return s.slice(0,10);
    return null;
  }
  function applyDateFilter(rows){
    const fromEl = document.getElementById('subEventDateFrom_'+brandKey);
    const toEl = document.getElementById('subEventDateTo_'+brandKey);
    const fromVal = fromEl ? fromEl.value : ''; // YYYY-MM-DD from browser
    const toVal = toEl ? toEl.value : '';
    if(!fromVal && !toVal) return rows;
    // debug: log first row's date value
    if(rows.length) console.log('[dateFilter] sample date value:', rows[0]['Date cleaned (DD/MM/YYYY)'], '→ YMD:', toYMD(rows[0]['Date cleaned (DD/MM/YYYY)']), 'fromVal:', fromVal, 'toVal:', toVal);
    return rows.filter(r=>{
      const rowYMD = toYMD(r['Date cleaned (DD/MM/YYYY)']);
      if(!rowYMD) return false;
      if(fromVal && rowYMD < fromVal) return false;
      if(toVal && rowYMD > toVal) return false;
      return true;
    });
  }
  const filteredView = applyDateFilter(viewRows);
  const filteredCmp = cmpRows ? applyDateFilter(cmpRows) : null;

  const curr = computeSubEventBreakdown(filteredView, year, brandKey, settings);
  const cmp = (compareYear && filteredCmp) ? computeSubEventBreakdown(filteredCmp, compareYear, brandKey, settings) : null;
  const allNames = new Set(Object.keys(curr));
  if(cmp) Object.keys(cmp).forEach(n=>allNames.add(n));
  const names = [...allNames].sort();

  // determine grouping per sub-event category
  function getGroup(se, cat){
    if(brandKey==='tsr'){
      if(!cat || cat==='Individual') return 'Individual';
      if(cat==='Team') return 'Team';
      return 'Individual';
    } else {
      if(cat==='Singles') return 'Singles';
      if(cat==='Doubles') return 'Doubles';
      if(cat==='Team Relay') return 'Team Relay';
      return 'Singles';
    }
  }

  // define group order and labels
  const groupOrder = brandKey==='tsr' ? ['Individual','Team'] : brandKey==='rl' ? ['Singles','Doubles','Team Relay'] : ['Individual'];
  const subtotalLabels = brandKey==='tsr'
    ? {Individual:'TOTAL INDIVIDUALS', Team:'TOTAL TEAMS'}
    : brandKey==='rl'
    ? {Singles:'TOTAL SINGLES', Doubles:'TOTAL DOUBLES', 'Team Relay':'TOTAL TEAM RELAYS'}
    : {Individual:'TOTAL'};
  const pctLabels = brandKey==='tsr'
    ? {Individual:'INDIVIDUALS %', Team:'TEAMS %'}
    : brandKey==='rl'
    ? {Singles:'SINGLES %', Doubles:'DOUBLES %', 'Team Relay':'TEAM RELAYS %'}
    : {Individual:''}; // no % row for TMR (only 1 group)

  // group sub-events
  const grouped = {};
  groupOrder.forEach(g=>{ grouped[g] = []; });
  names.forEach(se=>{
    const cat = curr[se] ? curr[se].category : (cmp && cmp[se] ? cmp[se].category : null);
    const group = getGroup(se, cat);
    if(!grouped[group]) grouped[group] = [];
    grouped[group].push(se);
  });

  const hasCmp = !!cmp;
  const numCols = hasCmp ? 4 : 1;
  const colSpan = numCols + 1;

  function rowHtml(label, currVal, cmpVal, isSubtotal, isPct, grandTotal, cmpGrandTotal){
    const style = isSubtotal ? 'font-weight:700; background:rgba(255,255,255,0.04);' : '';
    const labelStyle = isPct ? 'color:var(--text-dim); font-size:12px; font-weight:700; background:rgba(255,255,255,0.02);' : '';
    let cells = `<td style="${style} ${labelStyle}">${label}</td>`;
    if(isPct){
      const p = grandTotal ? (currVal/grandTotal*100).toFixed(0)+'%' : '—';
      cells += `<td style="text-align:right; ${style} ${labelStyle}">${p}</td>`;
      if(hasCmp){
        const cp = cmpGrandTotal ? (cmpVal/cmpGrandTotal*100).toFixed(0)+'%' : '—';
        cells += `<td style="text-align:right; ${style} ${labelStyle}">${cp}</td><td></td>`;
      }
    } else if(isSubtotal){
      cells += `<td style="text-align:right; ${style}">${fmtNum(currVal)}</td>`;
      if(hasCmp){
        const pct = cmpVal!==0 ? ((currVal-cmpVal)/cmpVal*100) : null;
        const up = currVal>=cmpVal;
        cells += `<td style="text-align:right; ${style}">${fmtNum(cmpVal)}</td>`;
        cells += `<td style="text-align:right; ${style} color:${up?'var(--good)':'var(--bad)'}">${pct!==null?(pct>=0?'+':'')+pct.toFixed(0)+'%':'—'}</td>`;
      }
    } else {
      cells += `<td style="text-align:right">${currVal!==null?fmtNum(currVal):'—'}</td>`;
      if(hasCmp){
        if(cmpVal!==null && cmpVal!==undefined){
          const pct = cmpVal!==0 ? ((currVal-cmpVal)/cmpVal*100) : null;
          const up = currVal>=cmpVal;
          cells += `<td style="text-align:right">${fmtNum(cmpVal)}</td>`;
          cells += `<td style="text-align:right; color:${up?'var(--good)':'var(--bad)'}">${pct!==null?(pct>=0?'+':'')+pct.toFixed(0)+'%':'—'}</td>`;
        } else {
          cells += `<td style="text-align:right; color:var(--text-dim); font-size:11px;">no match</td><td>—</td>`;
        }
      }
    }
    return `<tr>${cells}</tr>`;
  }

  const yearHeader = hasCmp ? `<th>${year}</th><th>${compareYear}</th><th>YoY %</th>` : `<th>${year}</th>`;
  let html = `<table><thead><tr><th>Sub-Event</th>${yearHeader}</tr></thead><tbody>`;

  // pre-calculate grand totals first so % rows use correct denominator
  let grandCurr = 0, grandCmp = 0;
  groupOrder.forEach(group=>{
    grouped[group].forEach(se=>{
      const d = curr[se]; const cd = cmp ? cmp[se] : null;
      const cv = d ? d.totalRegUnreg : 0;
      const ccv = cd ? cd.totalRegUnreg : 0;
      if(cv===0 && ccv===0) return;
      if(cv) grandCurr += cv;
      if(ccv) grandCmp += ccv;
    });
  });

  groupOrder.forEach(group=>{
    let subtotalCurr = 0, subtotalCmp = 0;
    grouped[group].forEach(se=>{
      const d = curr[se];
      const cd = cmp ? cmp[se] : null;
      const currVal = d ? d.totalRegUnreg : null;
      const cmpVal = cd ? cd.totalRegUnreg : null;
      // skip rows where both years are zero or null
      if((currVal===null||currVal===0) && (cmpVal===null||cmpVal===0)) return;
      if(currVal!==null) subtotalCurr += currVal;
      if(cmpVal!==null) subtotalCmp += cmpVal;
      html += rowHtml(se, currVal, cmpVal, false, false, 0, 0);
    });
    html += rowHtml(subtotalLabels[group], subtotalCurr, subtotalCmp, true, false, 0, 0);
    if(pctLabels[group]) html += rowHtml(pctLabels[group], subtotalCurr, subtotalCmp, false, true, grandCurr, grandCmp);
  });

  html += rowHtml('GRAND TOTAL', grandCurr, grandCmp, true, false, 0, 0);
  html += '</tbody></table>';
  document.getElementById('subEventTable_'+brandKey).innerHTML = html;
}

/* ---- Category × Phase breakdown table ---- */

function renderCatPhaseTable(brandKey, rows, year){
  const container = document.getElementById('catPhaseTable_'+brandKey);
  if(!container) return;

  // define categories per brand
  const categories = brandKey==='tsr' ? ['Individual','Team'] : ['Singles','Doubles','Team Relay'];

  // get all phases in order from this year's data
  const phaseFirstDate = {};
  rows.forEach(r=>{
    const p = r['Phase']; if(!p) return;
    const d = parseMYT(r['Date cleaned (DD/MM/YYYY)']);
    if(isNaN(d)) return;
    if(!phaseFirstDate[p] || d < phaseFirstDate[p]) phaseFirstDate[p] = d;
  });
  const phases = Object.entries(phaseFirstDate)
    .sort((a,b)=>a[1]-b[1])
    .map(([name])=>name);

  if(!phases.length){
    container.innerHTML = '<p style="color:var(--text-dim); font-size:13px;">No phase data found.</p>';
    return;
  }

  // build data: category → phase → ticket count
  const data = {};
  categories.forEach(cat=>{ data[cat] = {}; phases.forEach(p=>{ data[cat][p] = 0; }); });

  rows.forEach(r=>{
    const cat = r['Category']; 
    const phase = r['Phase'];
    if(!cat || !phase) return;
    // map category
    let mappedCat = null;
    if(brandKey==='tsr'){
      if(cat==='Individual') mappedCat = 'Individual';
      else if(cat==='Team') mappedCat = 'Team';
    } else if(brandKey==='rl'){
      if(cat==='Singles') mappedCat = 'Singles';
      else if(cat==='Doubles') mappedCat = 'Doubles';
      else if(cat==='Team Relay') mappedCat = 'Team Relay';
    }
    if(!mappedCat || !data[mappedCat] || !phases.includes(phase)) return;
    data[mappedCat][phase] += parseInt(r['Ticket Count'])||0;
  });

  // build table — rows = categories, columns = phases
  let html = '<table><thead><tr><th>Category</th>';
  phases.forEach(p=>{ html += `<th>${p}</th>`; });
  html += '<th>Total</th></tr></thead><tbody>';

  categories.forEach(cat=>{
    const row = data[cat];
    const total = phases.reduce((a,p)=>a+(row[p]||0),0);
    if(total===0) return;
    html += `<tr><td>${cat}</td>`;
    phases.forEach(p=>{ html += `<td style="text-align:right">${row[p]?fmtNum(row[p]):'—'}</td>`; });
    html += `<td style="text-align:right; font-weight:600;">${fmtNum(total)}</td></tr>`;
  });

  // totals row
  html += '<tr style="font-weight:700; background:rgba(255,255,255,0.04);"><td>Total</td>';
  let grandTotal = 0;
  phases.forEach(p=>{
    const colTotal = categories.reduce((a,cat)=>a+(data[cat][p]||0),0);
    grandTotal += colTotal;
    html += `<td style="text-align:right">${fmtNum(colTotal)}</td>`;
  });
  html += `<td style="text-align:right">${fmtNum(grandTotal)}</td></tr>`;
  html += '</tbody></table>';
  container.innerHTML = html;
}

/* ---- Gender category breakdown (Mixed/Women/Men) ---- */

function computeGenderBreakdown(rows, year, brandKey){
  const yr = rows.filter(r=>getEventYear(r)===String(year));
  const catField = brandKey==='tsr' ? 'Team Category' : 'Double/ Team Category';
  const groups = {}; // groupLabel(e.g. "Team" or "Doubles"/"Team Relay") -> {Mixed:n, Women:n, Men:n}

  yr.forEach(r=>{
    const tc = r[catField];
    if(!tc) return;
    // determine top-level group and gender
    let group, gender;
    if(brandKey==='tsr'){
      group = 'Team';
    } else {
      if(tc.toLowerCase().includes('doubles')) group = 'Doubles';
      else if(tc.toLowerCase().includes('team relay')) group = 'Team Relay';
      else return;
    }
    if(tc.toLowerCase().includes('mix')) gender = 'Mixed';
    else if(tc.toLowerCase().includes('women')) gender = 'Women';
    else if(tc.toLowerCase().includes('men')) gender = 'Men';
    else gender = 'Other';

    if(!groups[group]) groups[group] = {Mixed:0, Women:0, Men:0, Other:0};
    groups[group][gender] += parseInt(r['Ticket Count'])||0;
  });
  return groups;
}

function renderGenderTable(brandKey, rows, year, compareYear){
  const curr = computeGenderBreakdown(rows, year, brandKey);
  const cmp = compareYear ? computeGenderBreakdown(rows, compareYear, brandKey) : null;
  const groupNames = Object.keys(curr);

  if(groupNames.length===0){
    document.getElementById('genderTable_'+brandKey).innerHTML = '<p style="color:var(--text-dim); font-size:13px;">No team category data found.</p>';
    return;
  }

  let html = '<table><thead><tr><th style="width:40%">Category / Gender</th><th>'+year+' Count</th><th>'+year+' %</th>' + (cmp ? `<th>${compareYear} Count</th><th>${compareYear} %</th>` : '') + '</tr></thead><tbody>';
  groupNames.forEach(group=>{
    const g = curr[group];
    const total = g.Mixed+g.Women+g.Men+(g.Other||0);
    const cg = cmp ? cmp[group] : null;
    const cmpTotal = cg ? (cg.Mixed+cg.Women+cg.Men+(cg.Other||0)) : 0;
    ['Mixed','Women','Men'].forEach(gender=>{
      if(g[gender]===0 && (!cg || cg[gender]===0)) return;
      const pct = total ? (g[gender]/total*100) : 0;
      let cmpCells = '';
      if(cmp){
        const cVal = cg ? (cg[gender]||0) : 0;
        const cPct = cmpTotal ? (cVal/cmpTotal*100) : 0;
        cmpCells = `<td style="text-align:right">${fmtNum(cVal)}</td><td style="text-align:right">${cPct.toFixed(0)}%</td>`;
      }
      html += `<tr><td>${group} — ${gender}</td><td style="text-align:right">${fmtNum(g[gender])}</td><td style="text-align:right">${pct.toFixed(0)}%</td>${cmpCells}</tr>`;
    });
  });
  html += '</tbody></table>';
  document.getElementById('genderTable_'+brandKey).innerHTML = html;
}

/* ---- Audience profile (gender/age/nationality pie charts) ---- */

const AGE_RANGES = [
  {label:'<18', min:0, max:17},
  {label:'18-24', min:18, max:24},
  {label:'25-34', min:25, max:34},
  {label:'35-44', min:35, max:44},
  {label:'45-54', min:45, max:54},
  {label:'55+', min:55, max:999}
];
const PIE_COLORS = ['#378ADD','#FF6A3D','#6FCF97','#C77DFF','#F2C94C','#E8694A','#4A6657','#56CCF2','#EB5757','#27AE60'];

function renderAudienceProfile(brandKey, viewRows, cmpRows, year, compareYear){
  const audienceCat = document.getElementById('audienceCatFilter_'+brandKey) ? document.getElementById('audienceCatFilter_'+brandKey).value : 'all';
  const filterCat = r => audienceCat==='all' || r['Category']===audienceCat;

  const yr = viewRows.filter(filterCat);
  const cmpYr = (compareYear && cmpRows) ? cmpRows.filter(filterCat) : null;
  const hasCompare = !!cmpYr && cmpYr.length > 0;

  function getGenderMap(data){
    const m = {Male:0, Female:0, Unknown:0};
    data.forEach(r=>{
      const s = (r['Sex']||'').toString().trim().toUpperCase();
      if(s==='M') m.Male++;
      else if(s==='F') m.Female++;
      else if(r['Date cleaned (DD/MM/YYYY)']) m.Unknown++;
    });
    return m;
  }

  function getAgeCounts(data){
    const counts = AGE_RANGES.map(()=>0);
    data.forEach(r=>{
      const age = parseInt(r['Age']);
      if(isNaN(age)) return;
      const idx = AGE_RANGES.findIndex(range=>age>=range.min && age<=range.max);
      if(idx>=0) counts[idx]++;
    });
    return counts;
  }

  function getNatMap(data){
    const m = {};
    data.forEach(r=>{
      const c = (r['Nationality']||r['Country']||'Unknown').toString().trim();
      m[c] = (m[c]||0) + (parseInt(r['Ticket Count'])||0);
    });
    return m;
  }

  const genderMap = getGenderMap(yr);
  const cmpGenderMap = cmpYr ? getGenderMap(cmpYr) : null;
  const ageCounts = getAgeCounts(yr);
  const cmpAgeCounts = cmpYr ? getAgeCounts(cmpYr) : null;
  const natMap = getNatMap(yr);
  const cmpNatMap = cmpYr ? getNatMap(cmpYr) : null;

  // shared opts
  const pieTooltip = (total, cmpTotal, cmpMap, labels) => ({
    callbacks:{
      label: ctx => {
        const val = ctx.parsed;
        const pct = total ? (val/total*100).toFixed(1) : 0;
        let line = ` ${year}: ${fmtNum(val)} (${pct}%)`;
        return line;
      }
    }
  });

  function doughnutOpts(total){
    return {
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{position:'right', labels:{color:'#EAF2EC', font:{size:11}, padding:8, boxWidth:12}},
        tooltip:{callbacks:{label: ctx=>` ${fmtNum(ctx.parsed)} (${total?(ctx.parsed/total*100).toFixed(1):0}%)`}}
      }
    };
  }

  function groupedBarOpts(xlabel, totals){
    return {
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:true, labels:{color:'#EAF2EC', font:{size:11}, padding:8, boxWidth:12}},
        tooltip:{callbacks:{label: ctx=>{
          const val = ctx.parsed.y;
          const total = totals[ctx.datasetIndex] || 1;
          const pct = (val/total*100).toFixed(1);
          return ` ${ctx.dataset.label}: ${fmtNum(val)} (${pct}%)`;
        }}}
      },
      scales:{
        x:{ticks:{color:'#EAF2EC', font:{size:11}}, grid:{display:false}},
        y:{ticks:{color:'#8FA999'}, grid:{color:'rgba(143,169,153,0.15)'}}
      }
    };
  }

  // ---- Gender chart ----
  const gLabels = ['Male','Female','Unknown'].filter(k=>genderMap[k]>0 || (cmpGenderMap&&cmpGenderMap[k]>0));
  const gVals = gLabels.map(k=>genderMap[k]||0);
  const gTotal = gVals.reduce((a,b)=>a+b,0);
  const gCtx = document.getElementById('genderPieChart_'+brandKey);
  destroyChart('genderPieChart_'+brandKey);
  if(!hasCompare){
    chartInstances['genderPieChart_'+brandKey] = new Chart(gCtx, {
      type:'doughnut',
      data:{labels:gLabels, datasets:[{data:gVals, backgroundColor:PIE_COLORS, borderWidth:1, borderColor:'#142319'}]},
      options: doughnutOpts(gTotal)
    });
  } else {
    const cmpGVals = gLabels.map(k=>cmpGenderMap[k]||0);
    const cmpGTotal = cmpGVals.reduce((a,b)=>a+b,0);
    chartInstances['genderPieChart_'+brandKey] = new Chart(gCtx, {
      type:'bar',
      data:{labels:gLabels, datasets:[
        {label:String(year), data:gVals, backgroundColor:'#378ADD', borderRadius:4},
        {label:String(compareYear), data:cmpGVals, backgroundColor:'#4A6657', borderRadius:4}
      ]},
      options: groupedBarOpts('Gender', [gTotal, cmpGTotal])
    });
  }

  // ---- Age chart (filtered by gender) ----
  const ageGenderEl = document.getElementById('ageGenderFilter_'+brandKey);
  const ageGender = ageGenderEl ? ageGenderEl.value : 'all';
  const filterAgeGender = r => ageGender==='all' || (r['Sex']||'').toString().trim().toUpperCase()===ageGender;
  const ageYr = yr.filter(filterAgeGender);
  const ageCmpYr = cmpYr ? cmpYr.filter(filterAgeGender) : null;
  const ageCountsFiltered = getAgeCounts(ageYr);
  const cmpAgeCountsFiltered = ageCmpYr ? getAgeCounts(ageCmpYr) : null;

  const aLabels = AGE_RANGES.map(r=>r.label).filter((_,i)=>ageCountsFiltered[i]>0||(cmpAgeCountsFiltered&&cmpAgeCountsFiltered[i]>0));
  const aIdxs = AGE_RANGES.map((_,i)=>i).filter(i=>ageCountsFiltered[i]>0||(cmpAgeCountsFiltered&&cmpAgeCountsFiltered[i]>0));
  const aVals = aIdxs.map(i=>ageCountsFiltered[i]);
  const aTotal = aVals.reduce((a,b)=>a+b,0);
  const aCtx = document.getElementById('agePieChart_'+brandKey);
  destroyChart('agePieChart_'+brandKey);
  if(!hasCompare){
    chartInstances['agePieChart_'+brandKey] = new Chart(aCtx, {
      type:'doughnut',
      data:{labels:aLabels, datasets:[{data:aVals, backgroundColor:PIE_COLORS, borderWidth:1, borderColor:'#142319'}]},
      options: doughnutOpts(aTotal)
    });
  } else {
    const cmpAVals = aIdxs.map(i=>(cmpAgeCountsFiltered||[])[i]||0);
    const cmpATotal = cmpAVals.reduce((a,b)=>a+b,0);
    chartInstances['agePieChart_'+brandKey] = new Chart(aCtx, {
      type:'bar',
      data:{labels:aLabels, datasets:[
        {label:String(year), data:aVals, backgroundColor:'#378ADD', borderRadius:4},
        {label:String(compareYear), data:cmpAVals, backgroundColor:'#4A6657', borderRadius:4}
      ]},
      options: groupedBarOpts('Age', [aTotal, cmpATotal])
    });
  }

  // ---- Nationality chart ----
  const sortedNat = Object.entries(natMap).sort((a,b)=>b[1]-a[1]);
  const top10 = sortedNat.slice(0,10);
  const othersSum = sortedNat.slice(10).reduce((a,b)=>a+b[1],0);
  const natLabels = top10.map(e=>e[0]);
  const natVals = top10.map(e=>e[1]);
  if(othersSum>0){ natLabels.push('Others'); natVals.push(othersSum); }
  const natTotal = natVals.reduce((a,b)=>a+b,0);

  const nCtx = document.getElementById('nationalityChart_'+brandKey);
  destroyChart('nationalityChart_'+brandKey);

  const natDatasets = [{label:String(year), data:natVals, backgroundColor:'#378ADD', borderRadius:4}];
  if(hasCompare){
    const cmpNatVals = natLabels.map(l=>{
      if(l==='Others'){
        const cmpSorted = Object.entries(cmpNatMap).sort((a,b)=>b[1]-a[1]);
        return cmpSorted.slice(10).reduce((a,b)=>a+b[1],0);
      }
      return cmpNatMap[l]||0;
    });
    natDatasets.push({label:String(compareYear), data:cmpNatVals, backgroundColor:'#4A6657', borderRadius:4});
  }

  const cmpNatTotal = hasCompare ? Object.values(cmpNatMap).reduce((a,b)=>a+b,0) : 0;
  const natTotals = [natTotal, cmpNatTotal];

  chartInstances['nationalityChart_'+brandKey] = new Chart(nCtx, {
    type:'bar',
    data:{labels:natLabels, datasets:natDatasets},
    options:{
      indexAxis:'y',
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:hasCompare, labels:{color:'#EAF2EC', font:{size:11}, boxWidth:12}},
        tooltip:{callbacks:{label: ctx=>{
          const total = natTotals[ctx.datasetIndex] || natTotal;
          return ` ${ctx.dataset.label}: ${fmtNum(ctx.parsed.x)} (${total?(ctx.parsed.x/total*100).toFixed(1):0}%)`;
        }}}
      },
      scales:{
        x:{ticks:{color:'#8FA999', callback:v=>fmtNum(v)}, grid:{color:'rgba(143,169,153,0.15)'}},
        y:{ticks:{color:'#EAF2EC', font:{size:11}}, grid:{display:false}}
      }
    }
  });

  // ---- State chart (filtered by age group) ----
  function getStateMap(data){
    const m = {};
    data.forEach(r=>{
      const s = (r['State']||'').toString().trim();
      if(!s) return;
      m[s] = (m[s]||0) + (parseInt(r['Ticket Count'])||1);
    });
    return m;
  }

  const stateAgeEl = document.getElementById('stateAgeFilter_'+brandKey);
  const stateAge = stateAgeEl ? stateAgeEl.value : 'all';
  const filterStateAge = r => {
    if(stateAge==='all') return true;
    const age = parseInt(r['Age']);
    if(isNaN(age)) return false;
    const range = AGE_RANGES.find(ar=>ar.label===stateAge);
    if(!range) return false;
    return age>=range.min && age<=range.max;
  };
  const stateYr = viewRows.filter(filterStateAge);
  const cmpStateYr = (compareYear && cmpRows) ? cmpRows.filter(filterStateAge) : null;

  const stateMap = getStateMap(stateYr);
  const cmpStateMap = cmpStateYr ? getStateMap(cmpStateYr) : null;
  const sortedState = Object.entries(stateMap).sort((a,b)=>b[1]-a[1]);
  const top10State = sortedState.slice(0,10);
  const stateLabels = top10State.map(e=>e[0]);
  const stateVals = top10State.map(e=>e[1]);
  const stateTotal = stateVals.reduce((a,b)=>a+b,0);
  const sCtx = document.getElementById('stateChart_'+brandKey);
  if(!sCtx) return;
  destroyChart('stateChart_'+brandKey);

  const stateDatasets = [{label:String(year), data:stateVals, backgroundColor:'#6FCF97', borderRadius:4}];
  if(hasCompare && cmpStateMap){
    const cmpStateVals = stateLabels.map(l=>cmpStateMap[l]||0);
    stateDatasets.push({label:String(compareYear), data:cmpStateVals, backgroundColor:'#4A6657', borderRadius:4});
  }
  const cmpStateTotal = hasCompare && cmpStateMap ? Object.values(cmpStateMap).reduce((a,b)=>a+b,0) : 0;
  const stateTotals = [stateTotal, cmpStateTotal];

  chartInstances['stateChart_'+brandKey] = new Chart(sCtx, {
    type:'bar',
    data:{labels:stateLabels, datasets:stateDatasets},
    options:{
      indexAxis:'y',
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:hasCompare, labels:{color:'#EAF2EC', font:{size:11}, boxWidth:12}},
        tooltip:{callbacks:{label: ctx=>{
          const total = stateTotals[ctx.datasetIndex] || stateTotal;
          return ` ${ctx.dataset.label}: ${fmtNum(ctx.parsed.x)} (${total?(ctx.parsed.x/total*100).toFixed(1):0}%)`;
        }}}
      },
      scales:{
        x:{ticks:{color:'#8FA999', callback:v=>fmtNum(v)}, grid:{color:'rgba(143,169,153,0.15)'}},
        y:{ticks:{color:'#EAF2EC', font:{size:11}}, grid:{display:false}}
      }
    }
  });
}

/* ---- Cohort retention ---- */

function renderCohortTable(brandKey, rows, country){
  const filteredRows = country && country!=='all' ? rows.filter(r=>r['Country']===country) : rows;
  const emailKey = 'Unique Email ID';
  const hasEmail = filteredRows.some(r => r[emailKey]);
  const container = document.getElementById('cohortTable_'+brandKey);
  if(!hasEmail){
    container.innerHTML = '<p style="color:var(--text-dim); font-size:13px;">No "Unique Email ID" column found in this data.</p>';
    return;
  }
  const firstSeen = {};
  const emailsByYear = {};
  filteredRows.forEach(r=>{
    const email = r[emailKey];
    const yr = parseInt(getEventYear(r));
    if(!email || !yr) return;
    if(!firstSeen[email] || yr < firstSeen[email]) firstSeen[email] = yr;
    if(!emailsByYear[yr]) emailsByYear[yr] = new Set();
    emailsByYear[yr].add(email);
  });
  const allYears = Object.keys(emailsByYear).map(Number).sort((a,b)=>a-b);
  const maxOffset = allYears.length - 1;

  let html = '<div style="overflow-x:auto; -webkit-overflow-scrolling:touch;"><table style="min-width:500px;"><thead><tr><th>Cohort</th><th>Total that year</th><th>New (cohort)</th>';
  for(let off=1; off<=maxOffset; off++){
    html += `<th>Year ${off+1}</th>`;
  }
  html += '</tr></thead><tbody>';

  allYears.forEach(cy=>{
    const totalThatYear = emailsByYear[cy] ? emailsByYear[cy].size : 0;
    const cohortEmails = [...(emailsByYear[cy]||[])].filter(e => firstSeen[e] === cy);
    const size = cohortEmails.length;
    if(totalThatYear === 0) return;
    html += `<tr><td>${cy}</td><td style="text-align:right">${fmtNum(totalThatYear)}</td><td style="text-align:right">${fmtNum(size)}</td>`;
    for(let off=1; off<=maxOffset; off++){
      const targetYear = cy + off;
      if(!allYears.includes(targetYear)){
        html += '<td style="text-align:right; color:var(--text-dim);">—</td>';
        continue;
      }
      const retained = size > 0 ? cohortEmails.filter(e => emailsByYear[targetYear].has(e)).length : 0;
      const p = size ? (retained/size*100) : 0;
      html += `<td style="text-align:right">${fmtNum(retained)} <span style="color:var(--text-dim); font-size:11px;">(${p.toFixed(0)}%)</span></td>`;
    }
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  html += '<p style="font-size:11px; color:var(--text-dim); margin-top:8px; font-style:italic;">* Based on identified Unique Email ID only. Tickets with blank email IDs are excluded.</p>';
  container.innerHTML = html;
}

// MYT = UTC+8. Parse dates as MYT midnight to avoid cross-day shifts.
function parseMYT(dateStr){
  if(!dateStr) return new Date(NaN);
  const s = dateStr.toString().trim();
  // ISO timestamp (e.g. 2026-05-31T16:00:00.000Z) → shift to MYT date midnight
  if(s.includes('T') || s.endsWith('Z')){
    const dt = new Date(s);
    if(isNaN(dt)) return new Date(NaN);
    const mytMs = dt.getTime() + 8*60*60*1000;
    const mytDate = new Date(mytMs).toISOString().slice(0,10); // YYYY-MM-DD in MYT
    return new Date(`${mytDate}T00:00:00+08:00`);
  }
  // DD/MM/YYYY
  const dmy = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(dmy) return new Date(`${dmy[3]}-${dmy[2].padStart(2,'0')}-${dmy[1].padStart(2,'0')}T00:00:00+08:00`);
  // YYYY-MM-DD
  const ymd = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(ymd) return new Date(`${s}T00:00:00+08:00`);
  // fallback
  return new Date(s);
}
function fmtMYT(date){
  if(!date || isNaN(date)) return '';
  return date.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric',timeZone:'Asia/Kuala_Lumpur'});
}
function dayKey(dateStr){ return parseMYT(dateStr); }

function buildDailySeries(rows, year, cat, ticketMode, brandKey, settings){
  ticketMode = ticketMode || 'reg';
  const yr = filteredByCategory(rows, cat); // rows already filtered by year+country
  const isOne = v => v===1 || v==='1' || v===true || Number(v)===1;

  // get multipliers from settings
  const mpt = settings && settings.membersPerTeam ? parseInt(settings.membersPerTeam)+1 : 3; // tsr team: captain + members
  const dm  = settings && settings.doublesMembers ? parseInt(settings.doublesMembers)+1 : 2;  // rl doubles
  const trm = settings && settings.teamRelayMembers ? parseInt(settings.teamRelayMembers)+1 : 4; // rl relay

  function ticketsForRow(r){
    if(ticketMode !== 'regunreg') return parseInt(r['Ticket Count'])||0;
    // reg+unreg: count by captain × team size, or individual ticket count
    const cat = r['Category'];
    if(brandKey==='tsr' && cat==='Team'){
      return isOne(r['Team Captain']) ? mpt : 0;
    }
    if(brandKey==='rl' && cat==='Doubles'){
      return isOne(r['Doubles Captain']) ? dm : 0;
    }
    if(brandKey==='rl' && cat==='Team Relay'){
      return isOne(r['Team Relay Captain']) ? trm : 0;
    }
    // individuals/singles/TMR: use ticket count as normal
    return parseInt(r['Ticket Count'])||0;
  }

  const dated = yr.map(r=>({date:dayKey(r['Date cleaned (DD/MM/YYYY)']), tickets:ticketsForRow(r)})).filter(r=>!isNaN(r.date));
  dated.sort((a,b)=>a.date-b.date);
  const start = dated.length?dated[0].date:new Date();
  const byDay = {};
  const dayToDate = {};
  let lastDayWithData = 0;
  dated.forEach(r=>{
    const d = Math.round((r.date-start)/(1000*60*60*24));
    byDay[d] = (byDay[d]||0)+r.tickets;
    if(!dayToDate[d]) dayToDate[d] = r.date;
    if(d > lastDayWithData) lastDayWithData = d;
  });
  return {byDay, lastDayWithData, start, dayToDate};
}

function chartOpts(){
  return {responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
    plugins:{legend:{display:false}},
    scales:{x:{ticks:{maxTicksLimit:10,color:'#8FA999'},grid:{display:false}}, y:{ticks:{color:'#8FA999'},grid:{color:'rgba(143,169,153,0.15)'}}}};
}

// Auto-detect phase boundaries from raw data Phase column
function getPhaseOffsets(rows, year, startDate){
  const yr = rows.filter(r=>getEventYear(r)===String(year));
  const phaseFirstDate = {};
  yr.forEach(r=>{
    const phase = r['Phase']; if(!phase) return;
    const d = parseMYT(r['Date cleaned (DD/MM/YYYY)']);
    if(isNaN(d)) return;
    if(!phaseFirstDate[phase] || d < phaseFirstDate[phase]) phaseFirstDate[phase] = d;
  });
  return Object.entries(phaseFirstDate)
    .map(([name, date])=>({name, dayOffset: Math.round((date-startDate)/(1000*60*60*24))}))
    .filter(p=>p.dayOffset >= 0)
    .sort((a,b)=>a.dayOffset-b.dayOffset);
}

function buildPhaseAnnotations(rows, years, seriesList){
  const annotations = [];
  const yearColors = ['rgba(55,138,221,0.6)', 'rgba(74,102,87,0.5)'];
  const labelColors = ['#378ADD', '#8FA999'];

  years.forEach((year, yi)=>{
    const s = seriesList[yi];
    if(!s || !s.start) return;
    const phases = getPhaseOffsets(rows, year, s.start);
    phases.forEach(({name, dayOffset})=>{
      if(dayOffset > s.lastDayWithData + 5) return;
      annotations.push({
        type:'line',
        xMin: dayOffset,
        xMax: dayOffset,
        borderColor: yearColors[yi],
        borderWidth: 1.5,
        borderDash: [4,3],
        label:{
          display: false,
          content: `${name} (${year})`,
          backgroundColor: 'rgba(14,26,20,0.9)',
          color: labelColors[yi],
          font:{size:10, weight:'600'},
          padding:{x:6, y:3},
          position: 'end'
        },
        enter({element}){ element.label.options.display = true; return true; },
        leave({element}){ element.label.options.display = false; return true; }
      });
    });
  });
  return annotations;
}

function renderPhaseLabelsRow(brandKey, rows, years, seriesList, maxDay){
  const container = document.getElementById('phaseLabels_'+brandKey);
  if(!container) return;
  const labelColors = ['#378ADD','#8FA999'];
  let html = '';

  years.forEach((year, yi)=>{
    const s = seriesList[yi];
    if(!s || !s.start) return;
    const phases = getPhaseOffsets(rows, year, s.start);
    phases.forEach(({name, dayOffset})=>{
      if(dayOffset > maxDay + 5) return;
      const pct = maxDay > 0 ? (dayOffset / maxDay * 100) : 0;
      // offset second year labels slightly to avoid overlap
      const topOffset = yi === 0 ? 0 : 10;
      html += `<span style="position:absolute; left:${Math.min(pct,95)}%; transform:translateX(-50%); color:${labelColors[yi]}; font-weight:600; white-space:nowrap; top:${topOffset}px; font-size:9px;">${name}</span>`;
    });
  });
  container.innerHTML = html;
}

function chartOptsWithAnnotations(annotations){
  return {
    responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
    plugins:{
      legend:{display:false},
      annotation: annotations.length ? {annotations} : undefined
    },
    scales:{x:{ticks:{maxTicksLimit:10,color:'#8FA999'},grid:{display:false}}, y:{ticks:{color:'#8FA999'},grid:{color:'rgba(143,169,153,0.15)'}}}
  };
}

function buildDailyRevSeries(rows, cat){
  const yr = filteredByCategory(rows, cat);
  const dated = yr.map(r=>({
    date: parseMYT(r['Date cleaned (DD/MM/YYYY)']),
    rev: (parseFloat(r['Registration Rev'])||0) + (parseFloat(r['Products Rev'])||0)
  })).filter(r=>!isNaN(r.date));
  dated.sort((a,b)=>a.date-b.date);
  const start = dated.length ? dated[0].date : new Date();
  const byDay = {};
  const dayToDate = {};
  let lastDayWithData = 0;
  dated.forEach(r=>{
    const d = Math.round((r.date-start)/(1000*60*60*24));
    byDay[d] = (byDay[d]||0) + r.rev;
    if(!dayToDate[d]) dayToDate[d] = r.date;
    if(d > lastDayWithData) lastDayWithData = d;
  });
  return {byDay, lastDayWithData, start, dayToDate};
}

function renderRevChart(brandKey, rows, year, compareYear, cat, country, compareCountry){
  const years = compareYear ? [year, compareYear] : [year];
  const countries = compareYear ? [country, compareCountry] : [country];
  document.getElementById('legendRev_'+brandKey).innerHTML = years.map((y,i)=>`<span><span class="dot" style="background:${PALETTE[i]}"></span>${y}${countries[i]!=='all'?' ('+countries[i]+')':''}</span>`).join('');
  const seriesList = years.map((y,i)=>{
    const filtered = rows.filter(r=>getEventYear(r)===String(y)&&(countries[i]==='all'||r['Country']===countries[i]));
    return buildDailyRevSeries(filtered, cat);
  });
  const maxDay = Math.max(1, ...seriesList.map(s=>s.lastDayWithData));
  const labels = Array.from({length:maxDay+1}, (_,i)=>"Day "+i);
  const datasets = seriesList.map((s,i)=>{
    let cum = 0;
    const data = labels.map((_,d)=>{
      if(d > s.lastDayWithData) return null;
      cum += (s.byDay[d]||0);
      return cum;
    });
    return {label:String(years[i]), data, borderColor:PALETTE[i], backgroundColor:'transparent', borderWidth:2.5, pointRadius:0, tension:0.15, spanGaps:false};
  });
  const id = 'revChart_'+brandKey;
  destroyChart(id);
  const opts = chartOpts();
  opts.plugins = opts.plugins || {};
  opts.plugins.tooltip = {
    callbacks:{
      title: items=>{
        const d = items[0].dataIndex;
        const dates = seriesList.map(s=>s.dayToDate[d]).filter(Boolean);
        const dateStrs = dates.map(dt=>dt.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric',timeZone:'Asia/Kuala_Lumpur'}));
        const unique = [...new Set(dateStrs)];
        return `Day ${d}${unique.length ? ' — ' + unique.join(' / ') : ''}`;
      },
      label: ctx=>' '+ctx.dataset.label+': '+fmtMoney(ctx.parsed.y)
    }
  };
  opts.scales = opts.scales || {};
  opts.scales.y = {ticks:{color:'#8FA999', callback:v=>{ if(v>=1000000) return 'RM'+(v/1000000).toFixed(1)+'M'; if(v>=1000) return 'RM'+(v/1000).toFixed(0)+'K'; return 'RM'+v; }}, grid:{color:'rgba(143,169,153,0.15)'}};
  chartInstances[id] = new Chart(document.getElementById(id), {type:'line', data:{labels,datasets}, options:opts});
}

function destroyChart(id){
  if(chartInstances[id]){ chartInstances[id].destroy(); delete chartInstances[id]; }
}

function renderCumChart(brandKey, rows, year, compareYear, cat, country, compareCountry, ticketMode){
  ticketMode = ticketMode || 'reg';
  const settings = brandData[brandKey] ? brandData[brandKey].settings : {};
  const years = compareYear ? [year, compareYear] : [year];
  const countries = compareYear ? [country, compareCountry] : [country];
  const modeLabel = ticketMode==='regunreg' ? 'Reg + Unreg' : 'Registered';
  const titleEl = document.getElementById('cumChartTitle_'+brandKey);
  if(titleEl) titleEl.textContent = `Cumulative daily tickets (${modeLabel}) — year comparison`;
  document.getElementById('legendDaily1_'+brandKey).innerHTML = years.map((y,i)=>`<span><span class="dot" style="background:${PALETTE[i]}"></span>${y}${countries[i]!=='all'?' ('+countries[i]+')':''}</span>`).join('');
  const seriesList = years.map((y,i)=>{
    const filtered = rows.filter(r=>getEventYear(r)===String(y)&&(countries[i]==='all'||r['Country']===countries[i]));
    return buildDailySeries(filtered, y, cat, ticketMode, brandKey, settings);
  });
  const maxDay = Math.max(1, ...seriesList.map(s=>s.lastDayWithData));
  const labels = Array.from({length:maxDay+1}, (_,i)=>"Day "+i);
  const datasets = seriesList.map((s,i)=>{
    let cum=0;
    const data = labels.map((_,d)=>{
      if(d > s.lastDayWithData) return null;
      cum += (s.byDay[d]||0);
      return cum;
    });
    return {label:String(years[i]), data, borderColor:PALETTE[i], backgroundColor:'transparent', borderWidth:2.5, pointRadius:0, tension:0.15, spanGaps:false};
  });
  const id = 'cumChart_'+brandKey;
  destroyChart(id);
  const cumOpts = chartOpts();
  cumOpts.plugins = cumOpts.plugins || {};
  cumOpts.plugins.tooltip = {
    callbacks:{
      title: items=>{
        const d = items[0].dataIndex;
        const dates = seriesList.map(s=>s.dayToDate[d]).filter(Boolean);
        const dateStrs = dates.map(dt=>dt.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric',timeZone:'Asia/Kuala_Lumpur'}));
        const unique = [...new Set(dateStrs)];
        return `Day ${d}${unique.length ? ' — ' + unique.join(' / ') : ''}`;
      }
    }
  };
  chartInstances[id] = new Chart(document.getElementById(id), {type:'line', data:{labels,datasets}, options:cumOpts});
}
